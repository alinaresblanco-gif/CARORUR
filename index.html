<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CARORUR</title>
  <meta name="theme-color" content="#8d6a3b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="CARORUR" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="imagenes/logo_carorur.png" />
  <link rel="apple-touch-icon" href="imagenes/logo_carorur.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== PANTALLA DE INICIO ===== -->
  <div id="pantalla-inicio" class="pantalla activa">

    <header class="franja-decorativa franja-superior" aria-label="Cabecera CARORUR">
      <h1 class="titulo-principal">CARORUR</h1>
      <p class="subtitulo-principal">Estilo Rural &amp; Tradición</p>
    </header>

    <div class="escenario-inicio">

      <!-- Imagen de fondo a pantalla completa -->
      <div class="imagen-contenedor">
        <img
          src="imagenes/imagen_index.png"
          alt="Inicio CARORUR"
          id="imagen-inicio"
          class="imagen-principal"
        />

        <!-- =====================================================
             ZONAS CLICABLES
             Cada zona se posiciona con porcentajes sobre la imagen.
             Atributos:
               data-vista  → ruta del archivo HTML a cargar
               data-label  → nombre visible en modo edición
             Ajusta top / left / width / height en style.css
             o directamente aquí como estilo inline.
        ====================================================== -->

        <div
          class="zona-clic"
          id="zona-agenda-aventuras"
          data-vista="vistas/agenda-aventuras.html"
          data-label="Agenda de Aventuras"
          style="top: 43.8%; left: 22.8%; width: 54.7%; height: 11.2%;"
        ></div>

        <div
          class="zona-clic"
          id="zona-amigos"
          data-vista="vistas/amigos.html"
          data-label="Los Amigos"
          style="top: 16%; left: 2%; width: 28%; height: 31%;"
        ></div>

        <div
          class="zona-clic"
          id="zona-busqueda-tesoro"
          data-vista="vistas/busqueda-tesoro.html"
          data-label="Busqueda del Tesoro"
          style="top: 78%; left: 47%; width: 51%; height: 21%;"
        ></div>

        <div
          class="zona-clic"
          id="zona-gastronomia"
          data-vista="vistas/gastronomia.html"
          data-label="Gastronomia"
          style="top: 20.8%; left: 22.8%; width: 54.7%; height: 11%;"
        ></div>

        <div
          class="zona-clic"
          id="zona-ludoteca-rural"
          data-vista="vistas/ludoteca-rural.html"
          data-label="Ludoteca Rural"
          style="top: 32.1%; left: 22.8%; width: 54.7%; height: 11.2%;"
        ></div>

        <div
          class="zona-clic"
          id="zona-muro-recuerdos"
          data-vista="vistas/muro-recuerdos.html"
          data-label="Muro de Recuerdos"
          style="top: 68%; left: 2%; width: 46%; height: 29%;"
        ></div>

        <div
          class="zona-clic"
          id="zona-nuestras-recetas"
          data-vista="vistas/nuestras-recetas.html"
          data-label="Nuestras Recetas"
          style="top: 30%; left: 75%; width: 23%; height: 30%;"
        ></div>

        <div
          class="zona-clic"
          id="zona-nuestro-historico"
          data-vista="vistas/nuestro-historico.html"
          data-label="Nuestro Historico"
          style="top: 55.3%; left: 22.8%; width: 54.7%; height: 11%;"
        ></div>

        <div
          class="zona-clic"
          id="zona-playlist-colaborativas"
          data-vista="vistas/playlist-colaborativas.html"
          data-label="Playlist Colaborativa"
          style="top: 66.8%; left: 22.8%; width: 54.7%; height: 11.9%;"
        ></div>

      </div><!-- /imagen-contenedor -->

    </div><!-- /escenario-inicio -->

    <footer class="franja-decorativa franja-inferior" aria-label="Lema CARORUR">
      <p class="lema-principal">Días de sol ☀️🌾, amigos de siempre 🪵🔥, risas para el recuerdo 🌱🥘: Nuestra escapada rural perfecta 🏡🌲.</p>
    </footer>

    <!-- Botón para activar/desactivar modo edición de zonas -->
    <button id="btn-edicion" title="Mostrar/ocultar zonas clicables">⚙</button>

  </div><!-- /pantalla-inicio -->


  <!-- ===== CONTENEDOR DE VISTAS ===== -->
  <!--
    Las vistas se cargarán aquí dinámicamente.
    Permanece oculto hasta que se seleccione una zona.
  -->
  <div id="contenedor-vista" class="oculto">
    <button id="btn-volver" title="Volver al inicio">← Inicio</button>
    <iframe id="iframe-vista" src="" frameborder="0" allow="geolocation; camera; microphone"></iframe>
  </div>


  <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>NUESTRAS RECETAS</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="vistas.css" />
	<style>
		:root {
			--receta-papel: #f8edd2;
			--receta-papel-suave: #fff7e7;
			--receta-borde: rgba(112, 76, 40, 0.25);
			--receta-tinta: #432913;
			--receta-marron: #8b5d2f;
			--receta-sombra: 0 14px 26px rgba(57, 35, 16, 0.18);
		}

		.vista-contenido {
			display: flex;
			flex-direction: column;
			gap: 0.6rem;
			padding: 0.6rem !important;
			overflow-y: auto !important;
			overflow-x: hidden;
		}

		.recetas-fixed {
			position: sticky;
			top: 0;
			z-index: 14;
			display: grid;
			gap: 0.5rem;
			padding-bottom: 0.2rem;
			background: linear-gradient(180deg, rgba(232, 210, 170, 0.96), rgba(232, 210, 170, 0.55) 82%, transparent);
		}

		.recetas-intro {
			border: 1px solid var(--receta-borde);
			border-radius: 18px;
			padding: 0.8rem 0.85rem;
			background: linear-gradient(145deg, var(--receta-papel-suave), var(--receta-papel));
			box-shadow: var(--receta-sombra);
			display: grid;
			gap: 0.55rem;
		}

		.recetas-intro p {
			margin: 0;
			font-size: 0.95rem;
			line-height: 1.42;
			color: var(--receta-tinta);
		}

		.recetas-search {
			border: 1px solid var(--receta-borde);
			border-radius: 14px;
			padding: 0.5rem;
			background: rgba(255, 246, 229, 0.96);
			box-shadow: 0 8px 18px rgba(56, 33, 14, 0.12);
		}

		.search-input {
			width: 100%;
			padding: 0.72rem 0.82rem;
			border-radius: 10px;
			border: 1px solid rgba(113, 74, 37, 0.28);
			font: inherit;
			font-size: 0.9rem;
			background: #fffdf8;
			color: var(--receta-tinta);
		}

		.btn-principal,
		.btn-secundario,
		.btn-peligro,
		.btn-nueva-receta {
			border: 0;
			border-radius: 999px;
			padding: 0.58rem 0.9rem;
			font-family: 'Special Elite', serif;
			font-size: 0.78rem;
			cursor: pointer;
			transition: transform 0.16s ease, opacity 0.16s ease;
		}

		.btn-principal,
		.btn-nueva-receta {
			background: linear-gradient(135deg, #7a4d27, #a87438);
			color: #fff8ec;
		}

		.btn-secundario {
			background: #efe1c1;
			color: #5f3b1d;
			border: 1px solid rgba(96, 58, 27, 0.22);
		}

		.btn-peligro {
			background: #f5e8dd;
			color: #853822;
			border: 1px solid rgba(133, 56, 34, 0.26);
		}

		.btn-principal:hover,
		.btn-secundario:hover,
		.btn-peligro:hover,
		.btn-nueva-receta:hover {
			transform: translateY(-1px);
		}

		.recetas-empty {
			margin-top: 0.3rem;
			padding: 1rem;
			border-radius: 16px;
			border: 2px dashed rgba(122, 82, 48, 0.35);
			background: rgba(255, 248, 235, 0.84);
			text-align: center;
		}

		.recetas-grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 0.5rem;
			align-items: start;
		}

		.receta-card {
			display: grid;
			gap: 0.45rem;
			padding: 0.45rem;
			border-radius: 14px;
			background: linear-gradient(180deg, #fff9eb, #f4e2bd);
			border: 1px solid var(--receta-borde);
			box-shadow: var(--receta-sombra);
			min-width: 0;
			cursor: pointer;
		}

		.receta-card:hover {
			transform: translateY(-1px);
		}

		.receta-thumb {
			width: 100%;
			aspect-ratio: 4 / 3;
			overflow: hidden;
			border-radius: 10px;
			background: linear-gradient(145deg, #ecdbb8, #f8eedc);
		}

		.receta-thumb img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.receta-meta {
			font-size: 0.62rem;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			color: #896037;
		}

		.receta-card h2 {
			margin: 0;
			font-size: 0.82rem;
			line-height: 1.2;
			color: #442812;
			word-break: break-word;
		}

		.receta-desc {
			margin: 0;
			font-size: 0.72rem;
			line-height: 1.35;
			display: -webkit-box;
			-webkit-line-clamp: 2;
			-webkit-box-orient: vertical;
			overflow: hidden;
		}

		.receta-actions {
			display: flex;
			justify-content: flex-end;
			gap: 0.3rem;
			flex-wrap: wrap;
		}

		.open-overlay {
			position: fixed;
			inset: 0;
			z-index: 120;
			background: rgba(35, 20, 10, 0.6);
			backdrop-filter: blur(5px);
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 0.8rem;
		}

		.open-overlay[hidden] {
			display: none;
		}

		.dialog {
			width: min(700px, 100%);
			max-height: 92vh;
			overflow: auto;
			padding: 0.95rem;
			border-radius: 18px;
			background: linear-gradient(180deg, #fffaf0, #f2dfb8);
			border: 1px solid rgba(111, 74, 44, 0.26);
			box-shadow: 0 28px 56px rgba(32, 18, 8, 0.24);
		}

		.dialog h2 {
			margin: 0 0 0.8rem;
			font-size: 1.05rem;
		}

		.form-grid,
		.field-block {
			display: grid;
			gap: 0.6rem;
		}

		.field-label {
			font-size: 0.84rem;
			font-weight: 700;
		}

		.field-input,
		.field-textarea {
			width: 100%;
			box-sizing: border-box;
			border: 1px solid rgba(109, 74, 47, 0.24);
			border-radius: 12px;
			background: rgba(255, 252, 246, 0.98);
			padding: 0.7rem 0.8rem;
			font: inherit;
			color: #3f2a17;
		}

		.field-textarea {
			min-height: 110px;
			resize: vertical;
		}

		.img-preview {
			width: 100%;
			max-height: 180px;
			object-fit: cover;
			border-radius: 12px;
			border: 1px solid rgba(111, 74, 44, 0.26);
			background: #f2dfb8;
		}

		.img-preview[hidden] {
			display: none;
		}

		.dialog-actions {
			display: flex;
			justify-content: flex-end;
			gap: 0.45rem;
			margin-top: 0.8rem;
			flex-wrap: wrap;
		}

		.detalle-shell {
			display: grid;
			gap: 0.75rem;
		}

		.detalle-media {
			border-radius: 12px;
			overflow: hidden;
			background: linear-gradient(145deg, #e8d2a5, #fff5df);
			min-height: 180px;
		}

		.detalle-media img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.detalle-box {
			background: rgba(255, 250, 238, 0.8);
			border: 1px solid rgba(110, 72, 38, 0.24);
			border-radius: 12px;
			padding: 0.7rem;
		}

		.detalle-box h3 {
			margin: 0 0 0.45rem;
			font-size: 0.95rem;
		}

		.ingredientes-lista {
			list-style: none;
			margin: 0;
			padding: 0;
			display: grid;
			gap: 0.38rem;
		}

		.ingredientes-lista li {
			display: flex;
			align-items: center;
			gap: 0.4rem;
			font-size: 0.9rem;
			line-height: 1.25;
		}

		.ingrediente-icono {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 1.5rem;
			height: 1.5rem;
			border-radius: 50%;
			background: #efd7ac;
			font-size: 0.86rem;
			flex-shrink: 0;
		}

		.elaboracion-texto {
			margin: 0;
			font-size: 0.9rem;
			line-height: 1.55;
			text-align: justify;
			white-space: pre-line;
		}

		.toast-msg {
			position: fixed;
			left: 50%;
			bottom: 1rem;
			transform: translateX(-50%);
			z-index: 140;
			background: #3e2a15;
			color: #fff7e7;
			border-radius: 999px;
			padding: 0.5rem 0.78rem;
			font-size: 0.78rem;
			box-shadow: 0 10px 28px rgba(0, 0, 0, 0.24);
		}

		.toast-msg[hidden] {
			display: none;
		}

		@media (max-width: 640px) {
			.dialog-actions button {
				flex: 1 1 100%;
			}
		}
	</style>
</head>
<body>
	<div class="vista-app">
		<header class="vista-header">
			<a class="btn-volver" href="../index.html" target="_top" aria-label="Volver al inicio" id="btnVolverCabecera">
				<img src="../iconos/volver.png" alt="Volver" />
			</a>
			<h1>NUESTRAS RECETAS</h1>
			<div class="header-espaciador" aria-hidden="true"></div>
		</header>

		<main class="vista-contenido">
			<div class="recetas-fixed">
				<section class="recetas-intro" aria-label="Presentacion recetas">
					<p>Aqui tenemos las recetas que hemos realizado en nuestros encuentros rurales, evidentemente siempre se pueden introducir mas, ANIMATE.</p>
					<div>
						<button id="btnNuevaReceta" class="btn-nueva-receta" type="button">+ NUEVA RECETA</button>
					</div>
				</section>

				<section class="recetas-search" aria-label="Buscador de recetas">
					<input id="inputBuscarReceta" class="search-input" type="search" placeholder="Busca por nombre, ingrediente o elaboracion..." />
				</section>
			</div>

			<section id="emptyRecetas" class="recetas-empty" hidden>
				<strong>No hay recetas aun</strong>
				<div>Empieza creando la primera receta del encuentro.</div>
			</section>

			<section id="recetasGrid" class="recetas-grid" aria-label="Tarjetas de recetas"></section>
		</main>
	</div>

	<div id="modalNuevaReceta" class="open-overlay" hidden>
		<div class="dialog" role="dialog" aria-modal="true" aria-label="Crear o editar receta">
			<h2 id="tituloModalReceta">NUEVA RECETA</h2>
			<div class="form-grid">
				<div class="field-block">
					<span class="field-label">Imagen de la receta</span>
					<input id="inputImagenReceta" class="field-input" type="file" accept="image/*" />
					<img id="previewImagenReceta" class="img-preview" src="" alt="Previsualizacion receta" hidden />
				</div>

				<label class="field-block">
					<span class="field-label">Nombre de la receta</span>
					<input id="inputNombreReceta" class="field-input" type="text" maxlength="90" placeholder="Ej: Migas serranas" />
				</label>

				<label class="field-block">
					<span class="field-label">Ingredientes (uno por linea)</span>
					<textarea id="inputIngredientesReceta" class="field-textarea" maxlength="1600" placeholder="Pan duro\nAceite de oliva\nAjo\nPimiento"></textarea>
				</label>

				<label class="field-block">
					<span class="field-label">Elaboracion</span>
					<textarea id="inputElaboracionReceta" class="field-textarea" maxlength="4000" placeholder="Explica la preparacion paso a paso..."></textarea>
				</label>
			</div>

			<div class="dialog-actions">
				<button id="btnCancelarReceta" type="button" class="btn-secundario">Cancelar</button>
				<button id="btnGuardarReceta" type="button" class="btn-principal">Guardar receta</button>
			</div>
		</div>
	</div>

	<div id="modalDetalleReceta" class="open-overlay" hidden>
		<div class="dialog" role="dialog" aria-modal="true" aria-label="Detalle de receta">
			<div class="detalle-shell">
				<div id="detalleMediaReceta" class="detalle-media"></div>

				<div class="detalle-box">
					<h3>Ingredientes</h3>
					<ul id="detalleIngredientesReceta" class="ingredientes-lista"></ul>
				</div>

				<div class="detalle-box">
					<h3>Elaboracion</h3>
					<p id="detalleElaboracionReceta" class="elaboracion-texto"></p>
				</div>
			</div>

			<div class="dialog-actions">
				<button id="btnCerrarDetalleReceta" type="button" class="btn-principal">Cerrar</button>
			</div>
		</div>
	</div>

	<div id="toastMsg" class="toast-msg" hidden></div>

	<script>
	(function () {
		var STORAGE_KEY = 'carorur_recetas_local_v1';
		var btnVolverCabecera = document.getElementById('btnVolverCabecera');
		var btnNuevaReceta = document.getElementById('btnNuevaReceta');
		var inputBuscarReceta = document.getElementById('inputBuscarReceta');
		var emptyRecetas = document.getElementById('emptyRecetas');
		var recetasGrid = document.getElementById('recetasGrid');
		var modalNuevaReceta = document.getElementById('modalNuevaReceta');
		var tituloModalReceta = document.getElementById('tituloModalReceta');
		var inputImagenReceta = document.getElementById('inputImagenReceta');
		var previewImagenReceta = document.getElementById('previewImagenReceta');
		var inputNombreReceta = document.getElementById('inputNombreReceta');
		var inputIngredientesReceta = document.getElementById('inputIngredientesReceta');
		var inputElaboracionReceta = document.getElementById('inputElaboracionReceta');
		var btnCancelarReceta = document.getElementById('btnCancelarReceta');
		var btnGuardarReceta = document.getElementById('btnGuardarReceta');
		var modalDetalleReceta = document.getElementById('modalDetalleReceta');
		var detalleMediaReceta = document.getElementById('detalleMediaReceta');
		var detalleIngredientesReceta = document.getElementById('detalleIngredientesReceta');
		var detalleElaboracionReceta = document.getElementById('detalleElaboracionReceta');
		var btnCerrarDetalleReceta = document.getElementById('btnCerrarDetalleReceta');
		var toastMsg = document.getElementById('toastMsg');

		var recetas = [];
		var recetaActivaId = '';
		var editandoRecetaId = '';
		var imagenTemporalDataUrl = '';
		if (!btnVolverCabecera) return;

		function uid() {
			return 'REC_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
		}

		function showToast(message) {
			toastMsg.textContent = String(message || '');
			toastMsg.hidden = false;
			window.clearTimeout(showToast.timer);
			showToast.timer = window.setTimeout(function () {
				toastMsg.hidden = true;
			}, 2200);
		}

		function escHtml(value) {
			return String(value || '')
				.replace(/&/g, '&amp;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;')
				.replace(/"/g, '&quot;');
		}

		function normalizeText(value) {
			return String(value || '')
				.toLowerCase()
				.normalize('NFD')
				.replace(/[\u0300-\u036f]/g, '')
				.trim();
		}

		function humanDate(value) {
			var date = new Date(value || Date.now());
			return date.toLocaleDateString('es-ES', {
				day: '2-digit',
				month: '2-digit',
				year: 'numeric'
			}) + ' · ' + date.toLocaleTimeString('es-ES', {
				hour: '2-digit',
				minute: '2-digit'
			});
		}

		function parseIngredientes(texto) {
			return String(texto || '')
				.split(/\n|,/)
				.map(function (item) { return item.trim(); })
				.filter(function (item) { return !!item; });
		}

		function iconoIngrediente(nombre) {
			var n = normalizeText(nombre);
			if (/tomate|pimiento|zanahoria|cebolla|lechuga|ajo|patata/.test(n)) return '🥕';
			if (/carne|pollo|ternera|cerdo|jamon|chorizo/.test(n)) return '🍖';
			if (/pescado|atun|salmon|merluza|marisco/.test(n)) return '🐟';
			if (/arroz|pasta|fideo|trigo|pan|harina/.test(n)) return '🌾';
			if (/huevo/.test(n)) return '🥚';
			if (/leche|queso|nata|yogur|mantequilla/.test(n)) return '🧀';
			if (/aceite|vinagre|sal|pimienta|pimenton|comino|oregano/.test(n)) return '🧂';
			if (/limon|naranja|manzana|fruta/.test(n)) return '🍋';
			return '🍽️';
		}

		function saveRecetasLocal() {
			try {
				localStorage.setItem(STORAGE_KEY, JSON.stringify(recetas));
			} catch (e) {
				showToast('No se pudo guardar en este dispositivo');
			}
		}

		function loadRecetasLocal() {
			try {
				var raw = localStorage.getItem(STORAGE_KEY);
				var arr = raw ? JSON.parse(raw) : [];
				recetas = Array.isArray(arr) ? arr : [];
			} catch (e) {
				recetas = [];
			}

			recetas.sort(function (a, b) {
				return new Date(b.updatedAt || 0).getTime() - new Date(a.updatedAt || 0).getTime();
			});
		}

		function filtrarRecetas() {
			var query = normalizeText(inputBuscarReceta.value);
			if (!query) return recetas.slice();

			var tokens = query.split(/\s+/).filter(function (t) { return !!t; });
			return recetas.filter(function (r) {
				var texto = normalizeText((r.nombre || '') + ' ' + (r.ingredientesTexto || '') + ' ' + (r.elaboracion || ''));
				return tokens.every(function (tok) {
					return texto.indexOf(tok) !== -1;
				});
			});
		}

		function renderCards() {
			recetasGrid.innerHTML = '';
			var visibles = filtrarRecetas();
			emptyRecetas.hidden = visibles.length > 0;

			visibles.forEach(function (item) {
				var card = document.createElement('article');
				card.className = 'receta-card';
				var ingredientes = parseIngredientes(item.ingredientesTexto).slice(0, 3).join(' · ');
				card.innerHTML = [
					'<div class="receta-thumb"><img src="' + escHtml(item.imagenDataUrl || '../imagenes/rustica-vista.svg') + '" alt="Imagen de receta" /></div>',
					'<div class="receta-meta">' + escHtml(humanDate(item.updatedAt || item.createdAt)) + '</div>',
					'<h2>' + escHtml(item.nombre || 'Receta') + '</h2>',
					'<p class="receta-desc">' + escHtml(ingredientes || 'Sin ingredientes') + '</p>',
					'<div class="receta-actions">' +
						'<button class="btn-secundario" type="button" data-role="edit">Editar</button>' +
						'<button class="btn-peligro" type="button" data-role="delete">Borrar</button>' +
					'</div>'
				].join('');

				card.addEventListener('click', function () {
					openDetailModal(item.id);
				});

				card.querySelector('button[data-role="edit"]').addEventListener('click', function (ev) {
					ev.stopPropagation();
					openCreateModal(item.id);
				});

				card.querySelector('button[data-role="delete"]').addEventListener('click', function (ev) {
					ev.stopPropagation();
					deleteReceta(item.id);
				});

				recetasGrid.appendChild(card);
			});
		}

		function resetCreateForm() {
			editandoRecetaId = '';
			imagenTemporalDataUrl = '';
			inputImagenReceta.value = '';
			inputNombreReceta.value = '';
			inputIngredientesReceta.value = '';
			inputElaboracionReceta.value = '';
			previewImagenReceta.src = '';
			previewImagenReceta.hidden = true;
			tituloModalReceta.textContent = 'NUEVA RECETA';
		}

		function openCreateModal(id) {
			resetCreateForm();
			if (id) {
				var receta = recetas.find(function (r) { return r.id === id; });
				if (receta) {
					editandoRecetaId = id;
					imagenTemporalDataUrl = receta.imagenDataUrl || '';
					inputNombreReceta.value = receta.nombre || '';
					inputIngredientesReceta.value = receta.ingredientesTexto || '';
					inputElaboracionReceta.value = receta.elaboracion || '';
					if (imagenTemporalDataUrl) {
						previewImagenReceta.src = imagenTemporalDataUrl;
						previewImagenReceta.hidden = false;
					}
					tituloModalReceta.textContent = 'EDITAR RECETA';
				}
			}
			modalNuevaReceta.hidden = false;
		}

		function closeCreateModal() {
			modalNuevaReceta.hidden = true;
		}

		function openDetailModal(id) {
			var receta = recetas.find(function (r) { return r.id === id; });
			if (!receta) return;
			recetaActivaId = id;

			detalleMediaReceta.innerHTML = '<img src="' + escHtml(receta.imagenDataUrl || '../imagenes/rustica-vista.svg') + '" alt="Imagen de la receta" />';
			detalleIngredientesReceta.innerHTML = '';

			parseIngredientes(receta.ingredientesTexto).forEach(function (ingrediente) {
				var li = document.createElement('li');
				li.innerHTML = '<span class="ingrediente-icono">' + iconoIngrediente(ingrediente) + '</span><span>' + escHtml(ingrediente) + '</span>';
				detalleIngredientesReceta.appendChild(li);
			});

			detalleElaboracionReceta.textContent = receta.elaboracion || '';
			modalDetalleReceta.hidden = false;
		}

		function closeDetailModal() {
			recetaActivaId = '';
			modalDetalleReceta.hidden = true;
		}

		function fileToDataUrl(file) {
			return new Promise(function (resolve, reject) {
				var reader = new FileReader();
				reader.onload = function () {
					resolve(String(reader.result || ''));
				};
				reader.onerror = function () {
					reject(new Error('No se pudo leer la imagen'));
				};
				reader.readAsDataURL(file);
			});
		}

		async function saveReceta() {
			var nombre = String(inputNombreReceta.value || '').trim();
			var ingredientesTexto = String(inputIngredientesReceta.value || '').trim();
			var elaboracion = String(inputElaboracionReceta.value || '').trim();

			if (!nombre) {
				showToast('Escribe el nombre de la receta');
				inputNombreReceta.focus();
				return;
			}
			if (!ingredientesTexto) {
				showToast('Introduce ingredientes');
				inputIngredientesReceta.focus();
				return;
			}
			if (!elaboracion) {
				showToast('Introduce la elaboracion');
				inputElaboracionReceta.focus();
				return;
			}
			if (!imagenTemporalDataUrl && !editandoRecetaId) {
				showToast('Selecciona una imagen para la receta');
				return;
			}

			var nowIso = new Date().toISOString();
			if (editandoRecetaId) {
				recetas = recetas.map(function (item) {
					if (item.id !== editandoRecetaId) return item;
					return {
						id: item.id,
						nombre: nombre,
						ingredientesTexto: ingredientesTexto,
						elaboracion: elaboracion,
						imagenDataUrl: imagenTemporalDataUrl || item.imagenDataUrl || '',
						createdAt: item.createdAt || nowIso,
						updatedAt: nowIso
					};
				});
				showToast('Receta actualizada');
			} else {
				recetas.unshift({
					id: uid(),
					nombre: nombre,
					ingredientesTexto: ingredientesTexto,
					elaboracion: elaboracion,
					imagenDataUrl: imagenTemporalDataUrl,
					createdAt: nowIso,
					updatedAt: nowIso
				});
				showToast('Receta guardada');
			}

			saveRecetasLocal();
			closeCreateModal();
			renderCards();
		}

		function deleteReceta(id) {
			var receta = recetas.find(function (r) { return r.id === id; });
			if (!receta) return;

			var ok = window.confirm('Quieres borrar la receta "' + String(receta.nombre || '') + '"?');
			if (!ok) return;

			recetas = recetas.filter(function (item) { return item.id !== id; });
			saveRecetasLocal();
			renderCards();
			showToast('Receta borrada');
		}

		btnVolverCabecera.addEventListener('click', function (e) {
			e.preventDefault();
			try {
				if (window.top !== window && typeof window.top.carorurCloseVista === 'function') {
					window.top.carorurCloseVista();
				} else if (window.top !== window && window.top.postMessage) {
					window.top.postMessage('carorur:close-vista', '*');
				} else {
					window.location.href = '../index.html';
				}
			} catch (err) {
				window.location.href = '../index.html';
			}
		});

		btnNuevaReceta.addEventListener('click', function () {
			openCreateModal('');
		});

		btnCancelarReceta.addEventListener('click', closeCreateModal);
		btnGuardarReceta.addEventListener('click', function () {
			saveReceta().catch(function () {
				showToast('No se pudo guardar la receta');
			});
		});

		btnCerrarDetalleReceta.addEventListener('click', closeDetailModal);

		inputBuscarReceta.addEventListener('input', renderCards);

		inputImagenReceta.addEventListener('change', function () {
			var file = inputImagenReceta.files && inputImagenReceta.files[0];
			if (!file) return;
			if (String(file.type || '').indexOf('image/') !== 0) {
				showToast('Selecciona una imagen valida');
				inputImagenReceta.value = '';
				return;
			}

			fileToDataUrl(file)
				.then(function (dataUrl) {
					imagenTemporalDataUrl = dataUrl;
					previewImagenReceta.src = dataUrl;
					previewImagenReceta.hidden = false;
				})
				.catch(function () {
					showToast('No se pudo cargar la imagen');
				});
		});

		modalNuevaReceta.addEventListener('click', function (event) {
			if (event.target === modalNuevaReceta) closeCreateModal();
		});

		modalDetalleReceta.addEventListener('click', function (event) {
			if (event.target === modalDetalleReceta) closeDetailModal();
		});

		loadRecetasLocal();
		renderCards();
	})();
	</script>
</body>
</html>

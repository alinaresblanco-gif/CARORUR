<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NUESTRA MUSICA FAVORITA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="vistas.css" />
<style>
.vista-contenido {
  padding: 0.55rem !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
  min-height: 0;
}

.player-sticky {
  position: sticky;
  top: 0;
  z-index: 25;
  background: var(--papel-claro);
  border: 2px solid var(--papel-oscuro);
  border-radius: 14px;
  box-shadow: var(--sombra-papel);
  padding: 0.65rem;
}

.player-card {
  display: grid;
  grid-template-columns: 140px minmax(0, 1fr);
  align-items: center;
  gap: 0.75rem;
}

.vinyl-wrap {
  width: 132px;
  height: 132px;
  justify-self: center;
}

.vinyl-record {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background:
    radial-gradient(circle at center, transparent 28%, rgba(255,255,255,0.04) 29%, transparent 31%),
    radial-gradient(circle at center, transparent 35%, rgba(255,255,255,0.03) 36%, transparent 38%),
    radial-gradient(circle at center, transparent 42%, rgba(255,255,255,0.03) 43%, transparent 45%),
    radial-gradient(circle at center, transparent 49%, rgba(255,255,255,0.03) 50%, transparent 52%),
    radial-gradient(circle at center, transparent 56%, rgba(255,255,255,0.03) 57%, transparent 59%),
    linear-gradient(135deg, #2a1810 0%, #1a0f0a 50%, #2a1810 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: vinylSpin 5s linear infinite;
  animation-play-state: paused;
  box-shadow: 0 8px 24px rgba(0,0,0,0.42), inset 0 0 18px rgba(0,0,0,0.32);
}

.vinyl-record.spinning {
  animation-play-state: running;
}

.vinyl-center {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: var(--papel-medio);
  border: 3px solid #7a5230;
  display: flex;
  align-items: center;
  justify-content: center;
}

.vinyl-center-icon {
  font-size: 1.55rem;
}

@keyframes vinylSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.player-info {
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.song-info-title {
  margin: 0;
  max-width: 100%;
  font-family: 'Special Elite', cursive;
  font-size: 0.96rem;
  color: var(--tinta-rural);
  white-space: normal;
  overflow-wrap: anywhere;
  word-break: break-word;
  text-align: center;
  line-height: 1.28;
}

.song-info-artist {
  margin: 0.15rem 0 0;
  font-size: 0.82rem;
  color: var(--tinta-rural-suave);
}

.song-info-folder {
  margin: 0.18rem 0 0;
  font-size: 0.72rem;
  color: var(--tinta-rural-suave);
}

.player-actions {
  margin-top: 0.4rem;
  display: flex;
  flex-direction: column;
  width: 100%;
}

.player-actions .btn {
  width: 100%;
  white-space: normal;
  word-break: break-word;
  text-align: center;
  line-height: 1.35;
}

.player-audio-wrap {
  margin-top: 0.45rem;
  width: 100%;
  max-width: 520px;
}

.player-audio-wrap audio {
  width: 100%;
}

.player-controls {
  margin-top: 0.45rem;
  display: flex;
  justify-content: center;
  gap: 0.62rem;
}

.ctrl-btn {
  background: none;
  border: 2px solid var(--papel-oscuro);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  color: var(--tinta-rural);
  cursor: pointer;
}

.ctrl-btn.play-btn {
  width: 50px;
  height: 50px;
  background: var(--tinta-rural);
  color: var(--papel-claro);
  border-color: var(--tinta-rural);
}

.player-note {
  margin-top: 0.25rem;
  min-height: 1rem;
  font-size: 0.72rem;
  color: var(--tinta-rural-suave);
  text-align: center;
}

.queue-panel {
  padding: 0.65rem;
}

.queue-list {
  margin-top: 0.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.queue-item {
  border: 1px solid rgba(122,82,48,0.35);
  border-radius: 8px;
  background: #fff5de;
  color: var(--tinta-rural);
  padding: 0.42rem 0.5rem;
  width: 100%;
  text-align: left;
  cursor: pointer;
}

.queue-item.active {
  background: #5c3d1e;
  color: #fff;
}

.queue-title {
  font-size: 0.84rem;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.queue-sub {
  margin-top: 0.08rem;
  font-size: 0.72rem;
  opacity: 0.86;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.btn {
  border: 2px solid var(--papel-oscuro);
  border-radius: 9px;
  background: #f3dfb5;
  color: var(--tinta-rural);
  font-family: 'Special Elite', cursive;
  font-size: 0.7rem;
  padding: 0.48rem 0.55rem;
  cursor: pointer;
}

.btn:hover {
  background: #ecd29f;
}

.panel {
  background: var(--papel-claro);
  border: 2px solid var(--papel-oscuro);
  border-radius: 14px;
  box-shadow: var(--sombra-papel);
  min-width: 0;
}

.empty-state {
  text-align: center;
  padding: 1.1rem 0.65rem;
  color: var(--tinta-rural-suave);
}

.embed-panel {
  padding: 0.65rem;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
}

.panel-title {
  margin: 0;
  font-family: 'Special Elite', cursive;
  font-size: 0.84rem;
  letter-spacing: 0.08em;
  color: var(--tinta-rural);
}

.embed-form {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0.38rem;
}

.embed-input {
  width: 100%;
  border: 1.5px solid rgba(122,82,48,0.45);
  border-radius: 8px;
  padding: 0.44rem 0.5rem;
  font-size: 0.82rem;
  background: #fff9eb;
  color: var(--tinta-rural);
}

.embed-actions {
  display: flex;
  gap: 0.35rem;
  flex-wrap: wrap;
}

.embed-list {
  display: flex;
  flex-direction: column;
  gap: 0.34rem;
}

.embed-item {
  border: 1px solid rgba(122,82,48,0.35);
  border-radius: 8px;
  background: #fff5de;
  padding: 0.42rem 0.5rem;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 0.36rem;
  align-items: center;
}

.embed-item.active {
  background: #5c3d1e;
  color: #fff;
}

.embed-main {
  min-width: 0;
}

.embed-title {
  font-size: 0.84rem;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.embed-sub {
  font-size: 0.72rem;
  opacity: 0.86;
  margin-top: 0.1rem;
  display: flex;
  align-items: center;
  gap: 0.34rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.provider-icon {
  width: 1.45rem;
  height: 1.45rem;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.56rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: #fff;
  flex: 0 0 auto;
}

.provider-youtube { background: #d62929; }
.provider-spotify { background: #1db954; color: #0b2f1a; }
.provider-soundcloud { background: #ff7a18; }
.provider-mixcloud { background: #3c5ccf; }
.provider-deezer { background: #ef2d84; }
.provider-apple { background: #333; }
.provider-bandcamp { background: #0a6ea8; }
.provider-embed { background: #7a5230; }
.provider-generic { background: #7a5230; }

.embed-item.active .provider-icon {
  background: rgba(255,255,255,0.2);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.45);
}

.embed-item-actions {
  display: flex;
  gap: 0.28rem;
}

.mini-btn {
  border: 1px solid rgba(122,82,48,0.5);
  border-radius: 6px;
  background: #f8e8c3;
  color: var(--tinta-rural);
  font-size: 0.72rem;
  cursor: pointer;
  padding: 0.23rem 0.36rem;
  min-width: 56px;
}

.embed-viewer {
  border: 1px solid rgba(122,82,48,0.35);
  border-radius: 10px;
  background: #f8eed7;
  padding: 0.4rem;
  min-height: 220px;
}

.embed-empty {
  min-height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--tinta-rural-suave);
  font-size: 0.78rem;
}

.embed-frame {
  width: 100%;
  height: 230px;
  border: none;
  border-radius: 8px;
  background: #000;
}

@media (min-width: 960px) {
  .embed-frame {
    height: 280px;
  }
}

@media (max-width: 640px) {
  .player-card {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="vista-app">
  <header class="vista-header">
    <a class="btn-volver" href="../index.html" target="_top" aria-label="Volver al inicio" id="btnVolverCabecera">
      <img src="../iconos/volver.png" alt="Volver" />
    </a>
    <h1>NUESTRA MUSICA FAVORITA</h1>
    <div class="header-espaciador" aria-hidden="true"></div>
  </header>

  <main class="vista-contenido">
    <section class="player-sticky" aria-label="Reproductor">
      <div class="player-card">
        <div class="vinyl-wrap">
          <div class="vinyl-record" id="vinylRecord">
            <div class="vinyl-center">
              <span class="vinyl-center-icon">&#127925;</span>
            </div>
          </div>
        </div>

        <div class="player-info">
          <p class="song-info-title" id="songTitle">Selecciona musica del dispositivo</p>
          <p class="song-info-artist" id="songArtist">&#8212;</p>
          <p class="song-info-folder" id="songFolder">Origen: dispositivo</p>

          <div class="player-actions">
            <button class="btn" id="btnPickDeviceMusic">Buscar musica en mi movil</button>
          </div>

          <div class="player-audio-wrap">
            <audio id="playerAudio" controls preload="metadata"></audio>
          </div>

          <div class="player-controls">
            <button class="ctrl-btn" id="btnPrev" aria-label="Anterior">&#9198;</button>
            <button class="ctrl-btn play-btn" id="btnPlayPause" aria-label="Reproducir">&#9654;</button>
            <button class="ctrl-btn" id="btnNext" aria-label="Siguiente">&#9197;</button>
          </div>

          <div class="player-note" id="playerNote">No se guarda nada: solo se reproduce lo que elijas desde tu movil.</div>
        </div>
      </div>
    </section>

    <section class="panel queue-panel" aria-label="Cola local">
      <h2 class="panel-title">COLA LOCAL ACTUAL</h2>
      <div class="queue-list" id="deviceQueueList">
        <div class="empty-state">Todavia no has seleccionado canciones.</div>
      </div>
    </section>

    <section class="panel embed-panel" aria-label="Listas por URL">
      <h2 class="panel-title">LISTAS POR URL (EMBED)</h2>

      <div class="embed-form">
        <input class="embed-input" id="embedUrlInput" type="url" placeholder="Pega URL de YouTube/Spotify/SoundCloud/etc" />
        <input class="embed-input" id="embedTitleInput" type="text" maxlength="90" placeholder="Titulo opcional" />
        <div class="embed-actions">
          <button class="btn" id="btnAddEmbed">+ Guardar URL</button>
          <button class="btn" id="btnCloseEmbed">Cerrar visor</button>
        </div>
      </div>

      <div class="embed-list" id="embedList"></div>

      <div class="embed-viewer">
        <div class="embed-empty" id="embedEmpty">Guarda una URL compatible y pulsa "Abrir".</div>
        <iframe class="embed-frame" id="embedFrame" title="Reproductor embed" allow="autoplay; encrypted-media; clipboard-write; picture-in-picture; web-share" allowfullscreen hidden></iframe>
      </div>
    </section>
  </main>
</div>

<input type="file" id="inputAudioFiles" accept="audio/*" multiple hidden />

<script>
(function () {
  var LS_EMBED_KEY = 'carorur_music_embeds_v1';
  var isNativeAndroid = !!(window.CarorurNativeMusic && typeof window.CarorurNativeMusic.pickAudioFiles === 'function');

  var deviceState = {
    songs: [],
    currentIndex: -1
  };

  var embedState = {
    items: [],
    currentId: null
  };

  var volatileFileStore = {};
  var playbackUrl = null;

  var btnVolverCabecera = document.getElementById('btnVolverCabecera');
  var btnPickDeviceMusic = document.getElementById('btnPickDeviceMusic');
  var songTitle = document.getElementById('songTitle');
  var songArtist = document.getElementById('songArtist');
  var songFolder = document.getElementById('songFolder');
  var playerNote = document.getElementById('playerNote');
  var vinylRecord = document.getElementById('vinylRecord');
  var playerAudio = document.getElementById('playerAudio');
  var btnPlayPause = document.getElementById('btnPlayPause');
  var btnPrev = document.getElementById('btnPrev');
  var btnNext = document.getElementById('btnNext');
  var inputAudioFiles = document.getElementById('inputAudioFiles');
  var embedUrlInput = document.getElementById('embedUrlInput');
  var embedTitleInput = document.getElementById('embedTitleInput');
  var btnAddEmbed = document.getElementById('btnAddEmbed');
  var btnCloseEmbed = document.getElementById('btnCloseEmbed');
  var embedList = document.getElementById('embedList');
  var embedFrame = document.getElementById('embedFrame');
  var embedEmpty = document.getElementById('embedEmpty');
  var deviceQueueList = document.getElementById('deviceQueueList');

  function uid(prefix) {
    return prefix + '_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
  }

  function escHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escAttr(value) {
    return escHtml(value).replace(/'/g, '&#39;');
  }

  function parseUrl(input) {
    try {
      return new URL(String(input || '').trim());
    } catch (e) {
      return null;
    }
  }

  function releasePlaybackUrl() {
    if (!playbackUrl) return;
    try {
      URL.revokeObjectURL(playbackUrl);
    } catch (e) {
    }
    playbackUrl = null;
  }

  function cleanName(name) {
    return String(name || '').trim().replace(/\s+/g, ' ');
  }

  function parseSongMetaFromName(name) {
    var baseName = String(name || 'Cancion').replace(/\.[^.]+$/, '');
    var title = baseName;
    var artist = '';
    if (baseName.indexOf(' - ') !== -1) {
      var parts = baseName.split(' - ');
      artist = parts.shift();
      title = parts.join(' - ');
    }
    return {
      title: cleanName(title) || 'Cancion local',
      artist: cleanName(artist) || 'Artista local'
    };
  }

  function renderPlayerInfo(song) {
    if (!song) {
      songTitle.textContent = 'Selecciona musica del dispositivo';
      songArtist.textContent = '\u2014';
      songFolder.textContent = 'Origen: dispositivo';
      return;
    }
    songTitle.textContent = song.title;
    songArtist.textContent = song.artist;
    songFolder.textContent = 'Cola local: ' + (deviceState.currentIndex + 1) + ' / ' + deviceState.songs.length;
  }

  function renderDeviceQueue() {
    var existingItems = deviceQueueList.querySelectorAll('[data-queue-index]');

    // Si la lista no cambio, solo actualizar la clase active sin reconstruir el DOM
    if (existingItems.length === deviceState.songs.length && deviceState.songs.length > 0) {
      for (var i = 0; i < existingItems.length; i++) {
        if (i === deviceState.currentIndex) {
          existingItems[i].classList.add('active');
        } else {
          existingItems[i].classList.remove('active');
        }
      }
      return;
    }

    deviceQueueList.innerHTML = '';

    if (!deviceState.songs.length) {
      deviceQueueList.innerHTML = '<div class="empty-state">Todavia no has seleccionado canciones.</div>';
      return;
    }

    var frag = document.createDocumentFragment();
    deviceState.songs.forEach(function (song, index) {
      var row = document.createElement('button');
      row.type = 'button';
      row.className = 'queue-item' + (index === deviceState.currentIndex ? ' active' : '');
      row.setAttribute('data-queue-index', String(index));
      row.innerHTML =
        '<div class="queue-title">' + escHtml(String(index + 1) + '. ' + song.title) + '</div>' +
        '<div class="queue-sub">' + escHtml(song.artist) + '</div>';
      frag.appendChild(row);
    });
    deviceQueueList.appendChild(frag);
  }

  function stopPlayer() {
    playerAudio.pause();
    playerAudio.removeAttribute('src');
    playerAudio.load();
    releasePlaybackUrl();
    vinylRecord.classList.remove('spinning');
    btnPlayPause.innerHTML = '&#9654;';
  }

  function setDeviceSongs(songs) {
    stopPlayer();
    deviceState.songs = songs;
    deviceState.currentIndex = songs.length ? 0 : -1;
    renderPlayerInfo(deviceState.currentIndex >= 0 ? deviceState.songs[deviceState.currentIndex] : null);
    renderDeviceQueue();
  }

  function closeEmbedViewer() {
    embedState.currentId = null;
    embedFrame.setAttribute('hidden', 'hidden');
    embedFrame.src = '';
    embedEmpty.removeAttribute('hidden');
    saveEmbeds();
    renderEmbedList();
  }

  function playSongByIndex(index, options) {
    options = options || {};
    var isAutoAdvance = !!options.isAutoAdvance;

    if (index < 0 || index >= deviceState.songs.length) return Promise.resolve();
    var song = deviceState.songs[index];
    if (!song) return Promise.resolve();

    if (embedState.currentId) {
      closeEmbedViewer();
    }

    var src = null;
    if (song.sourceType === 'native-uri') {
      src = song.contentUri || null;
      releasePlaybackUrl();
    } else {
      var f = volatileFileStore[song.id];
      if (!f) {
        playerNote.textContent = 'No se encontro el archivo seleccionado.';
        return Promise.resolve();
      }
      releasePlaybackUrl();
      src = URL.createObjectURL(f);
      playbackUrl = src;
    }

    if (!src) {
      playerNote.textContent = 'No se pudo cargar esta cancion.';
      return Promise.resolve();
    }

    deviceState.currentIndex = index;
    renderPlayerInfo(song);
    renderDeviceQueue();
    playerAudio.src = src;

    return playerAudio.play().then(function () {
      playerNote.textContent = 'Reproduciendo desde el dispositivo.';
    }).catch(function (err) {
      if (!isAutoAdvance) {
        playerNote.textContent = 'Pulsa Play para iniciar la reproduccion.';
      }
      return Promise.reject(err);
    });
  }

  function playRelative(offset) {
    if (!deviceState.songs.length) return Promise.resolve();
    var current = deviceState.currentIndex;
    if (current < 0) current = 0;
    var next = (current + offset + deviceState.songs.length) % deviceState.songs.length;
    return playSongByIndex(next, { isAutoAdvance: true });
  }

  function loadSongsFromFiles(fileList) {
    volatileFileStore = {};
    var files = Array.prototype.slice.call(fileList || []).filter(function (file) {
      return /^audio\//i.test(file.type || 'audio/unknown');
    });

    if (!files.length) {
      playerNote.textContent = 'No se detectaron audios validos.';
      return;
    }

    var songs = [];
    files.forEach(function (file) {
      var id = uid('SG');
      volatileFileStore[id] = file;
      var meta = parseSongMetaFromName(file.name);
      songs.push({
        id: id,
        title: meta.title,
        artist: meta.artist,
        sourceType: 'volatile-file'
      });
    });

    setDeviceSongs(songs);
    playerNote.textContent = 'Listo: ' + songs.length + ' canciones listas (sin guardar en memoria persistente).';
    playSongByIndex(0).catch(function () {
      playerNote.textContent = 'Canciones cargadas. Pulsa Play para empezar.';
    });
  }

  function pickNativeFiles() {
    if (!isNativeAndroid) return false;
    try {
      window.CarorurNativeMusic.pickAudioFiles();
      playerNote.textContent = 'Abriendo selector de musica del movil...';
      return true;
    } catch (e) {
      playerNote.textContent = 'No se pudo abrir el selector nativo.';
      return false;
    }
  }

  window.__carorurNativeMusicReceive = function (rawPayload) {
    volatileFileStore = {};
    var payload;
    try {
      payload = typeof rawPayload === 'string' ? JSON.parse(rawPayload) : rawPayload;
    } catch (e) {
      playerNote.textContent = 'Respuesta nativa invalida.';
      return;
    }

    if (!payload || !payload.ok) {
      if (payload && payload.cancelled) {
        playerNote.textContent = 'Seleccion cancelada.';
      } else {
        playerNote.textContent = (payload && payload.error) ? payload.error : 'Error leyendo canciones del movil.';
      }
      return;
    }

    var files = Array.isArray(payload.files) ? payload.files : [];
    if (!files.length) {
      playerNote.textContent = 'No llegaron canciones desde el selector nativo.';
      return;
    }

    var songs = [];
    files.forEach(function (it) {
      var uri = String((it && it.uri) || '');
      if (!uri) return;
      var name = String((it && it.name) || 'Cancion local');
      var meta = parseSongMetaFromName(name);
      songs.push({
        id: uid('SG'),
        title: meta.title,
        artist: meta.artist,
        sourceType: 'native-uri',
        contentUri: uri
      });
    });

    if (!songs.length) {
      playerNote.textContent = 'La seleccion no incluye audios reproducibles.';
      return;
    }

    setDeviceSongs(songs);
    playerNote.textContent = 'Listo: ' + songs.length + ' canciones seleccionadas desde tu movil.';
    playSongByIndex(0).catch(function () {
      playerNote.textContent = 'Canciones preparadas. Pulsa Play para empezar.';
    });
  };

  function detachTopNativeReceiver() {
    try {
      if (window.top && window.top !== window && window.top.__carorurNativeMusicReceive === window.__carorurNativeMusicReceive) {
        delete window.top.__carorurNativeMusicReceive;
      }
    } catch (e) {
    }
  }

  function teardownPlaylistView() {
    stopPlayer();
    volatileFileStore = {};
    deviceState.songs = [];
    deviceState.currentIndex = -1;
    inputAudioFiles.value = '';
    embedFrame.src = 'about:blank';
    detachTopNativeReceiver();
  }

  function saveEmbeds() {
    try {
      localStorage.setItem(LS_EMBED_KEY, JSON.stringify(embedState));
    } catch (e) {
      playerNote.textContent = 'No se pudo guardar la lista de URLs embed.';
    }
  }

  function loadEmbeds() {
    try {
      var raw = localStorage.getItem(LS_EMBED_KEY);
      if (!raw) return;
      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object') return;
      embedState.items = Array.isArray(parsed.items) ? parsed.items : [];
      embedState.currentId = parsed.currentId || null;
    } catch (e) {
      embedState = { items: [], currentId: null };
    }
  }

  function providerLabel(provider) {
    var p = String(provider || '').toLowerCase();
    if (p === 'youtube') return 'YouTube';
    if (p === 'spotify') return 'Spotify';
    if (p === 'soundcloud') return 'SoundCloud';
    if (p === 'mixcloud') return 'Mixcloud';
    if (p === 'deezer') return 'Deezer';
    if (p === 'apple') return 'Apple Music';
    if (p === 'bandcamp') return 'Bandcamp';
    if (p === 'embed') return 'Embed directo';
    return 'Proveedor';
  }

  function providerIconClass(provider) {
    var p = String(provider || '').toLowerCase();
    if (p === 'youtube') return 'provider-youtube';
    if (p === 'spotify') return 'provider-spotify';
    if (p === 'soundcloud') return 'provider-soundcloud';
    if (p === 'mixcloud') return 'provider-mixcloud';
    if (p === 'deezer') return 'provider-deezer';
    if (p === 'apple') return 'provider-apple';
    if (p === 'bandcamp') return 'provider-bandcamp';
    if (p === 'embed') return 'provider-embed';
    return 'provider-generic';
  }

  function providerIconText(provider) {
    var p = String(provider || '').toLowerCase();
    if (p === 'youtube') return 'YT';
    if (p === 'spotify') return 'SP';
    if (p === 'soundcloud') return 'SC';
    if (p === 'mixcloud') return 'MX';
    if (p === 'deezer') return 'DZ';
    if (p === 'apple') return 'AM';
    if (p === 'bandcamp') return 'BC';
    if (p === 'embed') return 'EM';
    return 'MU';
  }

  function normalizeEmbedUrl(raw) {
    var url = parseUrl(raw);
    if (!url) {
      return { ok: false, error: 'URL no valida.' };
    }

    var host = url.hostname.toLowerCase().replace(/^www\./, '');
    var pathname = url.pathname || '/';

    if (host === 'youtu.be') {
      var shortId = pathname.replace(/^\//, '').split('/')[0];
      if (!shortId) return { ok: false, error: 'No se encontro ID de YouTube.' };
      return {
        ok: true,
        provider: 'youtube',
        embedUrl: 'https://www.youtube.com/embed/' + encodeURIComponent(shortId),
        titleGuess: 'YouTube'
      };
    }

    if (host.indexOf('youtube.com') !== -1 || host.indexOf('music.youtube.com') !== -1) {
      var listId = url.searchParams.get('list');
      var videoId = url.searchParams.get('v');
      if (pathname.indexOf('/embed/') === 0) {
        return { ok: true, provider: 'youtube', embedUrl: url.toString(), titleGuess: 'YouTube embed' };
      }
      if (listId && !videoId) {
        return {
          ok: true,
          provider: 'youtube',
          embedUrl: 'https://www.youtube.com/embed/videoseries?list=' + encodeURIComponent(listId),
          titleGuess: 'YouTube playlist'
        };
      }
      if (videoId && listId) {
        return {
          ok: true,
          provider: 'youtube',
          embedUrl: 'https://www.youtube.com/embed/' + encodeURIComponent(videoId) + '?list=' + encodeURIComponent(listId),
          titleGuess: 'YouTube'
        };
      }
      if (videoId) {
        return {
          ok: true,
          provider: 'youtube',
          embedUrl: 'https://www.youtube.com/embed/' + encodeURIComponent(videoId),
          titleGuess: 'YouTube'
        };
      }
      return { ok: false, error: 'URL de YouTube sin video o playlist.' };
    }

    if (host.indexOf('spotify.com') !== -1) {
      if (pathname.indexOf('/embed/') === 0) {
        return { ok: true, provider: 'spotify', embedUrl: url.toString(), titleGuess: 'Spotify embed' };
      }
      var sp = pathname.split('/').filter(Boolean);
      if (sp.length >= 2) {
        var type = sp[0];
        var id = sp[1];
        if (type === 'playlist' || type === 'track' || type === 'album' || type === 'episode' || type === 'show') {
          return {
            ok: true,
            provider: 'spotify',
            embedUrl: 'https://open.spotify.com/embed/' + type + '/' + encodeURIComponent(id),
            titleGuess: 'Spotify ' + type
          };
        }
      }
      return { ok: false, error: 'URL de Spotify no compatible para embed.' };
    }

    if (host.indexOf('soundcloud.com') !== -1) {
      return {
        ok: true,
        provider: 'soundcloud',
        embedUrl: 'https://w.soundcloud.com/player/?url=' + encodeURIComponent(url.toString()),
        titleGuess: 'SoundCloud'
      };
    }

    if (host.indexOf('mixcloud.com') !== -1) {
      var feedPath = pathname;
      if (!feedPath.endsWith('/')) feedPath += '/';
      return {
        ok: true,
        provider: 'mixcloud',
        embedUrl: 'https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=' + encodeURIComponent(feedPath),
        titleGuess: 'Mixcloud'
      };
    }

    if (host.indexOf('deezer.com') !== -1) {
      var dz = pathname.split('/').filter(Boolean);
      var targetType = null;
      var targetId = null;
      for (var i = 0; i < dz.length; i++) {
        if (dz[i] === 'playlist' || dz[i] === 'album' || dz[i] === 'track') {
          targetType = dz[i];
          targetId = dz[i + 1] || null;
          break;
        }
      }
      if (targetType && targetId) {
        return {
          ok: true,
          provider: 'deezer',
          embedUrl: 'https://widget.deezer.com/widget/auto/' + targetType + '/' + encodeURIComponent(targetId),
          titleGuess: 'Deezer ' + targetType
        };
      }
      return { ok: false, error: 'URL de Deezer no compatible para embed.' };
    }

    if (host.indexOf('music.apple.com') !== -1 || host.indexOf('embed.music.apple.com') !== -1) {
      if (host.indexOf('embed.music.apple.com') !== -1) {
        return { ok: true, provider: 'apple', embedUrl: url.toString(), titleGuess: 'Apple Music' };
      }
      return {
        ok: true,
        provider: 'apple',
        embedUrl: 'https://embed.music.apple.com' + pathname + (url.search || ''),
        titleGuess: 'Apple Music'
      };
    }

    if (host.indexOf('bandcamp.com') !== -1) {
      if (pathname.toLowerCase().indexOf('/embeddedplayer/') !== -1) {
        return { ok: true, provider: 'bandcamp', embedUrl: url.toString(), titleGuess: 'Bandcamp' };
      }
      return { ok: false, error: 'En Bandcamp pega directamente la URL EmbeddedPlayer.' };
    }

    if (pathname.toLowerCase().indexOf('/embed') !== -1 || host.indexOf('w.soundcloud.com') !== -1) {
      return { ok: true, provider: 'embed', embedUrl: url.toString(), titleGuess: 'Embed' };
    }

    return { ok: false, error: 'Servidor no soportado. Usa YouTube, Spotify, SoundCloud, Mixcloud, Deezer, Apple o embed directo.' };
  }

  function renderEmbedList() {
    embedList.innerHTML = '';
    if (!embedState.items.length) {
      embedList.innerHTML = '<div class="empty-state">Aun no hay URLs embed guardadas.</div>';
      return;
    }

    embedState.items.forEach(function (item) {
      var provider = providerLabel(item.provider);
      var iconClass = providerIconClass(item.provider);
      var iconText = providerIconText(item.provider);
      var row = document.createElement('div');
      row.className = 'embed-item' + (item.id === embedState.currentId ? ' active' : '');
      row.innerHTML =
        '<div class="embed-main">' +
          '<div class="embed-title">' + escHtml(item.title) + '</div>' +
          '<div class="embed-sub">' +
            '<span class="provider-icon ' + escAttr(iconClass) + '" aria-hidden="true">' + escHtml(iconText) + '</span>' +
            '<span>' + escHtml(provider) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="embed-item-actions">' +
          '<button class="mini-btn" type="button" data-role="open" data-id="' + escAttr(item.id) + '">Abrir</button>' +
          '<button class="mini-btn" type="button" data-role="remove" data-id="' + escAttr(item.id) + '">Quitar</button>' +
        '</div>';
      embedList.appendChild(row);
    });
  }

  function openEmbedById(id) {
    var item = embedState.items.find(function (it) { return it.id === id; });
    if (!item) return;

    playerAudio.pause();
    vinylRecord.classList.remove('spinning');
    btnPlayPause.innerHTML = '&#9654;';

    embedState.currentId = id;
    embedFrame.src = item.embedUrl;
    embedFrame.removeAttribute('hidden');
    embedEmpty.setAttribute('hidden', 'hidden');
    saveEmbeds();
    renderEmbedList();
    playerNote.textContent = 'Abriendo embed de ' + providerLabel(item.provider) + '.';
  }

  function removeEmbedById(id) {
    var item = embedState.items.find(function (it) { return it.id === id; });
    if (!item) return;
    var ok = window.confirm('Quitar URL guardada "' + item.title + '"?');
    if (!ok) return;

    embedState.items = embedState.items.filter(function (it) { return it.id !== id; });
    if (embedState.currentId === id) {
      closeEmbedViewer();
    } else {
      saveEmbeds();
      renderEmbedList();
    }
  }

  function addEmbedFromInput() {
    var rawUrl = String(embedUrlInput.value || '').trim();
    if (!rawUrl) {
      playerNote.textContent = 'Pega una URL para guardarla.';
      return;
    }

    var parsed = normalizeEmbedUrl(rawUrl);
    if (!parsed.ok) {
      playerNote.textContent = parsed.error;
      return;
    }

    var customTitle = String(embedTitleInput.value || '').trim();
    var title = customTitle || parsed.titleGuess || providerLabel(parsed.provider);
    var exists = embedState.items.find(function (it) { return it.embedUrl === parsed.embedUrl; });
    if (exists) {
      playerNote.textContent = 'Esa URL ya esta guardada.';
      openEmbedById(exists.id);
      return;
    }

    var item = {
      id: uid('EMB'),
      title: title,
      provider: parsed.provider,
      embedUrl: parsed.embedUrl,
      createdAt: Date.now()
    };

    embedState.items.unshift(item);
    if (embedState.items.length > 60) {
      embedState.items = embedState.items.slice(0, 60);
    }
    saveEmbeds();
    renderEmbedList();
    openEmbedById(item.id);
    embedUrlInput.value = '';
    embedTitleInput.value = '';
  }

  btnVolverCabecera.addEventListener('click', function (e) {
    e.preventDefault();
    try {
      if (window.top !== window && typeof window.top.carorurCloseVista === 'function') {
        window.top.carorurCloseVista();
      } else if (window.top !== window && window.top.postMessage) {
        window.top.postMessage('carorur:close-vista', '*');
      } else {
        window.location.href = '../index.html';
      }
    } catch (err) {
      window.location.href = '../index.html';
    }
  });

  btnPickDeviceMusic.addEventListener('click', function () {
    if (pickNativeFiles()) return;
    inputAudioFiles.value = '';
    inputAudioFiles.click();
  });

  inputAudioFiles.addEventListener('change', function () {
    loadSongsFromFiles(inputAudioFiles.files);
  });

  btnAddEmbed.addEventListener('click', function () {
    addEmbedFromInput();
  });

  embedUrlInput.addEventListener('keydown', function (event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      addEmbedFromInput();
    }
  });

  embedTitleInput.addEventListener('keydown', function (event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      addEmbedFromInput();
    }
  });

  btnCloseEmbed.addEventListener('click', function () {
    closeEmbedViewer();
    playerNote.textContent = 'Visor embed cerrado.';
  });

  embedList.addEventListener('click', function (event) {
    var btn = event.target && event.target.closest ? event.target.closest('button[data-role]') : null;
    if (!btn) return;
    var id = btn.getAttribute('data-id');
    var role = btn.getAttribute('data-role');
    if (!id || !role) return;
    if (role === 'open') {
      openEmbedById(id);
      return;
    }
    if (role === 'remove') {
      removeEmbedById(id);
    }
  });

  deviceQueueList.addEventListener('click', function (event) {
    var item = event.target && event.target.closest ? event.target.closest('[data-queue-index]') : null;
    if (!item) return;
    var index = Number(item.getAttribute('data-queue-index'));
    if (!Number.isFinite(index)) return;
    playSongByIndex(index).catch(function () {
      playerNote.textContent = 'No se pudo reproducir la cancion seleccionada.';
    });
  });

  btnPlayPause.addEventListener('click', function () {
    if (!deviceState.songs.length) {
      playerNote.textContent = 'Primero elige musica de tu movil.';
      return;
    }

    if (deviceState.currentIndex < 0) {
      playSongByIndex(0).catch(function () {
        playerNote.textContent = 'No se pudo iniciar la cancion.';
      });
      return;
    }

    if (playerAudio.paused) {
      playerAudio.play().catch(function () {
        playerNote.textContent = 'No se pudo reanudar la reproduccion.';
      });
    } else {
      playerAudio.pause();
    }
  });

  btnPrev.addEventListener('click', function () {
    playRelative(-1).catch(function () {
      playerNote.textContent = 'No se pudo cargar la cancion anterior.';
    });
  });

  btnNext.addEventListener('click', function () {
    playRelative(1).catch(function () {
      playerNote.textContent = 'No se pudo cargar la siguiente cancion.';
    });
  });

  playerAudio.addEventListener('play', function () {
    vinylRecord.classList.add('spinning');
    btnPlayPause.innerHTML = '&#9208;';
  });

  playerAudio.addEventListener('pause', function () {
    if (!playerAudio.ended) {
      vinylRecord.classList.remove('spinning');
      btnPlayPause.innerHTML = '&#9654;';
    }
  });

  playerAudio.addEventListener('ended', function () {
    playRelative(1).catch(function () {
      vinylRecord.classList.remove('spinning');
      btnPlayPause.innerHTML = '&#9654;';
    });
  });

  window.addEventListener('pagehide', function () {
    teardownPlaylistView();
  });

  window.addEventListener('beforeunload', function () {
    teardownPlaylistView();
  });

  loadEmbeds();
  renderEmbedList();
  if (embedState.currentId) {
    openEmbedById(embedState.currentId);
  }
  renderPlayerInfo(null);
  renderDeviceQueue();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NUESTRA MUSICA FAVORITA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="vistas.css" />
<style>
.vista-contenido {
  padding: 0.55rem !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
  min-height: 0;
}

.player-sticky {
  position: sticky;
  top: 0;
  z-index: 25;
  background: var(--papel-claro);
  border: 2px solid var(--papel-oscuro);
  border-radius: 14px;
  box-shadow: var(--sombra-papel);
  padding: 0.65rem;
}

.player-card {
  display: grid;
  grid-template-columns: 140px minmax(0, 1fr);
  align-items: center;
  gap: 0.75rem;
}

.vinyl-wrap {
  width: 132px;
  height: 132px;
  justify-self: center;
}

.vinyl-record {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background:
    radial-gradient(circle at center, transparent 28%, rgba(255,255,255,0.04) 29%, transparent 31%),
    radial-gradient(circle at center, transparent 35%, rgba(255,255,255,0.03) 36%, transparent 38%),
    radial-gradient(circle at center, transparent 42%, rgba(255,255,255,0.03) 43%, transparent 45%),
    radial-gradient(circle at center, transparent 49%, rgba(255,255,255,0.03) 50%, transparent 52%),
    radial-gradient(circle at center, transparent 56%, rgba(255,255,255,0.03) 57%, transparent 59%),
    linear-gradient(135deg, #2a1810 0%, #1a0f0a 50%, #2a1810 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: vinylSpin 5s linear infinite;
  animation-play-state: paused;
  box-shadow: 0 8px 24px rgba(0,0,0,0.42), inset 0 0 18px rgba(0,0,0,0.32);
}

.vinyl-record.spinning { animation-play-state: running; }

.vinyl-center {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: var(--papel-medio);
  border: 3px solid #7a5230;
  display: flex;
  align-items: center;
  justify-content: center;
}

.vinyl-center-icon { font-size: 1.55rem; }

@keyframes vinylSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.player-info {
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.song-info-title {
  margin: 0;
  max-width: 100%;
  font-family: 'Special Elite', cursive;
  font-size: 0.96rem;
  color: var(--tinta-rural);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song-info-artist {
  margin: 0.15rem 0 0;
  font-size: 0.82rem;
  color: var(--tinta-rural-suave);
}

.song-info-folder {
  margin: 0.18rem 0 0;
  font-size: 0.72rem;
  color: var(--tinta-rural-suave);
}

.player-audio-wrap {
  margin-top: 0.45rem;
  width: 100%;
  max-width: 520px;
}

.player-audio-wrap audio { width: 100%; }

.player-controls {
  margin-top: 0.45rem;
  display: flex;
  justify-content: center;
  gap: 0.62rem;
}

.ctrl-btn {
  background: none;
  border: 2px solid var(--papel-oscuro);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  color: var(--tinta-rural);
  cursor: pointer;
}

.ctrl-btn.play-btn {
  width: 50px;
  height: 50px;
  background: var(--tinta-rural);
  color: var(--papel-claro);
  border-color: var(--tinta-rural);
}

.player-note {
  margin-top: 0.25rem;
  min-height: 1rem;
  font-size: 0.72rem;
  color: var(--tinta-rural-suave);
  text-align: center;
}

.content-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0.55rem;
  width: 100%;
}

.panel {
  background: var(--papel-claro);
  border: 2px solid var(--papel-oscuro);
  border-radius: 14px;
  box-shadow: var(--sombra-papel);
  min-width: 0;
}

.library-panel {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  padding: 0.65rem;
}

.panel-title {
  margin: 0;
  font-family: 'Special Elite', cursive;
  font-size: 0.84rem;
  letter-spacing: 0.08em;
  color: var(--tinta-rural);
}

.folder-actions {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0.34rem;
}

.btn {
  border: 2px solid var(--papel-oscuro);
  border-radius: 9px;
  background: #f3dfb5;
  color: var(--tinta-rural);
  font-family: 'Special Elite', cursive;
  font-size: 0.7rem;
  padding: 0.48rem 0.55rem;
  cursor: pointer;
}

.btn:hover { background: #ecd29f; }

.btn.danger {
  border-color: #9a3f2e;
  color: #9a3f2e;
  background: #f7d7c9;
}

.btn.danger:hover { background: #f2c4af; }

.folder-list {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.folder-item {
  border: 1.5px solid rgba(122,82,48,0.45);
  border-radius: 8px;
  padding: 0.4rem 0.52rem;
  background: #fff5de;
  cursor: pointer;
  font-size: 0.84rem;
}

.folder-item.active {
  background: #5c3d1e;
  border-color: #5c3d1e;
  color: #fff;
}

.folder-meta {
  font-size: 0.72rem;
  opacity: 0.85;
}

.library-hint {
  font-size: 0.72rem;
  color: var(--tinta-rural-suave);
}

.song-list-panel {
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.song-list-header {
  padding: 0.52rem 0.7rem;
  border-bottom: 1px solid rgba(122,82,48,0.4);
  font-family: 'Special Elite', cursive;
  font-size: 0.78rem;
  color: var(--tinta-rural);
}

.song-list {
  padding: 0.42rem;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.song-item {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 0.5rem;
  align-items: start;
  border-radius: 8px;
  border: 1px solid rgba(122,82,48,0.3);
  padding: 0.46rem 0.52rem;
  background: #fff5de;
}

.song-item.active {
  background: #5c3d1e;
  color: #fff;
}

.song-main {
  min-width: 0;
}

.song-line-title {
  font-size: 0.86rem;
  font-weight: 700;
  line-height: 1.2;
  white-space: normal;
  overflow: hidden;
  text-overflow: ellipsis;
  line-clamp: 2;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.song-line-sub {
  font-size: 0.72rem;
  opacity: 0.85;
  margin-top: 0.14rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song-item-actions {
  display: flex;
  gap: 0.3rem;
  flex: 0 0 auto;
  white-space: nowrap;
  align-items: center;
}

.mini-btn {
  border: 1px solid rgba(122,82,48,0.5);
  border-radius: 6px;
  background: #f8e8c3;
  color: var(--tinta-rural);
  font-size: 0.72rem;
  cursor: pointer;
  padding: 0.23rem 0.36rem;
  min-width: 56px;
}

.song-item.active .mini-btn {
  background: rgba(255,255,255,0.2);
  color: #fff;
  border-color: rgba(255,255,255,0.45);
}

.empty-state {
  text-align: center;
  padding: 1.1rem 0.65rem;
  color: var(--tinta-rural-suave);
}

@media (min-width: 960px) {
  .content-grid {
    grid-template-columns: 340px 1fr;
  }
}
</style>
</head>
<body>
<div class="vista-app">
  <header class="vista-header">
    <a class="btn-volver" href="../index.html" target="_top" aria-label="Volver al inicio" id="btnVolverCabecera">
      <img src="../iconos/volver.png" alt="Volver" />
    </a>
    <h1>NUESTRA MUSICA FAVORITA</h1>
    <div class="header-espaciador" aria-hidden="true"></div>
  </header>

  <main class="vista-contenido">
    <section class="player-sticky" aria-label="Reproductor">
      <div class="player-card">
        <div class="vinyl-wrap">
          <div class="vinyl-record" id="vinylRecord">
            <div class="vinyl-center">
              <span class="vinyl-center-icon">&#127925;</span>
            </div>
          </div>
        </div>

        <div class="player-info">
          <p class="song-info-title" id="songTitle">Selecciona una cancion local</p>
          <p class="song-info-artist" id="songArtist">&#8212;</p>
          <p class="song-info-folder" id="songFolder">Sin carpeta activa</p>

          <div class="player-audio-wrap">
            <audio id="playerAudio" controls preload="metadata"></audio>
          </div>

          <div class="player-controls">
            <button class="ctrl-btn" id="btnPrev" aria-label="Anterior">&#9198;</button>
            <button class="ctrl-btn play-btn" id="btnPlayPause" aria-label="Reproducir">&#9654;</button>
            <button class="ctrl-btn" id="btnNext" aria-label="Siguiente">&#9197;</button>
          </div>

          <div class="player-note" id="playerNote">Crea una carpeta y mete canciones para arrancar.</div>
        </div>
      </div>
    </section>

    <section class="content-grid">
      <aside class="panel library-panel">
        <h2 class="panel-title">MIS CARPETAS LOCALES</h2>

        <div class="folder-actions">
          <button class="btn" id="btnAddFolder">+ Crear carpeta</button>
          <button class="btn" id="btnAddFiles">+ Meter canciones sueltas</button>
          <button class="btn" id="btnImportFolder">+ Importar carpeta del movil</button>
          <button class="btn danger" id="btnDeleteFolder">Eliminar carpeta actual</button>
        </div>

        <div class="folder-list" id="folderList"></div>

        <div class="library-hint">Todo esto es local en tu movil. No se sincroniza con nadie.</div>
      </aside>

      <section class="panel song-list-panel">
        <div class="song-list-header" id="songListHeader">CANCIONES DE LA CARPETA</div>
        <div class="song-list" id="songList"></div>
      </section>
    </section>
  </main>
</div>

<input type="file" id="inputAudioFiles" accept="audio/*" multiple hidden />
<input type="file" id="inputAudioFolder" accept="audio/*" webkitdirectory directory multiple hidden />

<script>
(function () {
  var LS_KEY = 'carorur_local_music_v2';
  var DB_NAME = 'carorur_local_music_db';
  var DB_VERSION = 1;
  var DB_STORE = 'songs';
  var MAX_IMPORT_FILES = 60;
  var MAX_FILE_SIZE_MB = 40;
  var MAX_IMPORT_TOTAL_MB = 300;
  var BATCH_YIELD_EVERY = 3;

  var state = {
    folders: [],
    songs: {},
    selectedFolderId: null,
    currentSongId: null
  };

  var playbackUrl = null;
  var playbackUrlSongId = null;
  var isImporting = false;

  var btnVolverCabecera = document.getElementById('btnVolverCabecera');
  var btnAddFolder = document.getElementById('btnAddFolder');
  var btnAddFiles = document.getElementById('btnAddFiles');
  var btnImportFolder = document.getElementById('btnImportFolder');
  var btnDeleteFolder = document.getElementById('btnDeleteFolder');
  var folderList = document.getElementById('folderList');
  var songList = document.getElementById('songList');
  var songListHeader = document.getElementById('songListHeader');
  var songTitle = document.getElementById('songTitle');
  var songArtist = document.getElementById('songArtist');
  var songFolder = document.getElementById('songFolder');
  var playerNote = document.getElementById('playerNote');
  var vinylRecord = document.getElementById('vinylRecord');
  var playerAudio = document.getElementById('playerAudio');
  var btnPlayPause = document.getElementById('btnPlayPause');
  var btnPrev = document.getElementById('btnPrev');
  var btnNext = document.getElementById('btnNext');
  var inputAudioFiles = document.getElementById('inputAudioFiles');
  var inputAudioFolder = document.getElementById('inputAudioFolder');

  function isLikelyQuotaOrMemoryError(err) {
    var name = String((err && err.name) || '').toLowerCase();
    var msg = String((err && err.message) || err || '').toLowerCase();
    return (
      name.indexOf('quota') !== -1 ||
      name.indexOf('memory') !== -1 ||
      msg.indexOf('quota') !== -1 ||
      msg.indexOf('memory') !== -1 ||
      msg.indexOf('space') !== -1 ||
      msg.indexOf('almacenamiento') !== -1
    );
  }

  function setImporting(flag, message) {
    isImporting = !!flag;
    btnAddFolder.disabled = isImporting;
    btnAddFiles.disabled = isImporting;
    btnImportFolder.disabled = isImporting;
    btnDeleteFolder.disabled = isImporting;
    if (message) playerNote.textContent = message;
  }

  function releasePlaybackUrl() {
    if (!playbackUrl) return;
    try {
      URL.revokeObjectURL(playbackUrl);
    } catch (e) {
    }
    playbackUrl = null;
    playbackUrlSongId = null;
  }

  function uid(prefix) {
    return prefix + '_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
  }

  function escHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function openDb() {
    return new Promise(function (resolve, reject) {
      if (!window.indexedDB) {
        reject(new Error('IndexedDB no disponible'));
        return;
      }
      var request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onupgradeneeded = function (event) {
        var db = event.target.result;
        if (!db.objectStoreNames.contains(DB_STORE)) {
          db.createObjectStore(DB_STORE, { keyPath: 'id' });
        }
      };
      request.onsuccess = function () { resolve(request.result); };
      request.onerror = function () { reject(request.error || new Error('No se pudo abrir DB')); };
    });
  }

  async function putSongBlob(id, file) {
    var db = await openDb();
    return new Promise(function (resolve, reject) {
      var tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put({ id: id, file: file });
      tx.oncomplete = function () { resolve(); };
      tx.onerror = function () { reject(tx.error || new Error('Error guardando audio')); };
    });
  }

  async function getSongBlob(id) {
    var db = await openDb();
    return new Promise(function (resolve, reject) {
      var tx = db.transaction(DB_STORE, 'readonly');
      var req = tx.objectStore(DB_STORE).get(id);
      req.onsuccess = function () { resolve(req.result ? req.result.file : null); };
      req.onerror = function () { reject(req.error || new Error('Error leyendo audio')); };
    });
  }

  async function deleteSongBlob(id) {
    var db = await openDb();
    return new Promise(function (resolve, reject) {
      var tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).delete(id);
      tx.oncomplete = function () { resolve(); };
      tx.onerror = function () { reject(tx.error || new Error('Error borrando audio')); };
    });
  }

  function saveState() {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    } catch (e) {
      playerNote.textContent = 'No se pudo guardar el estado local. Libera espacio en el movil e intenta de nuevo.';
    }
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object') return;
      state.folders = Array.isArray(parsed.folders) ? parsed.folders : [];
      state.songs = parsed.songs && typeof parsed.songs === 'object' ? parsed.songs : {};
      state.selectedFolderId = parsed.selectedFolderId || null;
      state.currentSongId = parsed.currentSongId || null;
    } catch (e) {
      state = { folders: [], songs: {}, selectedFolderId: null, currentSongId: null };
    }
  }

  function selectedFolder() {
    return state.folders.find(function (f) { return f.id === state.selectedFolderId; }) || null;
  }

  function ensureDefaultFolder() {
    if (state.folders.length) {
      if (!selectedFolder()) state.selectedFolderId = state.folders[0].id;
      return;
    }
    var folder = { id: uid('FD'), name: 'FAVORITAS', songIds: [] };
    state.folders.push(folder);
    state.selectedFolderId = folder.id;
    saveState();
  }

  function cleanName(name) {
    return String(name || '').trim().replace(/\s+/g, ' ');
  }

  function parseSongMeta(file) {
    var baseName = String(file.name || 'Cancion').replace(/\.[^.]+$/, '');
    var title = baseName;
    var artist = '';
    if (baseName.indexOf(' - ') !== -1) {
      var parts = baseName.split(' - ');
      artist = parts.shift();
      title = parts.join(' - ');
    }
    return {
      title: title || 'Cancion local',
      artist: artist || 'Artista local'
    };
  }

  function folderDisplayName(folderId) {
    var folder = state.folders.find(function (f) { return f.id === folderId; });
    return folder ? folder.name : 'Sin carpeta';
  }

  function renderFolders() {
    folderList.innerHTML = '';
    state.folders.forEach(function (folder) {
      var div = document.createElement('div');
      div.className = 'folder-item' + (folder.id === state.selectedFolderId ? ' active' : '');
      div.innerHTML =
        '<div>' + escHtml(folder.name) + '</div>' +
        '<div class="folder-meta">' + folder.songIds.length + ' canciones</div>';
      div.addEventListener('click', function () {
        state.selectedFolderId = folder.id;
        state.currentSongId = null;
        stopPlayer();
        saveState();
        renderAll();
      });
      folderList.appendChild(div);
    });
  }

  function renderSongs() {
    var folder = selectedFolder();
    if (!folder) {
      songList.innerHTML = '<div class="empty-state">No hay carpeta activa.</div>';
      songListHeader.textContent = 'CANCIONES DE LA CARPETA';
      return;
    }

    songListHeader.textContent = 'CANCIONES DE: ' + folder.name;
    if (!folder.songIds.length) {
      songList.innerHTML = '<div class="empty-state">Esta carpeta esta vacia.</div>';
      return;
    }

    songList.innerHTML = '';
    folder.songIds.forEach(function (songId) {
      var song = state.songs[songId];
      if (!song) return;

      var row = document.createElement('div');
      row.className = 'song-item' + (song.id === state.currentSongId ? ' active' : '');

      var left = document.createElement('div');
      left.className = 'song-main';
      left.innerHTML =
        '<div class="song-line-title">' + escHtml(song.title) + '</div>' +
        '<div class="song-line-sub">' + escHtml(song.artist) + '</div>';
      left.style.cursor = 'pointer';
      left.addEventListener('click', function () {
        playSong(song.id).catch(function () {
          playerNote.textContent = 'No se pudo reproducir esta cancion.';
        });
      });

      var actions = document.createElement('div');
      actions.className = 'song-item-actions';

      var btnPlay = document.createElement('button');
      btnPlay.className = 'mini-btn';
      btnPlay.textContent = 'Play';
      btnPlay.addEventListener('click', function () {
        playSong(song.id).catch(function () {
          playerNote.textContent = 'No se pudo reproducir esta cancion.';
        });
      });

      var btnDelete = document.createElement('button');
      btnDelete.className = 'mini-btn';
      btnDelete.textContent = 'Quitar';
      btnDelete.addEventListener('click', function () {
        removeSong(song.id).catch(function () {
          playerNote.textContent = 'No se pudo eliminar la cancion.';
        });
      });

      actions.appendChild(btnPlay);
      actions.appendChild(btnDelete);
      row.appendChild(left);
      row.appendChild(actions);
      songList.appendChild(row);
    });
  }

  function renderPlayerInfo(song) {
    if (!song) {
      songTitle.textContent = 'Selecciona una cancion local';
      songArtist.textContent = '\u2014';
      songFolder.textContent = selectedFolder() ? 'Carpeta: ' + selectedFolder().name : 'Sin carpeta activa';
      return;
    }
    songTitle.textContent = song.title;
    songArtist.textContent = song.artist;
    songFolder.textContent = 'Carpeta: ' + folderDisplayName(song.folderId);
  }

  function renderAll() {
    renderFolders();
    renderSongs();
    if (!state.currentSongId) {
      renderPlayerInfo(null);
    } else {
      renderPlayerInfo(state.songs[state.currentSongId] || null);
    }
  }

  function stopPlayer() {
    playerAudio.pause();
    playerAudio.removeAttribute('src');
    playerAudio.load();
    releasePlaybackUrl();
    vinylRecord.classList.remove('spinning');
    btnPlayPause.innerHTML = '&#9654;';
  }

  async function resolveSongUrl(songId) {
    if (playbackUrlSongId === songId && playbackUrl) {
      return playbackUrl;
    }
    var blob = await getSongBlob(songId);
    if (!blob) return null;
    return URL.createObjectURL(blob);
  }

  async function playSong(songId, options) {
    options = options || {};
    var isAutoAdvance = !!options.isAutoAdvance;
    var song = state.songs[songId];
    if (!song) return;

    var src = await resolveSongUrl(songId);
    if (!src) {
      playerNote.textContent = 'No se encontro el archivo de audio de esta cancion.';
      return;
    }

    if (playbackUrlSongId !== songId) {
      releasePlaybackUrl();
    }

    if (playerAudio.src !== src) {
      playerAudio.src = src;
    }
    playbackUrl = src;
    playbackUrlSongId = songId;

    state.currentSongId = songId;
    saveState();
    renderAll();

    try {
      await playerAudio.play();
      playerNote.textContent = '';
    } catch (e) {
      if (isAutoAdvance) {
        try {
          await new Promise(function (resolve) { setTimeout(resolve, 120); });
          await playerAudio.play();
          playerNote.textContent = '';
          return;
        } catch (e2) {
        }
      }
      playerNote.textContent = 'Pulsa Play en el control de audio para continuar la carpeta.';
      throw e;
    }
  }

  function currentFolderSongs() {
    var folder = selectedFolder();
    if (!folder) return [];
    return folder.songIds.filter(function (id) { return !!state.songs[id]; });
  }

  async function playRelative(offset) {
    var ids = currentFolderSongs();
    if (!ids.length) return;

    var currentIndex = ids.indexOf(state.currentSongId);
    if (currentIndex === -1) currentIndex = 0;
    var nextIndex = (currentIndex + offset + ids.length) % ids.length;
    await playSong(ids[nextIndex], { isAutoAdvance: true });
  }

  async function removeSong(songId) {
    var song = state.songs[songId];
    if (!song) return;
    var ok = window.confirm('Quitar "' + song.title + '" de tu libreria local?');
    if (!ok) return;

    state.folders.forEach(function (folder) {
      folder.songIds = folder.songIds.filter(function (id) { return id !== songId; });
    });

    if (state.currentSongId === songId) {
      state.currentSongId = null;
      stopPlayer();
    }

    delete state.songs[songId];
    saveState();

    await deleteSongBlob(songId);
    playerNote.textContent = 'Cancion eliminada.';
    renderAll();
  }

  async function addFilesToFolder(files, folderId) {
    if (isImporting) {
      playerNote.textContent = 'Ya hay una importacion en curso. Espera a que termine.';
      return;
    }

    var folder = state.folders.find(function (f) { return f.id === folderId; });
    if (!folder) return;

    var rawFiles = Array.prototype.slice.call(files || []).filter(function (file) {
      return /^audio\//i.test(file.type || 'audio/unknown');
    });

    if (!rawFiles.length) {
      playerNote.textContent = 'No se detectaron audios validos.';
      return;
    }

    var maxBytes = MAX_FILE_SIZE_MB * 1024 * 1024;
    var skippedBySize = 0;
    var audioFiles = rawFiles.filter(function (file) {
      if ((file.size || 0) > maxBytes) {
        skippedBySize += 1;
        return false;
      }
      return true;
    });

    if (!audioFiles.length) {
      playerNote.textContent = 'Los archivos seleccionados superan el limite de ' + MAX_FILE_SIZE_MB + 'MB por cancion.';
      return;
    }

    var maxTotalBytes = MAX_IMPORT_TOTAL_MB * 1024 * 1024;
    var runningBytes = 0;
    var skippedByTotal = 0;
    audioFiles = audioFiles.filter(function (file) {
      var next = runningBytes + (file.size || 0);
      if (next > maxTotalBytes) {
        skippedByTotal += 1;
        return false;
      }
      runningBytes = next;
      return true;
    });

    if (!audioFiles.length) {
      playerNote.textContent = 'Seleccion excesiva. Importa menos canciones por lote (maximo aprox. ' + MAX_IMPORT_TOTAL_MB + 'MB por importacion).';
      return;
    }

    var trimmed = false;
    if (audioFiles.length > MAX_IMPORT_FILES) {
      audioFiles = audioFiles.slice(0, MAX_IMPORT_FILES);
      trimmed = true;
    }

    setImporting(true, 'Guardando ' + audioFiles.length + ' canciones en local...');

    var saved = 0;
    var failed = 0;
    var quotaOrMemoryHit = false;

    try {
      for (var i = 0; i < audioFiles.length; i++) {
        var file = audioFiles[i];
        var id = uid('SG');
        var meta = parseSongMeta(file);

        try {
          await putSongBlob(id, file);
        } catch (err) {
          failed += 1;
          if (isLikelyQuotaOrMemoryError(err)) {
            quotaOrMemoryHit = true;
            break;
          }
          continue;
        }

        state.songs[id] = {
          id: id,
          folderId: folderId,
          title: meta.title,
          artist: meta.artist,
          fileName: file.name,
          addedAt: Date.now()
        };
        folder.songIds.push(id);
        saved += 1;

        if ((i + 1) % BATCH_YIELD_EVERY === 0) {
          await new Promise(function (resolve) { setTimeout(resolve, 0); });
        }
      }
    } finally {
      setImporting(false);
    }

    saveState();
    var note = 'Listo: ' + saved + ' canciones guardadas en "' + folder.name + '".';
    if (trimmed) {
      note += ' (Se limitaron a ' + MAX_IMPORT_FILES + ' para evitar reinicios por memoria).';
    }
    if (skippedBySize > 0) {
      note += ' Omitidas por tamano: ' + skippedBySize + '.';
    }
    if (skippedByTotal > 0) {
      note += ' Omitidas por lote grande: ' + skippedByTotal + '.';
    }
    if (failed > 0) {
      note += ' Fallidas: ' + failed + '.';
    }
    if (quotaOrMemoryHit) {
      note += ' Se corto la importacion por falta de memoria/espacio; importa en lotes mas pequenos o borra canciones viejas.';
    }
    playerNote.textContent = note;
    renderAll();
  }

  function uniqueFolderName(base) {
    var clean = cleanName(base || 'NUEVA CARPETA').toUpperCase();
    if (!clean) clean = 'NUEVA CARPETA';
    var name = clean;
    var n = 2;
    while (state.folders.some(function (f) { return f.name === name; })) {
      name = clean + ' (' + n + ')';
      n += 1;
    }
    return name;
  }

  function createFolder(name) {
    var folder = {
      id: uid('FD'),
      name: uniqueFolderName(name),
      songIds: []
    };
    state.folders.push(folder);
    state.selectedFolderId = folder.id;
    saveState();
    renderAll();
    return folder;
  }

  async function deleteCurrentFolder() {
    var folder = selectedFolder();
    if (!folder) return;
    if (state.folders.length === 1) {
      playerNote.textContent = 'Necesitas al menos una carpeta.';
      return;
    }

    var ok = window.confirm('Eliminar carpeta "' + folder.name + '" y sus canciones locales?');
    if (!ok) return;

    var ids = folder.songIds.slice();
    for (var i = 0; i < ids.length; i++) {
      var id = ids[i];
      delete state.songs[id];
      await deleteSongBlob(id);
    }

    state.folders = state.folders.filter(function (f) { return f.id !== folder.id; });
    state.selectedFolderId = state.folders[0] ? state.folders[0].id : null;

    if (ids.indexOf(state.currentSongId) !== -1) {
      state.currentSongId = null;
      stopPlayer();
    }

    saveState();
    playerNote.textContent = 'Carpeta eliminada.';
    renderAll();
  }

  async function importFolderFromPicker(files) {
    var all = Array.prototype.slice.call(files || []);
    if (!all.length) return;

    var groups = {};
    all.forEach(function (file) {
      if (!/^audio\//i.test(file.type || 'audio/unknown')) return;
      var rel = file.webkitRelativePath || file.name || 'CARPETA';
      var root = rel.split('/')[0] || 'CARPETA';
      if (!groups[root]) groups[root] = [];
      groups[root].push(file);
    });

    var names = Object.keys(groups);
    if (!names.length) {
      playerNote.textContent = 'No se detectaron canciones en esa carpeta.';
      return;
    }

    var processed = 0;
    for (var i = 0; i < names.length; i++) {
      if (processed >= MAX_IMPORT_FILES) break;
      var folder = createFolder(names[i]);
      var group = groups[names[i]] || [];
      if (processed + group.length > MAX_IMPORT_FILES) {
        group = group.slice(0, Math.max(0, MAX_IMPORT_FILES - processed));
      }
      processed += group.length;
      await addFilesToFolder(group, folder.id);
    }

    if (processed >= MAX_IMPORT_FILES) {
      playerNote.textContent = 'Importacion parcial completada para proteger memoria del movil. Maximo actual: ' + MAX_IMPORT_FILES + ' canciones por importacion.';
    } else {
      playerNote.textContent = 'Carpetas importadas correctamente.';
    }
    renderAll();
  }

  btnVolverCabecera.addEventListener('click', function (e) {
    e.preventDefault();
    try {
      if (window.top !== window && typeof window.top.carorurCloseVista === 'function') {
        window.top.carorurCloseVista();
      } else if (window.top !== window && window.top.postMessage) {
        window.top.postMessage('carorur:close-vista', '*');
      } else {
        window.location.href = '../index.html';
      }
    } catch (err) {
      window.location.href = '../index.html';
    }
  });

  btnAddFolder.addEventListener('click', function () {
    var name = window.prompt('Nombre de la carpeta musical local:', 'Mis favoritas');
    if (name === null) return;
    name = cleanName(name);
    if (!name) return;
    var folder = createFolder(name);
    playerNote.textContent = 'Carpeta creada: ' + folder.name;
  });

  btnAddFiles.addEventListener('click', function () {
    if (isImporting) {
      playerNote.textContent = 'Espera a que termine la importacion actual.';
      return;
    }
    if (!selectedFolder()) {
      playerNote.textContent = 'Primero crea una carpeta.';
      return;
    }
    inputAudioFiles.value = '';
    inputAudioFiles.click();
  });

  btnImportFolder.addEventListener('click', function () {
    if (isImporting) {
      playerNote.textContent = 'Espera a que termine la importacion actual.';
      return;
    }
    inputAudioFolder.value = '';
    inputAudioFolder.click();
  });

  btnDeleteFolder.addEventListener('click', function () {
    deleteCurrentFolder().catch(function () {
      playerNote.textContent = 'No se pudo eliminar la carpeta.';
    });
  });

  inputAudioFiles.addEventListener('change', function () {
    var folder = selectedFolder();
    if (!folder) return;
    addFilesToFolder(inputAudioFiles.files, folder.id).catch(function () {
      playerNote.textContent = 'Error guardando canciones locales.';
    });
  });

  inputAudioFolder.addEventListener('change', function () {
    importFolderFromPicker(inputAudioFolder.files).catch(function () {
      playerNote.textContent = 'Error importando carpeta local.';
    });
  });

  btnPlayPause.addEventListener('click', function () {
    if (!state.currentSongId) {
      var ids = currentFolderSongs();
      if (!ids.length) {
        playerNote.textContent = 'No hay canciones en la carpeta actual.';
        return;
      }
      playSong(ids[0]).catch(function () {
        playerNote.textContent = 'No se pudo iniciar la cancion.';
      });
      return;
    }

    if (playerAudio.paused) {
      playerAudio.play().catch(function () {
        playerNote.textContent = 'No se pudo reanudar la reproduccion.';
      });
    } else {
      playerAudio.pause();
    }
  });

  btnPrev.addEventListener('click', function () {
    playRelative(-1).catch(function () {
      playerNote.textContent = 'No se pudo cargar la cancion anterior.';
    });
  });

  btnNext.addEventListener('click', function () {
    playRelative(1).catch(function () {
      playerNote.textContent = 'No se pudo cargar la siguiente cancion.';
    });
  });

  playerAudio.addEventListener('play', function () {
    vinylRecord.classList.add('spinning');
    btnPlayPause.innerHTML = '&#9208;';
    renderSongs();
  });

  playerAudio.addEventListener('pause', function () {
    if (!playerAudio.ended) {
      vinylRecord.classList.remove('spinning');
      btnPlayPause.innerHTML = '&#9654;';
      renderSongs();
    }
  });

  playerAudio.addEventListener('ended', function () {
    playRelative(1).catch(function () {
      vinylRecord.classList.remove('spinning');
      btnPlayPause.innerHTML = '&#9654;';
    });
  });

  window.addEventListener('pagehide', function () {
    releasePlaybackUrl();
  });

  loadState();
  ensureDefaultFolder();
  renderAll();
})();
</script>
</body>
</html>

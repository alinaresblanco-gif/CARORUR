<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NUESTRA MUSICA FAVORITA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="vistas.css" />
<style>
.vista-contenido {
padding: 0 !important;
overflow: hidden !important;
display: flex !important;
flex-direction: column !important;
}
.music-hub {
display: grid;
grid-template-columns: 1fr 350px;
gap: 0.75rem;
height: 100%;
flex: 1;
min-height: 0;
padding: 0.75rem;
box-sizing: border-box;
overflow: hidden;
}
.player-panel {
display: flex;
flex-direction: column;
gap: 0.65rem;
min-height: 0;
}
.player-card {
flex: 1;
background: var(--papel-claro);
border-radius: 14px;
border: 2px solid var(--papel-oscuro);
box-shadow: var(--sombra-papel);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 1.25rem 1rem;
gap: 0.85rem;
min-height: 0;
overflow: hidden;
}
.vinyl-wrap { width: 190px; height: 190px; flex-shrink: 0; }
.vinyl-record {
width: 190px;
height: 190px;
border-radius: 50%;
background:
radial-gradient(circle at center, transparent 28%, rgba(255,255,255,0.04) 29%, transparent 31%),
radial-gradient(circle at center, transparent 35%, rgba(255,255,255,0.03) 36%, transparent 38%),
radial-gradient(circle at center, transparent 42%, rgba(255,255,255,0.03) 43%, transparent 45%),
radial-gradient(circle at center, transparent 49%, rgba(255,255,255,0.03) 50%, transparent 52%),
radial-gradient(circle at center, transparent 56%, rgba(255,255,255,0.03) 57%, transparent 59%),
radial-gradient(circle at center, transparent 63%, rgba(255,255,255,0.03) 64%, transparent 66%),
radial-gradient(circle at center, transparent 70%, rgba(255,255,255,0.03) 71%, transparent 73%),
radial-gradient(circle at center, transparent 77%, rgba(255,255,255,0.03) 78%, transparent 80%),
linear-gradient(135deg, #2a1810 0%, #1a0f0a 50%, #2a1810 100%);
display: flex;
align-items: center;
justify-content: center;
animation: vinylSpin 5s linear infinite;
animation-play-state: paused;
box-shadow: 0 6px 24px rgba(0,0,0,0.45), inset 0 0 18px rgba(0,0,0,0.35);
}
.vinyl-record.spinning { animation-play-state: running; }
.vinyl-center {
width: 76px; height: 76px; border-radius: 50%; overflow: hidden;
background: var(--papel-medio); border: 3px solid #7a5230;
display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.vinyl-center img { width: 100%; height: 100%; object-fit: cover; }
.vinyl-center-icon { font-size: 2rem; line-height: 1; }
@keyframes vinylSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.song-info { text-align: center; max-width: 270px; }
.song-info-title {
font-family: 'Special Elite', cursive; font-size: 1.05rem; color: var(--tinta-rural);
margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 270px;
}
.song-info-artist {
font-family: 'Crimson Text', serif; font-size: 0.9rem; color: var(--tinta-rural-suave); margin: 0.15rem 0 0.35rem;
}
.platform-badge { display: inline-block; font-size: 0.62rem; font-weight: bold; padding: 2px 6px; border-radius: 3px; color: #fff; text-transform: uppercase; letter-spacing: 0.05em; }
.pb-youtube    { background: #c4302b; }
.pb-spotify    { background: #1db954; }
.pb-soundcloud { background: #f5a623; color: #222; }
.pb-amazonmusic { background: #146eb4; }
.pb-audio      { background: #5c3d1e; }
.pb-local      { background: #7a5230; }
.pb-native     { background: #2c5aa0; }
.pb-link       { background: #7a7a6e; }
.player-iframe-wrap { width: 100%; max-width: 360px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
.player-iframe-wrap[hidden] { display: none; }
.player-iframe-wrap iframe { width: 100%; height: 185px; border: none; display: block; }
.player-audio-wrap { width: 100%; max-width: 360px; flex-shrink: 0; }
.player-audio-wrap[hidden] { display: none; }
.player-audio-wrap audio { width: 100%; }
.player-note {
width: 100%;
max-width: 360px;
min-height: 1rem;
font-size: 0.73rem;
line-height: 1.4;
text-align: center;
color: var(--tinta-rural-suave);
font-family: 'Crimson Text', serif;
}
.player-note a { color: #5c3d1e; font-weight: 700; }
.player-controls { display: flex; align-items: center; gap: 0.85rem; }
.ctrl-btn {
background: none; border: 2px solid var(--papel-oscuro); border-radius: 50%;
width: 40px; height: 40px; font-size: 0.95rem; cursor: pointer;
display: flex; align-items: center; justify-content: center; color: var(--tinta-rural); transition: background 0.18s, color 0.18s;
}
.ctrl-btn:hover { background: var(--papel-oscuro); color: var(--papel-claro); }
.ctrl-btn.play-btn { width: 52px; height: 52px; font-size: 1.2rem; background: var(--tinta-rural); border-color: var(--tinta-rural); color: var(--papel-claro); }
.ctrl-btn.play-btn:hover { opacity: 0.82; }
.sync-bar { font-size: 0.7rem; color: var(--tinta-rural-suave); font-family: 'Crimson Text', serif; text-align: center; min-height: 1rem; }
.sync-bar.syncing { color: #c87f2a; }
.sync-bar.synced  { color: #1db954; }
.tabs-section { flex-shrink: 0; }
.tabs-label { font-family: 'Special Elite', cursive; font-size: 0.68rem; color: var(--tinta-rural-suave); letter-spacing: 0.1em; margin-bottom: 0.5rem; }
.tabs-list { display: flex; flex-direction: column; gap: 0.45rem; }
.tab-row { display: flex; align-items: stretch; gap: 0.4rem; }
.tab-btn {
flex: 1; background: var(--papel-claro); border: 2px solid var(--papel-oscuro); border-radius: 10px;
padding: 0.65rem 0.9rem; font-family: 'Special Elite', cursive; font-size: 0.78rem;
color: var(--tinta-rural); cursor: pointer; text-transform: uppercase; transition: all 0.18s;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left;
box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
.tab-btn:hover { background: var(--papel-medio); transform: translateX(2px); }
.tab-btn.active {
background: linear-gradient(135deg, #5c3d1e 0%, #7a5230 100%);
border-color: #5c3d1e; color: var(--papel-claro);
box-shadow: 0 3px 10px rgba(92,61,30,0.35);
}
.tab-btn.new-tab {
background: transparent; border-style: dashed; color: var(--tinta-rural-suave);
text-align: center; box-shadow: none;
}
.tab-btn.new-tab:hover { border-color: var(--tinta-rural); color: var(--tinta-rural); background: transparent; transform: none; }
.tab-del-btn {
background: transparent; border: 2px solid rgba(122,82,48,0.3); border-radius: 10px;
color: #7a5230; width: 38px; flex-shrink: 0; font-size: 1rem; cursor: pointer;
transition: background 0.18s, color 0.18s, border-color 0.18s;
display: flex; align-items: center; justify-content: center;
}
.tab-del-btn:hover { background: #c0392b; border-color: #c0392b; color: #fff; }
.playlist-panel {
display: flex; flex-direction: column; background: var(--papel-claro);
border-radius: 14px; border: 2px solid var(--papel-oscuro); box-shadow: var(--sombra-papel);
overflow: hidden; min-height: 0;
}
.playlist-panel-header {
background: #5c3d1e; color: var(--papel-claro); padding: 0.7rem 1rem;
font-family: 'Special Elite', cursive; font-size: 0.85rem; letter-spacing: 0.1em;
text-align: center; flex-shrink: 0;
}
.songs-list { flex: 1; overflow-y: auto; padding: 0.4rem; min-height: 0; }
.songs-list::-webkit-scrollbar { width: 4px; }
.songs-list::-webkit-scrollbar-track { background: transparent; }
.songs-list::-webkit-scrollbar-thumb { background: var(--papel-oscuro); border-radius: 2px; }
.empty-state { text-align: center; padding: 2rem 1rem; color: var(--tinta-rural-suave); font-family: 'Crimson Text', serif; font-size: 0.95rem; }
.song-item { display: flex; align-items: center; gap: 0.55rem; padding: 0.45rem 0.5rem; border-radius: 8px; cursor: pointer; transition: background 0.14s; }
.song-item:hover { background: var(--papel-medio); }
.song-item.active { background: #5c3d1e; color: var(--papel-claro); }
.song-item.active .song-item-artist { color: #c8956a; }
.song-item.active .vote-count { color: #f0d9b5; }
.song-thumb { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; background: var(--papel-oscuro); flex-shrink: 0; }
.song-item-meta { flex: 1; min-width: 0; }
.song-item-title { font-family: 'Crimson Text', serif; font-weight: 700; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
.song-item-artist { font-size: 0.75rem; color: var(--tinta-rural-suave); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-item-badges { margin-top: 2px; }
.vote-col { display: flex; flex-direction: column; align-items: center; gap: 0; flex-shrink: 0; }
.vote-count { font-size: 0.78rem; font-weight: 700; font-family: 'Special Elite', cursive; color: var(--tinta-rural); min-width: 18px; text-align: center; }
.vote-btn { background: none; border: none; cursor: pointer; font-size: 0.82rem; padding: 1px 3px; line-height: 1; opacity: 0.55; transition: opacity 0.12s, transform 0.1s; color: inherit; }
.vote-btn:hover { opacity: 1; transform: scale(1.25); }
.delete-btn {
background: transparent;
border: 1.5px solid rgba(122, 82, 48, 0.35);
color: #7a5230;
width: 24px;
height: 24px;
border-radius: 6px;
font-size: 0.78rem;
line-height: 1;
cursor: pointer;
margin-left: 0.4rem;
flex-shrink: 0;
}
.delete-btn:hover { background: #7a5230; color: #fff; border-color: #7a5230; }
.now-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #1db954; flex-shrink: 0; animation: nowPulse 1.2s ease-in-out infinite; }
@keyframes nowPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.45; transform: scale(0.75); } }
.btn-add-song {
margin: 0.65rem; padding: 0.65rem; background: var(--tinta-rural); color: var(--papel-claro);
border: none; border-radius: 10px; font-family: 'Special Elite', cursive; font-size: 0.75rem;
cursor: pointer; letter-spacing: 0.05em; transition: opacity 0.18s; flex-shrink: 0;
}
.btn-add-song:hover { opacity: 0.85; }
.btn-add-song:disabled { opacity: 0.38; cursor: default; }
.btn-clear-playlist {
margin: 0 0.65rem 0.65rem;
padding: 0.55rem;
background: transparent;
color: #7a5230;
border: 2px dashed rgba(122, 82, 48, 0.55);
border-radius: 10px;
font-family: 'Special Elite', cursive;
font-size: 0.72rem;
cursor: pointer;
letter-spacing: 0.04em;
transition: background 0.18s, color 0.18s;
}
.btn-clear-playlist:hover { background: #7a5230; color: #fff; }
.btn-clear-playlist:disabled { opacity: 0.38; cursor: default; background: transparent; color: #7a5230; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.52); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
.modal-overlay[hidden] { display: none; }
.modal-card { background: var(--papel-claro); border-radius: 14px; border: 2px solid var(--papel-oscuro); box-shadow: 0 8px 36px rgba(0,0,0,0.28); padding: 1.4rem; width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 0.8rem; }
.modal-title { font-family: 'Special Elite', cursive; font-size: 1.05rem; color: var(--tinta-rural); letter-spacing: 0.07em; margin: 0; }
.form-group { display: flex; flex-direction: column; gap: 0.28rem; }
.form-label { font-family: 'Crimson Text', serif; font-size: 0.82rem; color: var(--tinta-rural-suave); font-weight: 700; }
.form-input { padding: 0.52rem 0.7rem; border: 1.5px solid var(--papel-oscuro); border-radius: 8px; background: #fff; font-family: 'Crimson Text', serif; font-size: 0.95rem; color: var(--tinta-rural); transition: border-color 0.18s; }
.form-input:focus { outline: none; border-color: var(--tinta-rural); }
.form-hint { font-size: 0.73rem; color: var(--tinta-rural-suave); font-family: 'Crimson Text', serif; min-height: 1rem; }
.form-hint.ok  { color: #1db954; }
.form-hint.err { color: #c4302b; }
.oembed-preview { display: flex; align-items: center; gap: 0.7rem; padding: 0.55rem 0.65rem; background: var(--papel-medio); border-radius: 8px; }
.oembed-preview[hidden] { display: none; }
.oembed-preview img { width: 48px; height: 48px; border-radius: 5px; object-fit: cover; flex-shrink: 0; }
.oembed-preview-title { font-weight: 700; font-size: 0.84rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.oembed-preview-author { font-size: 0.74rem; color: var(--tinta-rural-suave); }
.modal-actions { display: flex; gap: 0.7rem; justify-content: flex-end; margin-top: 0.1rem; }
.btn-modal-cancel { padding: 0.5rem 0.95rem; border: 2px solid var(--papel-oscuro); background: transparent; border-radius: 8px; font-family: 'Special Elite', cursive; font-size: 0.75rem; color: var(--tinta-rural-suave); cursor: pointer; }
.btn-modal-save { padding: 0.5rem 1.15rem; background: var(--tinta-rural); color: var(--papel-claro); border: none; border-radius: 8px; font-family: 'Special Elite', cursive; font-size: 0.75rem; cursor: pointer; transition: opacity 0.18s; }
.btn-modal-save:hover { opacity: 0.85; }
.divider-line {
display: flex;
align-items: center;
gap: 0.55rem;
font-size: 0.7rem;
text-transform: uppercase;
letter-spacing: 0.08em;
color: var(--tinta-rural-suave);
font-family: 'Special Elite', cursive;
}
.divider-line::before,
.divider-line::after {
content: '';
flex: 1;
height: 1px;
background: rgba(92, 61, 30, 0.25);
}
.btn-local-file {
padding: 0.6rem 0.8rem;
border: 2px dashed var(--papel-oscuro);
border-radius: 10px;
background: transparent;
color: var(--tinta-rural);
font-family: 'Special Elite', cursive;
font-size: 0.72rem;
cursor: pointer;
}
.btn-local-file:hover { background: var(--papel-medio); }
@media (max-width: 680px) {
.music-hub { grid-template-columns: 1fr; grid-template-rows: auto auto; height: auto; overflow: visible; }
.vista-contenido { overflow: auto !important; }
.playlist-panel { order: 1; min-height: 280px; max-height: 42vh; }
.player-panel { order: 2; min-height: 0; }
.player-card { flex: 0 0 auto; overflow: visible; min-height: auto; padding: 1rem; }
.vinyl-wrap, .vinyl-record { width: 150px; height: 150px; }
.vinyl-center { width: 60px; height: 60px; }
}
</style>
</head>
<body>
<div class="vista-app">
<header class="vista-header">
<a class="btn-volver" href="../index.html" target="_top" aria-label="Volver al inicio" id="btnVolverCabecera">
<img src="../iconos/volver.png" alt="Volver" />
</a>
<script>
document.getElementById('btnVolverCabecera').addEventListener('click', function(e) {
  e.preventDefault();
  try {
    if (window.top !== window && window.top.history) {
      window.top.history.back();
    } else {
      window.location.href = '../index.html';
    }
  } catch(err) {
    window.location.href = '../index.html';
  }
});
</script>
<h1>NUESTRA MUSICA FAVORITA</h1>
<div class="header-espaciador" aria-hidden="true"></div>
</header>

<main class="vista-contenido">
<div class="music-hub">

<section class="player-panel" aria-label="Reproductor">
<div class="player-card">
<div class="vinyl-wrap">
<div class="vinyl-record" id="vinylRecord">
<div class="vinyl-center" id="vinylCenter">
<span class="vinyl-center-icon" id="albumDefault">&#127925;</span>
<img id="albumArt" src="" alt="Portada" style="display:none;width:100%;height:100%;object-fit:cover;" />
</div>
</div>
</div>
<div class="song-info">
<p class="song-info-title" id="songTitle">Elige una playlist</p>
<p class="song-info-artist" id="songArtist">&#8212;</p>
<span id="platformBadge"></span>
</div>
<div class="player-iframe-wrap" id="playerIframeWrap" hidden>
<iframe id="playerIframe"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
allowfullscreen loading="lazy">
</iframe>
</div>
<div class="player-audio-wrap" id="playerAudioWrap" hidden>
<audio id="playerAudio" controls preload="metadata"></audio>
</div>
<div class="player-note" id="playerNote"></div>
<div class="player-controls">
<button class="ctrl-btn" id="btnPrev" aria-label="Anterior">&#9198;</button>
<button class="ctrl-btn play-btn" id="btnPlayPause" aria-label="Reproducir">&#9654;</button>
<button class="ctrl-btn" id="btnNext" aria-label="Siguiente">&#9197;</button>
</div>
<div class="sync-bar" id="syncBar"></div>
</div>
<div class="tabs-section">
<p class="tabs-label">NUESTRAS PLAYLISTS</p>
<div class="tabs-list" id="tabsList"></div>
</div>
</section>

<section class="playlist-panel" aria-label="Lista de canciones">
<div class="playlist-panel-header">&#127926; PLAYLIST COLABORATIVA</div>
<div class="songs-list" id="songsList">
<div class="empty-state">Crea o selecciona una playlist</div>
</div>
<button class="btn-add-song" id="btnAddSong" disabled>+ A&#209;ADIR CANCI&#211;N / LINK</button>
<button class="btn-clear-playlist" id="btnClearPlaylist" disabled>VACIAR PLAYLIST</button>
</section>

</div>
</main>
</div>

<div class="modal-overlay" id="modalAddSong" hidden role="dialog" aria-modal="true" aria-labelledby="addSongTitle">
<div class="modal-card">
<h2 class="modal-title" id="addSongTitle">&#127925; A&#209;ADIR CANCI&#211;N</h2>
<div class="form-group">
<label class="form-label" for="inputSongUrl">Link (YouTube, Spotify, SoundCloud...)</label>
<input class="form-input" type="url" id="inputSongUrl" placeholder="Pega aqui el enlace..." autocomplete="off" />
<span class="form-hint" id="oembedStatus"></span>
</div>
<div class="divider-line">o desde tu telefono</div>
<button class="btn-local-file" id="btnPickLocalFile" type="button">Seleccionar archivo de audio descargado</button>
<input type="file" id="inputLocalFile" accept="audio/*" hidden />
<div class="oembed-preview" id="oembedPreview" hidden>
<img id="oembedThumb" src="" alt="Portada" />
<div style="flex:1;min-width:0;">
<div class="oembed-preview-title" id="oembedTitle"></div>
<div class="oembed-preview-author" id="oembedAuthor"></div>
</div>
</div>
<div class="form-group">
<label class="form-label" for="inputSongTitle">Titulo de la cancion</label>
<input class="form-input" type="text" id="inputSongTitle" placeholder="Nombre del tema..." autocomplete="off" />
</div>
<div class="form-group">
<label class="form-label" for="inputSongArtist">Artista / Banda</label>
<input class="form-input" type="text" id="inputSongArtist" placeholder="Nombre del artista..." autocomplete="off" />
</div>
<div class="form-group">
<label class="form-label" for="inputAddedBy">Anadido por</label>
<input class="form-input" type="text" id="inputAddedBy" placeholder="Tu nombre..." maxlength="30" autocomplete="off" />
</div>
<div class="modal-actions">
<button class="btn-modal-cancel" id="btnCancelSong">Cancelar</button>
<button class="btn-modal-save" id="btnSaveSong">Guardar cancion</button>
</div>
</div>
</div>

<div class="modal-overlay" id="modalNewPlaylist" hidden role="dialog" aria-modal="true" aria-labelledby="newPlTitle">
<div class="modal-card">
<h2 class="modal-title" id="newPlTitle">&#128203; NUEVA PLAYLIST</h2>
<div class="form-group">
<label class="form-label" for="inputPlName">Nombre de la playlist</label>
<input class="form-input" type="text" id="inputPlName" placeholder="Ej: Barbacoa Sabado, Chill Noche..." maxlength="40" autocomplete="off" />
</div>
<div class="form-group">
<label class="form-label" for="inputPlCreator">Creada por</label>
<input class="form-input" type="text" id="inputPlCreator" placeholder="Tu nombre..." maxlength="30" autocomplete="off" />
</div>
<div class="modal-actions">
<button class="btn-modal-cancel" id="btnCancelPlaylist">Cancelar</button>
<button class="btn-modal-save" id="btnSavePlaylist">Crear playlist</button>
</div>
</div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbycg1nrbCB_www3bqb-RVM2nl4hHvEozFdY2uz50jX6iiAGW-yFu3MeRENqo0GozWCu/exec';
var playlists   = [];
var canciones   = {};
var curPlaylist = null;
var curSongId   = null;
var isPlaying   = false;
var oembedTimer = null;
var pendingPortada = '';
var vinylRecord      = document.getElementById('vinylRecord');
var albumArt         = document.getElementById('albumArt');
var albumDefault     = document.getElementById('albumDefault');
var songTitle        = document.getElementById('songTitle');
var songArtist       = document.getElementById('songArtist');
var platformBadge    = document.getElementById('platformBadge');
var playerIframeWrap = document.getElementById('playerIframeWrap');
var playerIframe     = document.getElementById('playerIframe');
var btnPlayPause     = document.getElementById('btnPlayPause');
var btnPrev          = document.getElementById('btnPrev');
var btnNext          = document.getElementById('btnNext');
var tabsList         = document.getElementById('tabsList');
var songsList        = document.getElementById('songsList');
var btnAddSong       = document.getElementById('btnAddSong');
var btnClearPlaylist = document.getElementById('btnClearPlaylist');
var syncBar          = document.getElementById('syncBar');
var modalAddSong     = document.getElementById('modalAddSong');
var inputSongUrl     = document.getElementById('inputSongUrl');
var inputSongTitle   = document.getElementById('inputSongTitle');
var inputSongArtist  = document.getElementById('inputSongArtist');
var inputAddedBy     = document.getElementById('inputAddedBy');
var oembedStatus     = document.getElementById('oembedStatus');
var oembedPreview    = document.getElementById('oembedPreview');
var oembedThumb      = document.getElementById('oembedThumb');
var oembedTitle      = document.getElementById('oembedTitle');

function loadFromCache() {
  playlists = lsGet('rmh_playlists', []);
  canciones = lsGet('rmh_canciones', {});
  // Carga segura: stripeamos data_url antes de guardar para evitar freeze en JSON.parse
  var rawLocal = null;
  try { rawLocal = localStorage.getItem('rmh_local_canciones'); } catch(e) {}
  if (rawLocal) {
    if (rawLocal.length > MAX_LOCAL_CACHE_BYTES) {
      localCanciones = {};
      hadLocalCacheCleanup = true;
      try { localStorage.removeItem('rmh_local_canciones'); } catch(e3) {}
      return;
    }
    try {
      localCanciones = JSON.parse(rawLocal);
      var dataUrlMap = {}; // id_cancion -> data_url para migrar a IndexedDB
      var needsClean = false;
      Object.keys(localCanciones).forEach(function(pid) {
        if (!Array.isArray(localCanciones[pid])) return;
        localCanciones[pid].forEach(function(s) {
          if (s.data_url) {
            dataUrlMap[s.id_cancion] = { dataUrl: s.data_url, nombre: s.nombre_archivo || (s.id_cancion + '.mp3') };
            if (!s.local_asset_id) s.local_asset_id = s.id_cancion;
            delete s.data_url;
            needsClean = true;
          }
        });
      });
      if (needsClean) {
        // Guardar version limpia en localStorage de inmediato
        try { localStorage.setItem('rmh_local_canciones', JSON.stringify(localCanciones)); } catch(e) {}
        // Migrar data_urls a IndexedDB de forma asincrona tras el arranque
        setTimeout(function() { migrateDataUrlsToIndexedDB(dataUrlMap); }, 500);
      }
    } catch(e) {
      localCanciones = {};
      hadLocalCacheCleanup = true;
      try { localStorage.removeItem('rmh_local_canciones'); } catch(e2) {}
    }
  } else {
    localCanciones = {};
  }
}

  var okPlaylists = lsSet('rmh_playlists', playlists);

function fileToDataUrl(file) {
return new Promise(function(resolve, reject) {
var reader = new FileReader();
reader.onload = function() { resolve(reader.result || ''); };
reader.onerror = function() { reject(new Error('No se pudo leer el archivo local.')); };
reader.readAsDataURL(file);
});
}
function openMediaDb() {
return new Promise(function(resolve, reject) {
if (!window.indexedDB) { reject(new Error('IndexedDB no disponible')); return; }
var request = indexedDB.open(MEDIA_DB_NAME, MEDIA_DB_VERSION);
request.onupgradeneeded = function(e) {
var db = e.target.result;
if (!db.objectStoreNames.contains(MEDIA_STORE_NAME)) {
db.createObjectStore(MEDIA_STORE_NAME, { keyPath: 'id' });
}
};
request.onsuccess = function() { resolve(request.result); };
request.onerror = function() { reject(request.error || new Error('No se pudo abrir IndexedDB')); };
});
}
async function putLocalAsset(id, file) {
var db = await openMediaDb();
return new Promise(function(resolve, reject) {
var tx = db.transaction(MEDIA_STORE_NAME, 'readwrite');
tx.objectStore(MEDIA_STORE_NAME).put({ id: id, file: file });
tx.oncomplete = function() { resolve(); };
tx.onerror = function() { reject(tx.error); };
});
}
async function getLocalAsset(id) {
var db = await openMediaDb();
return new Promise(function(resolve, reject) {
var tx = db.transaction(MEDIA_STORE_NAME, 'readonly');
var request = tx.objectStore(MEDIA_STORE_NAME).get(id);
request.onsuccess = function() { resolve(request.result ? request.result.file : null); };
request.onerror = function() { reject(request.error); };
});
}
async function deleteLocalAsset(id) {
var db = await openMediaDb();
return new Promise(function(resolve, reject) {
var tx = db.transaction(MEDIA_STORE_NAME, 'readwrite');
tx.objectStore(MEDIA_STORE_NAME).delete(id);
tx.oncomplete = function() { resolve(); };
tx.onerror = function() { reject(tx.error); };
});
}
async function purgeLocalAssetsForSongs(songs) {
if (!Array.isArray(songs) || !songs.length) return;
for (var i = 0; i < songs.length; i++) {
  var s = songs[i];
  if (!s || !s.local_asset_id) continue;
  if (mediaObjectUrls[s.local_asset_id]) {
    try { URL.revokeObjectURL(mediaObjectUrls[s.local_asset_id]); } catch(revokeErr) {}
    delete mediaObjectUrls[s.local_asset_id];
  }
  try { await deleteLocalAsset(s.local_asset_id); } catch(delErr) {}
}
}
async function resolveSongPlaybackUrl(song) {
if (!song) return null;
if (song.data_url) { return song.data_url; }
if (song.local_asset_id) {
if (mediaObjectUrls[song.local_asset_id]) return mediaObjectUrls[song.local_asset_id];
var file = null;
try { file = await getLocalAsset(song.local_asset_id); }
catch(e) { file = null; }
if (!file) return null;
mediaObjectUrls[song.local_asset_id] = URL.createObjectURL(file);
return mediaObjectUrls[song.local_asset_id];
}
return song.url_stream || null;
}
function setPlayerNote(msg) { playerNote.innerHTML = msg || ''; }
async function migrateDataUrlsToIndexedDB(dataUrlMap) {
  var ids = Object.keys(dataUrlMap);
  if (!ids.length) return;
  var migrated = 0;
  for (var i = 0; i < ids.length; i++) {
    var id = ids[i];
    var entry = dataUrlMap[id];
    try {
      var existing = await getLocalAsset(id);
      if (existing) { migrated++; continue; } // ya existe en IndexedDB
      var res = await fetch(entry.dataUrl);
      var blob = await res.blob();
      var file = new File([blob], entry.nombre, { type: blob.type });
      await putLocalAsset(id, file);
      migrated++;
    } catch(e) { /* si falla, la cancion quedara sin audio pero sin bloquear */ }
  }
  if (migrated > 0) { saveLocalCache(); }
}

async function deletePlaylist(idPlaylist, nombre) {
  var ok = window.confirm('Eliminar la playlist "' + nombre + '" y todas sus canciones? Esta accion no se puede deshacer.');
  if (!ok) return;
  var prevPlaylists = playlists.slice();
  var prevShared = canciones[idPlaylist] ? canciones[idPlaylist].slice() : [];
  var prevLocal = localCanciones[idPlaylist] ? localCanciones[idPlaylist].slice() : [];

  await purgeLocalAssetsForSongs(prevLocal);

  if (canciones[idPlaylist] && canciones[idPlaylist].length) {
    canciones[idPlaylist] = [];
    if (!saveToCache()) {
      canciones[idPlaylist] = prevShared;
      setPlayerNote('No se pudo eliminar la playlist por falta de espacio local para actualizar el estado.');
      return;
    }
    try { await syncCanciones(idPlaylist); } catch(e) {}
  }
  if (localCanciones[idPlaylist]) {
    delete localCanciones[idPlaylist];
    if (!saveLocalCache()) {
      localCanciones[idPlaylist] = prevLocal;
      if (prevShared.length) canciones[idPlaylist] = prevShared;
      setPlayerNote('No se pudo eliminar la playlist localmente. Intenta vaciar canciones locales primero.');
      return;
    }
  }
  playlists = playlists.filter(function(p) { return p.id_playlist !== idPlaylist; });
  if (!saveToCache()) {
    playlists = prevPlaylists;
    if (prevShared.length) canciones[idPlaylist] = prevShared;
    if (prevLocal.length) localCanciones[idPlaylist] = prevLocal;
    setPlayerNote('No se pudo persistir la eliminacion de la playlist (memoria local llena).');
    return;
  }
  if (curPlaylist === idPlaylist) {
    curPlaylist = playlists.length ? playlists[0].id_playlist : null;
    stopPlayer();
    updatePlayerUI(null);
  }
  renderTabs();
  renderSongs(curPlaylist);
  syncBar.textContent = 'Playlist eliminada localmente';
  try {
    await syncPlaylists();
  } catch(syncErr) {
    reportAsyncError('No se pudo sincronizar la eliminacion en servidor', syncErr);
  }
}

function vote(idPlaylist, songId, delta) {
var sharedArr = canciones[idPlaylist] || [];
var sharedIdx = sharedArr.findIndex(function(s) { return s.id_cancion === songId; });
if (sharedIdx !== -1) {
sharedArr[sharedIdx].votos = (sharedArr[sharedIdx].votos || 0) + delta;
if (!saveToCache()) {
sharedArr[sharedIdx].votos = (sharedArr[sharedIdx].votos || 0) - delta;
setPlayerNote('No se pudo guardar el voto por falta de espacio local.');
renderSongs(idPlaylist);
return;
}
renderSongs(idPlaylist); syncCanciones(idPlaylist);
return;
}
var localArr = localCanciones[idPlaylist] || [];
var localIdx = localArr.findIndex(function(s) { return s.id_cancion === songId; });
if (localIdx === -1) return;
localArr[localIdx].votos = (localArr[localIdx].votos || 0) + delta;
if (!saveLocalCache()) {
localArr[localIdx].votos = (localArr[localIdx].votos || 0) - delta;
setPlayerNote('No se pudo guardar el voto local por falta de memoria.');
}
renderSongs(idPlaylist);
}
async function removeSong(idPlaylist, songId) {
if (!idPlaylist || !songId) return;
var songs = sortedSongs(idPlaylist);
var song = songs.find(function(s) { return s.id_cancion === songId; });
if (!song) return;
var ok = window.confirm('Eliminar "' + (song.titulo || 'esta cancion') + '" de la playlist?');
if (!ok) return;

var sharedArr = canciones[idPlaylist] || [];
var sharedIdx = sharedArr.findIndex(function(s) { return s.id_cancion === songId; });
if (sharedIdx !== -1) {
var removedShared = sharedArr.splice(sharedIdx, 1)[0];
if (!saveToCache()) {
sharedArr.splice(sharedIdx, 0, removedShared);
setPlayerNote('No se pudo eliminar la cancion por falta de espacio local.');
return;
}
await syncCanciones(idPlaylist);
}
else {
var localArr = localCanciones[idPlaylist] || [];
var localIdx = localArr.findIndex(function(s) { return s.id_cancion === songId; });
if (localIdx !== -1) {
var removedLocal = localArr.splice(localIdx, 1)[0];
if (!saveLocalCache()) {
localArr.splice(localIdx, 0, removedLocal);
setPlayerNote('No se pudo eliminar la cancion local por falta de memoria.');
return;
}
await purgeLocalAssetsForSongs([removedLocal]);
}
}

if (curSongId === songId) {
curSongId = null;
isPlaying = false;
stopPlayer();
updatePlayerUI(null);
}

renderSongs(idPlaylist);
setPlayerNote('');
}
async function clearPlaylist(idPlaylist) {
if (!idPlaylist) return;
var songs = sortedSongs(idPlaylist);
if (!songs.length) return;
var ok = window.confirm('Vas a eliminar ' + songs.length + ' canciones de esta playlist. Esta accion no se puede deshacer. Continuar?');
if (!ok) return;

var hadSharedSongs = !!((canciones[idPlaylist] || []).length);
var prevSharedSongs = (canciones[idPlaylist] || []).slice();
var prevLocalSongs = (localCanciones[idPlaylist] || []).slice();
if (!canciones[idPlaylist]) canciones[idPlaylist] = [];
canciones[idPlaylist].length = 0;
if (!localCanciones[idPlaylist]) localCanciones[idPlaylist] = [];
localCanciones[idPlaylist].length = 0;

if (!saveToCache()) {
canciones[idPlaylist] = prevSharedSongs;
localCanciones[idPlaylist] = prevLocalSongs;
setPlayerNote('No se pudo vaciar la playlist por falta de espacio local.');
return;
}
if (!saveLocalCache()) {
canciones[idPlaylist] = prevSharedSongs;
localCanciones[idPlaylist] = prevLocalSongs;
saveToCache();
setPlayerNote('No se pudo vaciar la playlist local por falta de memoria.');
return;
}
await purgeLocalAssetsForSongs(prevLocalSongs);
if (hadSharedSongs) { await syncCanciones(idPlaylist); }

if (curSongId) {
curSongId = null;
isPlaying = false;
stopPlayer();
updatePlayerUI(null);
}

renderSongs(idPlaylist);
setPlayerNote('Playlist vaciada.');
}
btnPlayPause.addEventListener('click', function() {
if (!curPlaylist) return;
var songs = sortedSongs(curPlaylist);
if (!songs.length) return;
if (!isPlaying || !curSongId) { loadSong(curPlaylist, 0); }
else {
var currentSongs = sortedSongs(curPlaylist);
var currentSong = currentSongs.find(function(s) { return s.id_cancion === curSongId; });
if (currentSong && currentSong.plataforma === 'native' && window.CarorurNativeMusic) {
if (isPlaying) {
if (typeof window.CarorurNativeMusic.stopNativeAudio === 'function') { window.CarorurNativeMusic.stopNativeAudio(); }
isPlaying = false;
vinylRecord.classList.remove('spinning');
btnPlayPause.textContent = '\u25B6';
renderSongs(curPlaylist);
return;
}
if (typeof window.CarorurNativeMusic.playNativeAudio === 'function') {
window.CarorurNativeMusic.playNativeAudio(currentSong.native_uri || '');
isPlaying = true;
vinylRecord.classList.add('spinning');
btnPlayPause.textContent = '\u23F8';
renderSongs(curPlaylist);
return;
}
}
isPlaying = !isPlaying;
vinylRecord.classList.toggle('spinning', isPlaying);
btnPlayPause.textContent = isPlaying ? '\u23F8' : '\u25B6';
if (!playerAudioWrap.hidden) {
if (isPlaying) playerAudio.play();
else playerAudio.pause();
}
}
});
btnPrev.addEventListener('click', function() {
if (!curPlaylist) return;
var songs = sortedSongs(curPlaylist);
if (!songs.length) return;
var ci = songs.findIndex(function(s) { return s.id_cancion === curSongId; });
loadSong(curPlaylist, ci <= 0 ? songs.length - 1 : ci - 1);
});
btnNext.addEventListener('click', function() {
if (!curPlaylist) return;
var songs = sortedSongs(curPlaylist);
if (!songs.length) return;
var ci = songs.findIndex(function(s) { return s.id_cancion === curSongId; });
loadSong(curPlaylist, (ci + 1) % songs.length);
});
btnAddSong.addEventListener('click', openModalAddSong);
btnClearPlaylist.addEventListener('click', function() {
clearPlaylist(curPlaylist).catch(function(err) {
reportAsyncError('Error vaciando playlist', err);
});
});
document.getElementById('btnCancelSong').addEventListener('click', closeModalAddSong);
modalAddSong.addEventListener('click', function(e) { if (e.target === modalAddSong) closeModalAddSong(); });
function openModalAddSong() {
inputSongUrl.value = ''; inputSongTitle.value = ''; inputSongArtist.value = '';
inputAddedBy.value = lsGet('rmh_lastuser', '');
oembedStatus.textContent = ''; oembedStatus.className = 'form-hint';
oembedPreview.hidden = true; pendingPortada = ''; pendingLocalFile = null; pendingNativeTrack = null; inputLocalFile.value = '';
modalAddSong.hidden = false; setTimeout(function() { inputSongUrl.focus(); }, 50);
}
function closeModalAddSong() { modalAddSong.hidden = true; }
window.onNativeAudioSelected = function(payload) {
var data = payload;
if (typeof payload === 'string') {
try { data = JSON.parse(payload); } catch(e) { data = null; }
}
if (!data || !data.uri) {
oembedStatus.textContent = 'No se pudo leer el archivo seleccionado del movil.';
oembedStatus.className = 'form-hint err';
return;
}
pendingNativeTrack = {
uri: data.uri,
title: data.title || '',
artist: data.artist || ''
};
pendingLocalFile = null;
inputSongUrl.value = '';
pendingPortada = '';
if (!inputSongTitle.value) { inputSongTitle.value = pendingNativeTrack.title || 'Cancion local'; }
if (!inputSongArtist.value) { inputSongArtist.value = pendingNativeTrack.artist || ''; }
oembedPreview.hidden = true;
oembedStatus.textContent = 'Cancion local seleccionada en Android: ' + (pendingNativeTrack.title || 'Archivo de audio');
oembedStatus.className = 'form-hint ok';
};
window.onNativeAudioPickerError = function(message) {
oembedStatus.textContent = message || 'No se pudo completar la seleccion nativa de audio.';
oembedStatus.className = 'form-hint err';
};
btnPickLocalFile.addEventListener('click', function() {
if (hasNativeMusicBridge()) {
window.CarorurNativeMusic.pickAudioForPlaylist();
oembedStatus.textContent = 'Abriendo selector nativo de audio...';
oembedStatus.className = 'form-hint';
return;
}
inputLocalFile.click();
});
inputLocalFile.addEventListener('change', function() {
var file = inputLocalFile.files && inputLocalFile.files[0];
if (!file) return;
pendingLocalFile = file;
pendingNativeTrack = null;
inputSongUrl.value = '';
pendingPortada = '';
if (!inputSongTitle.value) { inputSongTitle.value = file.name.replace(/\.[^.]+$/, ''); }
oembedPreview.hidden = true;
oembedStatus.textContent = 'Archivo local seleccionado: ' + file.name;
oembedStatus.className = 'form-hint ok';
});
inputSongUrl.addEventListener('input', function() {
clearTimeout(oembedTimer);
var url = inputSongUrl.value.trim();
// Solo cancelar track/fichero pendiente si el usuario ha pegado una URL real
if (url) { pendingLocalFile = null; pendingNativeTrack = null; }
if (!url) { oembedStatus.textContent = ''; oembedPreview.hidden = true; return; }
oembedStatus.textContent = 'Buscando info...'; oembedStatus.className = 'form-hint';
oembedTimer = setTimeout(function() { tryFetchOEmbed(url); }, 800);
});
async function tryFetchOEmbed(url) {
var platform = detectPlatform(url);
if (platform === 'audio') { oembedStatus.textContent = 'Audio directo detectado - se reproducira dentro de la app'; oembedStatus.className = 'form-hint ok'; oembedPreview.hidden = true; return; }
if (platform === 'amazonmusic') { oembedStatus.textContent = 'Amazon Music no permite incrustacion aqui. Se guardara el enlace, pero la apertura externa sera manual.'; oembedStatus.className = 'form-hint'; oembedPreview.hidden = true; return; }
if (platform === 'link') { oembedStatus.textContent = 'Enlace directo - rellena el titulo manualmente'; oembedStatus.className = 'form-hint'; oembedPreview.hidden = true; return; }
var data = await fetchOEmbed(url, platform);
if (!data) { oembedStatus.textContent = 'No se pudo obtener la info - rellena manualmente'; oembedStatus.className = 'form-hint err'; oembedPreview.hidden = true; return; }
if (!inputSongTitle.value && data.title) { inputSongTitle.value = data.title.replace(/\s*[-|]\s*(official\s*(video|audio|music video|lyric video|mv)|lyrics?|hd|4k)\s*$/i,'').trim(); }
if (!inputSongArtist.value && data.author_name) { inputSongArtist.value = data.author_name; }
pendingPortada = data.thumbnail_url || '';
if (pendingPortada) { oembedThumb.src = pendingPortada; oembedTitle.textContent = data.title || ''; oembedAuthor.textContent = data.author_name || ''; oembedPreview.hidden = false; }
oembedStatus.textContent = 'Info detectada (' + platformLabel(platform) + ')'; oembedStatus.className = 'form-hint ok';
}
document.getElementById('btnSaveSong').addEventListener('click', async function() {
var url = inputSongUrl.value.trim(); var titulo = inputSongTitle.value.trim();
if (!url && !pendingLocalFile && !pendingNativeTrack) { inputSongUrl.focus(); return; }
if (!titulo) { inputSongTitle.focus(); return; }
oembedStatus.textContent = '';
oembedStatus.className = 'form-hint';
var cancion;
if (pendingNativeTrack) {
cancion = { id_cancion: genId('C'), id_playlist: curPlaylist, titulo: titulo, artista: inputSongArtist.value.trim() || pendingNativeTrack.artist || '', url_stream: '', plataforma: 'native', native_uri: pendingNativeTrack.uri, portada_url: '', votos: 0, anadido_por: inputAddedBy.value.trim(), fecha_added: new Date().toISOString().split('T')[0], local_only: true };
if (!localCanciones[curPlaylist]) localCanciones[curPlaylist] = [];
localCanciones[curPlaylist].push(cancion);
if (!saveLocalCache()) {
localCanciones[curPlaylist].pop();
oembedStatus.textContent = 'No se pudo guardar la referencia local en este dispositivo.';
oembedStatus.className = 'form-hint err';
return;
}
}
else if (pendingLocalFile) {
var localAssetId = genId('LOCAL');
try { await putLocalAsset(localAssetId, pendingLocalFile); }
catch(e) {
oembedStatus.textContent = 'No se pudo guardar el audio en el almacenamiento del dispositivo. Prueba con un archivo mas pequeño o reinicia la app.';
oembedStatus.className = 'form-hint err';
return;
}
cancion = { id_cancion: genId('C'), id_playlist: curPlaylist, titulo: titulo, artista: inputSongArtist.value.trim(), url_stream: '', plataforma: 'local', portada_url: '', votos: 0, anadido_por: inputAddedBy.value.trim(), fecha_added: new Date().toISOString().split('T')[0], local_only: true, local_asset_id: localAssetId, nombre_archivo: pendingLocalFile.name };
if (!localCanciones[curPlaylist]) localCanciones[curPlaylist] = [];
localCanciones[curPlaylist].push(cancion);
if (!saveLocalCache()) {
localCanciones[curPlaylist].pop();
try { await deleteLocalAsset(localAssetId); } catch(cleanErr) {}
oembedStatus.textContent = 'Memoria local llena. Borra canciones locales o vacia una playlist para seguir guardando.';
oembedStatus.className = 'form-hint err';
return;
}
}
else {
var platform = detectPlatform(url);
cancion = { id_cancion: genId('C'), id_playlist: curPlaylist, titulo: titulo, artista: inputSongArtist.value.trim(), url_stream: url, plataforma: platform, portada_url: pendingPortada, votos: 0, anadido_por: inputAddedBy.value.trim(), fecha_added: new Date().toISOString().split('T')[0] };
if (!canciones[curPlaylist]) canciones[curPlaylist] = [];
canciones[curPlaylist].push(cancion);
if (!saveToCache()) {
  canciones[curPlaylist].pop();
  oembedStatus.textContent = 'No se pudo guardar la cancion por falta de espacio en almacenamiento local.';
  oembedStatus.className = 'form-hint err';
  return;
}
await syncCanciones(curPlaylist);
}
lsSet('rmh_lastuser', cancion.anadido_por);
closeModalAddSong(); renderSongs(curPlaylist);
});
playerAudio.addEventListener('play', function() {
isPlaying = true;
vinylRecord.classList.add('spinning');
btnPlayPause.textContent = '\u23F8';
if (curPlaylist) renderSongs(curPlaylist);
});
playerAudio.addEventListener('pause', function() {
if (!playerAudio.ended) {
isPlaying = false;
vinylRecord.classList.remove('spinning');
btnPlayPause.textContent = '\u25B6';
if (curPlaylist) renderSongs(curPlaylist);
}
});
playerAudio.addEventListener('ended', function() {
btnNext.click();
});
document.getElementById('btnCancelPlaylist').addEventListener('click', closeModalPlaylist);
modalNewPlaylist.addEventListener('click', function(e) { if (e.target === modalNewPlaylist) closeModalPlaylist(); });
function openModalPlaylist() { inputPlName.value = ''; inputPlCreator.value = lsGet('rmh_lastuser', ''); modalNewPlaylist.hidden = false; setTimeout(function() { inputPlName.focus(); }, 50); }
function closeModalPlaylist() { modalNewPlaylist.hidden = true; }
document.getElementById('btnSavePlaylist').addEventListener('click', async function() {
var nombre = inputPlName.value.trim();
if (!nombre) { inputPlName.focus(); return; }
var playlist = { id_playlist: genId('PL'), nombre: nombre.toUpperCase(), creador: inputPlCreator.value.trim(), fecha_creacion: new Date().toISOString().split('T')[0] };
playlists.push(playlist); canciones[playlist.id_playlist] = [];
localCanciones[playlist.id_playlist] = [];
lsSet('rmh_lastuser', playlist.creador);
saveToCache(); saveLocalCache(); closeModalPlaylist(); renderTabs(); selectPlaylist(playlist.id_playlist);
await syncPlaylists();
});
async function init() {
loadFromCache(); renderTabs();
if (curPlaylist) renderSongs(curPlaylist);
setSyncStatus('Sincronizando...', 'syncing');
var ok = await fetchFromSheets();
if (ok) { setSyncStatus('Sincronizado', 'synced'); setTimeout(function() { setSyncStatus(''); }, 3000); }
else { setSyncStatus(playlists.length ? 'Sin conexion (modo local)' : '', ''); }
if (hadLocalCacheCleanup) {
  setPlayerNote('Se ha limpiado cache local de audio para evitar bloqueos por memoria. Puedes volver a anadir canciones locales.');
}
renderTabs();
if (playlists.length > 0 && !curPlaylist) { selectPlaylist(playlists[0].id_playlist); }
else if (curPlaylist) { renderSongs(curPlaylist); }
}
init();
if (hasNativeMusicBridge()) {
btnPickLocalFile.textContent = 'Seleccionar audio del movil (Android nativo)';
inputLocalFile.disabled = true;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NUESTRA MUSICA FAVORITA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="vistas.css" />
<style>
.vista-contenido {
  padding: 0.9rem !important;
  display: flex !important;
  align-items: center;
  justify-content: center;
}
.player-shell {
  width: min(94vw, 520px);
  background: var(--papel-claro);
  border: 2px solid var(--papel-oscuro);
  border-radius: 16px;
  box-shadow: var(--sombra-papel);
  padding: 1.2rem 1rem;
}
.player-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.9rem;
}
.vinyl-wrap {
  width: 210px;
  height: 210px;
}
.vinyl-record {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background:
    radial-gradient(circle at center, transparent 28%, rgba(255,255,255,0.04) 29%, transparent 31%),
    radial-gradient(circle at center, transparent 35%, rgba(255,255,255,0.03) 36%, transparent 38%),
    radial-gradient(circle at center, transparent 42%, rgba(255,255,255,0.03) 43%, transparent 45%),
    radial-gradient(circle at center, transparent 49%, rgba(255,255,255,0.03) 50%, transparent 52%),
    radial-gradient(circle at center, transparent 56%, rgba(255,255,255,0.03) 57%, transparent 59%),
    radial-gradient(circle at center, transparent 63%, rgba(255,255,255,0.03) 64%, transparent 66%),
    radial-gradient(circle at center, transparent 70%, rgba(255,255,255,0.03) 71%, transparent 73%),
    linear-gradient(135deg, #2a1810 0%, #1a0f0a 50%, #2a1810 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: vinylSpin 5s linear infinite;
  animation-play-state: paused;
  box-shadow: 0 8px 24px rgba(0,0,0,0.42), inset 0 0 18px rgba(0,0,0,0.32);
}
.vinyl-record.spinning {
  animation-play-state: running;
}
.vinyl-center {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--papel-medio);
  border: 3px solid #7a5230;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.vinyl-center img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}
.vinyl-center-icon {
  font-size: 2rem;
}
@keyframes vinylSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.song-info {
  text-align: center;
  max-width: 320px;
}
.song-info-title {
  margin: 0;
  font-family: 'Special Elite', cursive;
  font-size: 1.02rem;
  color: var(--tinta-rural);
}
.song-info-artist {
  margin: 0.2rem 0 0;
  font-size: 0.9rem;
  color: var(--tinta-rural-suave);
}
.player-audio-wrap {
  width: 100%;
  max-width: 390px;
}
.player-audio-wrap audio {
  width: 100%;
}
.player-controls {
  display: flex;
  align-items: center;
  gap: 0.9rem;
}
.ctrl-btn {
  background: none;
  border: 2px solid var(--papel-oscuro);
  border-radius: 50%;
  width: 42px;
  height: 42px;
  cursor: pointer;
  color: var(--tinta-rural);
}
.ctrl-btn.play-btn {
  width: 54px;
  height: 54px;
  font-size: 1.15rem;
  background: var(--tinta-rural);
  color: var(--papel-claro);
  border-color: var(--tinta-rural);
}
.player-note {
  text-align: center;
  font-size: 0.75rem;
  color: var(--tinta-rural-suave);
  min-height: 1rem;
}
@media (max-width: 640px) {
  .vista-contenido {
    align-items: flex-start;
    overflow: auto !important;
  }
  .player-shell {
    width: min(95vw, 460px);
  }
  .vinyl-wrap {
    width: 172px;
    height: 172px;
  }
  .vinyl-center {
    width: 64px;
    height: 64px;
  }
}
</style>
</head>
<body>
<div class="vista-app">
  <header class="vista-header">
    <a class="btn-volver" href="../index.html" target="_top" aria-label="Volver al inicio" id="btnVolverCabecera">
      <img src="../iconos/volver.png" alt="Volver" />
    </a>
    <h1>NUESTRA MUSICA FAVORITA</h1>
    <div class="header-espaciador" aria-hidden="true"></div>
  </header>

  <main class="vista-contenido">
    <section class="player-shell" aria-label="Reproductor de musica">
      <div class="player-card">
        <div class="vinyl-wrap">
          <div class="vinyl-record" id="vinylRecord">
            <div class="vinyl-center">
              <span class="vinyl-center-icon" id="albumDefault">&#127925;</span>
              <img id="albumArt" src="" alt="Portada" />
            </div>
          </div>
        </div>

        <div class="song-info">
          <p class="song-info-title" id="songTitle">Sin cancion seleccionada</p>
          <p class="song-info-artist" id="songArtist">&#8212;</p>
        </div>

        <div class="player-audio-wrap" id="playerAudioWrap">
          <audio id="playerAudio" controls preload="metadata"></audio>
        </div>

        <div class="player-controls">
          <button class="ctrl-btn" id="btnPrev" aria-label="Anterior">&#9198;</button>
          <button class="ctrl-btn play-btn" id="btnPlayPause" aria-label="Reproducir">&#9654;</button>
          <button class="ctrl-btn" id="btnNext" aria-label="Siguiente">&#9197;</button>
        </div>

        <div class="player-note" id="playerNote">Base limpia lista para reconstruir la logica.</div>
      </div>
    </section>
  </main>
</div>

<script>
(function () {
  var btnVolverCabecera = document.getElementById('btnVolverCabecera');
  var vinylRecord = document.getElementById('vinylRecord');
  var playerAudio = document.getElementById('playerAudio');
  var btnPlayPause = document.getElementById('btnPlayPause');
  var btnPrev = document.getElementById('btnPrev');
  var btnNext = document.getElementById('btnNext');
  var playerNote = document.getElementById('playerNote');

  var isPlaying = false;

  btnVolverCabecera.addEventListener('click', function (e) {
    e.preventDefault();
    try {
      if (window.top !== window && typeof window.top.carorurCloseVista === 'function') {
        window.top.carorurCloseVista();
      } else if (window.top !== window && window.top.postMessage) {
        window.top.postMessage('carorur:close-vista', '*');
      } else {
        window.location.href = '../index.html';
      }
    } catch (err) {
      window.location.href = '../index.html';
    }
  });

  function setPlayingState(nextState) {
    isPlaying = !!nextState;
    vinylRecord.classList.toggle('spinning', isPlaying);
    btnPlayPause.innerHTML = isPlaying ? '&#9208;' : '&#9654;';
  }

  btnPlayPause.addEventListener('click', function () {
    if (!playerAudio.src) {
      playerNote.textContent = 'Aun no hay audio cargado. Empezaremos desde esta base limpia.';
      setPlayingState(false);
      return;
    }

    if (isPlaying) {
      playerAudio.pause();
      setPlayingState(false);
      return;
    }

    playerAudio.play().then(function () {
      setPlayingState(true);
      playerNote.textContent = '';
    }).catch(function () {
      setPlayingState(false);
      playerNote.textContent = 'No se pudo iniciar la reproduccion.';
    });
  });

  btnPrev.addEventListener('click', function () {
    playerNote.textContent = 'Boton anterior listo para la siguiente fase.';
  });

  btnNext.addEventListener('click', function () {
    playerNote.textContent = 'Boton siguiente listo para la siguiente fase.';
  });

  playerAudio.addEventListener('pause', function () {
    if (!playerAudio.ended) setPlayingState(false);
  });

  playerAudio.addEventListener('play', function () {
    setPlayingState(true);
  });

  playerAudio.addEventListener('ended', function () {
    setPlayingState(false);
  });
})();
</script>
</body>
</html>

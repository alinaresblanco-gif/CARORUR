<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Nuestro Menu</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="vistas.css" />
</head>
<body>
	<div class="vista-app">
		<header class="vista-header">
			<a class="btn-volver" href="../index.html" target="_top" aria-label="Volver al inicio">

			</a>
			<h1>Nuestro Menu</h1>
			<div class="header-espaciador" aria-hidden="true"></div>

		<main class="vista-contenido">
			<section class="tarjeta-construccion" aria-label="Vista en construccion">
				<h2>Vista en construccion</h2>
				<p>Pronto añadiremos contenido rural para esta seccion.</p>
				<img class="img-rustica" src="../imagenes/rustica-vista.svg" alt="Ilustracion rustica de campo" />
			</section>
		</main>

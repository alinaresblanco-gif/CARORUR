<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Nuestro Menú</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="vistas.css" />
	<style>
		/* ---- Scroll en esta vista ---- */
		html, body { overflow: hidden; }

		.vista-contenido {
			display: block;
			overflow-y: auto;
			-webkit-overflow-scrolling: touch;
			padding: 14px 12px 28px;
		}

		/* ---- Acordeón ---- */
		.acordeon {
			display: flex;
			flex-direction: column;
			gap: 10px;
			width: 100%;
			max-width: none;
			margin: 0;
		}

		/* ---- Tarjeta de día ---- */
		.dia-card {
			background: rgba(72, 36, 10, 0.88);
			border: 1px solid rgba(40, 18, 4, 0.7);
			border-radius: 8px;
			box-shadow: 0 4px 14px rgba(0,0,0,0.3);
			overflow: hidden;
		}

		/* ---- Cabecera del día ---- */
		.dia-header {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 12px 14px;
			cursor: pointer;
			user-select: none;
			-webkit-tap-highlight-color: transparent;
		}

		.dia-chevron {
			width: 14px;
			height: 14px;
			flex-shrink: 0;
			border-left: 3px solid #f5e8d0;
			border-bottom: 3px solid #f5e8d0;
			transform: rotate(-45deg);
			transition: transform 0.25s;
			margin-bottom: 3px;
		}

		.dia-card.abierto .dia-chevron {
			transform: rotate(-225deg);
			margin-bottom: -3px;
		}

		.fecha-label {
			flex: 1;
			font-family: 'Special Elite', serif;
			font-size: clamp(0.95rem, 3.2vw, 1.25rem);
			color: #f5e8d0;
			letter-spacing: 0.04em;
		}

		.fecha-label .dia-semana {
			font-size: 0.78em;
			opacity: 0.7;
			margin-left: 8px;
		}

		/* ---- Botón calendario con input transparente encima ---- */
		.fecha-picker-wrap {
			position: relative;
			flex-shrink: 0;
		}

		.btn-fecha {
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(255,255,255,0.13);
			border: 1px solid rgba(255,245,220,0.28);
			border-radius: 5px;
			color: #f5e8d0;
			width: 32px;
			height: 32px;
			font-size: 1rem;
			cursor: pointer;
			pointer-events: none;
		}

		.input-fecha-overlay {
			position: absolute;
			inset: 0;
			opacity: 0;
			cursor: pointer;
			width: 100%;
			height: 100%;
			border: none;
			background: transparent;
		}

		/* ---- Botón eliminar día ---- */
		.btn-eliminar-dia {
			background: transparent;
			border: none;
			color: rgba(255,210,190,0.5);
			font-size: 1.1rem;
			cursor: pointer;
			padding: 2px 4px;
			line-height: 1;
			flex-shrink: 0;
		}

		.btn-eliminar-dia:hover,
		.btn-eliminar-dia:active { color: #ff9977; }

		.btn-foto-dia {
			background: rgba(255,255,255,0.13);
			border: 1px solid rgba(255,245,220,0.28);
			border-radius: 5px;
			color: #f5e8d0;
			width: 32px;
			height: 32px;
			font-size: 1rem;
			cursor: pointer;
			flex-shrink: 0;
		}

		.btn-foto-dia:hover,
		.btn-foto-dia:active {
			background: rgba(255,255,255,0.22);
		}

		.input-foto-dia {
			display: none;
		}

		/* ---- Cuerpo del día ---- */
		.dia-body {
			display: none;
			flex-direction: column;
			gap: 12px;
			padding: 0 14px 16px;
			background: rgba(255, 248, 232, 0.93);
			animation: bodyReveal 220ms ease both;
		}

		.dia-card.abierto .dia-body { display: flex; }

		@keyframes bodyReveal {
			from { opacity: 0; transform: translateY(-6px); }
			to   { opacity: 1; transform: translateY(0); }
		}

		/* ---- Sección momento del día ---- */
		.momento {
			display: flex;
			flex-direction: column;
			gap: 5px;
		}

		.momento-titulo {
			font-family: 'Special Elite', serif;
			font-size: clamp(0.85rem, 2.6vw, 1.05rem);
			color: #5a3418;
			letter-spacing: 0.1em;
			padding: 8px 0 4px;
			border-bottom: 1px solid rgba(90,52,24,0.22);
		}

		.comida-input {
			width: 100%;
			background: rgba(255, 252, 242, 0.9);
			border: 1px solid rgba(100, 64, 28, 0.28);
			border-radius: 4px;
			padding: 7px 10px;
			font-family: 'Crimson Text', serif;
			font-size: clamp(1rem, 3vw, 1.1rem);
			color: #3d1f0c;
			outline: none;
			transition: border-color 0.15s, background 0.15s;
		}

		.comida-input:focus {
			border-color: #7d542d;
			background: #fff;
		}

		.comida-input::placeholder { color: rgba(90,52,24,0.38); }

		.ingrediente-item {
			display: flex;
			flex-direction: column;
			gap: 6px;
			padding: 2px 0;
		}

		.ingrediente-item.seleccionado .comida-input {
			border-color: #7d542d;
			box-shadow: 0 0 0 2px rgba(125, 84, 45, 0.16);
		}

		.foto-box {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 8px;
			align-items: center;
			background: rgba(121, 82, 44, 0.1);
			border: 1px solid rgba(121, 82, 44, 0.25);
			border-radius: 6px;
			padding: 6px;
		}

		.foto-preview {
			width: 100%;
			max-height: 160px;
			object-fit: cover;
			border-radius: 4px;
			border: 1px solid rgba(60, 33, 14, 0.25);
		}

		.btn-quitar-foto {
			border: 1px solid rgba(60, 33, 14, 0.25);
			background: #fff;
			color: #5a3418;
			border-radius: 4px;
			padding: 5px 8px;
			font-family: 'Crimson Text', serif;
			font-size: 0.95rem;
			cursor: pointer;
		}

		/* ---- Botón añadir día ---- */
		.btn-agregar-dia {
			display: block;
			width: 100%;
			max-width: none;
			margin: 10px 0 0;
			padding: 11px;
			background: rgba(72, 36, 10, 0.5);
			border: 2px dashed rgba(245, 232, 208, 0.35);
			border-radius: 8px;
			color: #f5e8d0;
			font-family: 'Special Elite', serif;
			font-size: clamp(0.9rem, 2.8vw, 1.05rem);
			letter-spacing: 0.06em;
			cursor: pointer;
			transition: background 0.18s;
		}

		.btn-agregar-dia:hover,
		.btn-agregar-dia:active { background: rgba(72, 36, 10, 0.82); }

		/* ---- Botón Borrar Menú ---- */
		.acciones-menu {
			display: inline-flex;
			align-items: center;
			justify-content: flex-end;
			gap: 8px;
		}

		.btn-guardar-menu,
		.btn-borrar-menu {
			display: inline-flex;
			flex-direction: column;
			align-items: center;
			gap: 2px;
			background: transparent;
			border: none;
			cursor: pointer;
			padding: 4px 2px;
			color: rgba(245, 232, 208, 0.75);
			-webkit-tap-highlight-color: transparent;
			flex-shrink: 0;
			transition: color 0.18s;
		}

		.btn-guardar-menu span.icono,
		.btn-borrar-menu span.icono {
			font-size: 1.3rem;
			line-height: 1;
		}

		.btn-guardar-menu span.texto,
		.btn-borrar-menu span.texto {
			font-family: 'Crimson Text', serif;
			font-size: 0.72rem;
			letter-spacing: 0.04em;
			white-space: nowrap;
		}

		.btn-guardar-menu:hover,
		.btn-guardar-menu:active { color: #b4ffd0; }

		.btn-guardar-menu[disabled] {
			opacity: 0.5;
			cursor: wait;
		}

		.btn-borrar-menu:hover,
		.btn-borrar-menu:active { color: #ff9977; }
	</style>
</head>
<body>
	<div class="vista-app">
		<header class="vista-header">
			<a class="btn-volver" href="../index.html" target="_top" aria-label="Volver al inicio">
				<img src="../iconos/volver.png" alt="Volver" />
			</a>
			<h1 style="text-transform:uppercase;">NUESTRO MENÚ</h1>
			<div class="acciones-menu">
				<button class="btn-guardar-menu" id="btn-guardar-menu" type="button" title="Guardar menú en Google Sheets">
					<span class="icono">💾</span>
					<span class="texto">Guardar Menú</span>
				</button>
				<button class="btn-borrar-menu" id="btn-borrar-menu" type="button" title="Borrar todo el menú">
					<span class="icono">🗑️</span>
					<span class="texto">Borrar Menú</span>
				</button>
			</div>
		</header>

		<main class="vista-contenido" id="contenido-gastronomia">
			<div class="acordeon" id="acordeon"></div>
			<button class="btn-agregar-dia" id="btn-agregar-dia">+ Añadir día</button>
		</main>
	</div>

	<script>
	(function () {
		'use strict';

		var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyAwDvr5yoiCkArUvxvxlyE8czZ_0fnC6XDW50ov0xyimZsAiHmJFDl0cki4uFzx1w7/exec';
		var MENU_ID = 'principal';
		var UPDATED_BY = 'carorur-app';
		var STORAGE_KEY  = 'carorur_gastronomia';
		var MOMENTOS     = ['DESAYUNO', 'APERITIVO', 'COMIDA', 'CENA'];
		var DIAS_SEMANA  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

		var acordeon   = document.getElementById('acordeon');
		var btnAgregar = document.getElementById('btn-agregar-dia');
		var btnGuardar = document.getElementById('btn-guardar-menu');
		var btnBorrar  = document.getElementById('btn-borrar-menu');
		var contenido  = document.getElementById('contenido-gastronomia');
		var seleccionActiva = null;

		/* ---- Datos ---- */
		var days = cargarDatos().map(normalizarDia);
		if (days.length === 0) {
			days = [crearDia(), crearDia(), crearDia()];
		}

		function crearDia() {
			var comidas = {};
			var fotos = {};
			MOMENTOS.forEach(function (m) {
				comidas[m] = [''];
				fotos[m] = [''];
			});
			return { id: Date.now() + Math.random(), fecha: '', abierto: false, comidas: comidas, fotos: fotos };
		}

		function normalizarDia(dia) {
			if (!dia || typeof dia !== 'object') return crearDia();
			if (!dia.comidas || typeof dia.comidas !== 'object') dia.comidas = {};
			if (!dia.fotos || typeof dia.fotos !== 'object') dia.fotos = {};

			MOMENTOS.forEach(function (momento) {
				if (!Array.isArray(dia.comidas[momento])) dia.comidas[momento] = [''];
				if (!Array.isArray(dia.fotos[momento])) dia.fotos[momento] = [];

				dia.comidas[momento] = dia.comidas[momento].map(function (txt) {
					return typeof txt === 'string' ? txt : '';
				});

				if (dia.comidas[momento].length === 0) dia.comidas[momento].push('');
				while (dia.fotos[momento].length < dia.comidas[momento].length) dia.fotos[momento].push('');
			});

			if (typeof dia.abierto !== 'boolean') dia.abierto = false;
			dia.fecha = normalizarFechaIso(dia.fecha);
			return dia;
		}

		function normalizarFechaIso(valor) {
			if (!valor) return '';

			var txt = String(valor).trim();

			if (/^\d{4}-\d{2}-\d{2}$/.test(txt)) return txt;

			if (/^\d{4}-\d{2}-\d{2}T/.test(txt)) {
				return txt.slice(0, 10);
			}

			var mEs = txt.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
			if (mEs) {
				var d = mEs[1].padStart(2, '0');
				var m = mEs[2].padStart(2, '0');
				var y = mEs[3];
				return y + '-' + m + '-' + d;
			}

			var dt = new Date(txt);
			if (!isNaN(dt.getTime())) {
				var y2 = String(dt.getFullYear());
				var m2 = String(dt.getMonth() + 1).padStart(2, '0');
				var d2 = String(dt.getDate()).padStart(2, '0');
				return y2 + '-' + m2 + '-' + d2;
			}

			return '';
		}

		function cargarDatos() {
			try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
			catch (e) { return []; }
		}

		function guardarDatos() {
			localStorage.setItem(STORAGE_KEY, JSON.stringify(days));
		}

		function serializarFilasParaSheet() {
			var rows = [];
			days.forEach(function (dia) {
				MOMENTOS.forEach(function (momento) {
					var comidas = dia.comidas[momento] || [];
					var fotos = dia.fotos[momento] || [];
					var semana = formatearFecha(dia.fecha).diaSemana || '';

					comidas.forEach(function (txt, idx) {
						var comida = (txt || '').trim();
						if (!comida) return;
						rows.push({
							dia_id: String(dia.id),
							fecha_iso: dia.fecha || '',
							dia_semana: semana,
							momento: momento,
							item_orden: idx + 1,
							comida: comida,
							foto_url: /^https?:\/\//i.test(fotos[idx] || '') ? fotos[idx] : '',
							deleted: false
						});
					});
				});
			});
			return rows;
		}

		function reconstruirDesdeFilas(rows) {
			var mapa = {};
			var ordenIds = [];

			(rows || []).forEach(function (r) {
				if (!r || !r.dia_id) return;
				if (!mapa[r.dia_id]) {
					var nuevo = crearDia();
					nuevo.id = r.dia_id;
					nuevo.fecha = normalizarFechaIso(r.fecha_iso);
					nuevo.abierto = false;
					MOMENTOS.forEach(function (m) {
						nuevo.comidas[m] = [];
						nuevo.fotos[m] = [];
					});
					mapa[r.dia_id] = nuevo;
					ordenIds.push(r.dia_id);
				}

				var dia = mapa[r.dia_id];
				var momento = MOMENTOS.indexOf(r.momento) >= 0 ? r.momento : 'COMIDA';
				dia.comidas[momento].push(r.comida || '');
				dia.fotos[momento].push(r.foto_url || '');
			});

			var reconstruido = ordenIds.map(function (id) { return mapa[id]; });
			reconstruido.forEach(function (dia) {
				MOMENTOS.forEach(function (momento) {
					if (dia.comidas[momento].length === 0) {
						dia.comidas[momento].push('');
						dia.fotos[momento].push('');
					}
				});
			});

			return reconstruido.length ? reconstruido : [crearDia(), crearDia(), crearDia()];
		}

		async function postAppsScript(payload) {
			var res = await fetch(APPS_SCRIPT_URL, {
				method: 'POST',
				headers: { 'Content-Type': 'text/plain;charset=utf-8' },
				body: JSON.stringify(payload)
			});
			var data = await res.json();
			if (!data.ok) throw new Error(data.error || 'Error en Apps Script');
			return data;
		}

		async function cargarMenuNube() {
			var url = APPS_SCRIPT_URL + '?action=getMenu&menu_id=' + encodeURIComponent(MENU_ID);
			var res = await fetch(url);
			var data = await res.json();
			if (!data.ok) throw new Error(data.error || 'No se pudo cargar menú');
			days = reconstruirDesdeFilas(data.rows || []);
			guardarDatos();
		}

		async function guardarMenuNube() {
			btnGuardar.disabled = true;
			try {
				await postAppsScript({
					action: 'saveMenu',
					menu_id: MENU_ID,
					updated_by: UPDATED_BY,
					rows: serializarFilasParaSheet()
				});
				alert('Menú guardado en Google Sheets.');
			} catch (err) {
				alert('No se pudo guardar en la nube: ' + err.message);
			} finally {
				btnGuardar.disabled = false;
			}
		}

		async function borrarMenuNube() {
			await postAppsScript({ action: 'clearMenu', menu_id: MENU_ID });
		}

		function formatearFecha(isoDate) {
			var fechaIso = normalizarFechaIso(isoDate);
			if (!fechaIso) return { texto: '', diaSemana: '' };
			var p = fechaIso.split('-');
			var fecha = new Date(parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10));
			return {
				texto:     String(fecha.getDate()).padStart(2,'0') + '/' +
				           String(fecha.getMonth()+1).padStart(2,'0') + '/' + fecha.getFullYear(),
				diaSemana: DIAS_SEMANA[fecha.getDay()]
			};
		}

		/* ---- Render ---- */
		function render() {
			acordeon.innerHTML = '';
			days.forEach(function (dia, idx) { renderDia(dia, idx); });
		}

		function renderDia(dia, idx) {
			var fmt  = formatearFecha(dia.fecha);
			var card = document.createElement('div');
			card.className = 'dia-card' + (dia.abierto ? ' abierto' : '');

			/* Cabecera */
			var header  = document.createElement('div');
			header.className = 'dia-header';

			var chevron = document.createElement('div');
			chevron.className = 'dia-chevron';

			var etiqueta = document.createElement('div');
			etiqueta.className = 'fecha-label';
			if (dia.fecha) {
				etiqueta.innerHTML = fmt.texto +
					'<span class="dia-semana">' + fmt.diaSemana + '</span>';
			} else {
				etiqueta.innerHTML = '<em style="opacity:0.55;font-style:normal;font-size:0.9em">Sin fecha — toca 📅</em>';
			}

			/* Selector de fecha */
			var pickerWrap  = document.createElement('div');
			pickerWrap.className = 'fecha-picker-wrap';

			var btnFecha = document.createElement('button');
			btnFecha.className = 'btn-fecha';
			btnFecha.type      = 'button';
			btnFecha.title     = 'Seleccionar fecha';
			btnFecha.textContent = '📅';

			var inputFecha = document.createElement('input');
			inputFecha.type      = 'date';
			inputFecha.className = 'input-fecha-overlay';
			if (dia.fecha) inputFecha.value = dia.fecha;

			pickerWrap.appendChild(btnFecha);
			pickerWrap.appendChild(inputFecha);

			/* Botón eliminar */
			var btnEliminar = document.createElement('button');
			btnEliminar.className   = 'btn-eliminar-dia';
			btnEliminar.type        = 'button';
			btnEliminar.title       = 'Eliminar día';
			btnEliminar.textContent = '✕';

			var btnFoto = document.createElement('button');
			btnFoto.className = 'btn-foto-dia';
			btnFoto.type = 'button';
			btnFoto.title = 'Añadir foto al ingrediente seleccionado';
			btnFoto.textContent = '📷';

			var inputFoto = document.createElement('input');
			inputFoto.type = 'file';
			inputFoto.accept = 'image/*';
			inputFoto.className = 'input-foto-dia';

			header.appendChild(chevron);
			header.appendChild(etiqueta);
			header.appendChild(pickerWrap);
			header.appendChild(btnFoto);
			header.appendChild(btnEliminar);
			header.appendChild(inputFoto);

			/* Cuerpo */
			var body = document.createElement('div');
			body.className = 'dia-body';

			card.appendChild(header);
			card.appendChild(body);

			/* Eventos */
			header.addEventListener('click', function (e) {
				if (pickerWrap.contains(e.target) || e.target === btnEliminar || e.target === btnFoto) return;
				days[idx].abierto = !days[idx].abierto;
				guardarDatos();
				card.classList.toggle('abierto', days[idx].abierto);
				if (days[idx].abierto) renderBody(body, days[idx], idx);
				else body.innerHTML = '';
			});

			inputFecha.addEventListener('change', function () {
				days[idx].fecha = normalizarFechaIso(inputFecha.value);
				guardarDatos();
				render();
			});

			btnEliminar.addEventListener('click', function (e) {
				e.stopPropagation();
				if (days.length <= 1) return;
				days.splice(idx, 1);
				if (seleccionActiva && seleccionActiva.diaIdx === idx) seleccionActiva = null;
				guardarDatos();
				render();
			});

			btnFoto.addEventListener('click', function (e) {
				e.stopPropagation();
				if (!seleccionActiva || seleccionActiva.diaIdx !== idx) {
					alert('Selecciona primero un ingrediente de este día para adjuntar la foto.');
					return;
				}
				inputFoto.click();
			});

			inputFoto.addEventListener('change', function () {
				var file = inputFoto.files && inputFoto.files[0];
				if (!file) return;
				if (!seleccionActiva || seleccionActiva.diaIdx !== idx) {
					inputFoto.value = '';
					return;
				}

				var momentoSel = seleccionActiva.momento;
				var itemSel = seleccionActiva.iItem;
				var arrFotos = days[idx].fotos[momentoSel];
				while (arrFotos.length <= itemSel) arrFotos.push('');

				var reader = new FileReader();
				reader.onload = function (ev) {
					arrFotos[itemSel] = ev.target.result || '';
					guardarDatos();
					render();
				};
				reader.readAsDataURL(file);
				inputFoto.value = '';
			});

			if (dia.abierto) renderBody(body, dia, idx);

			acordeon.appendChild(card);
		}

		function renderBody(body, dia, idx) {
			body.innerHTML = '';
			MOMENTOS.forEach(function (momento) {
				var arr = dia.comidas[momento];
				var arrFotos = dia.fotos[momento];
				while (arrFotos.length < arr.length) arrFotos.push('');
				if (arr[arr.length - 1] !== '') {
					arr.push('');
					arrFotos.push('');
				}

				var section = document.createElement('div');
				section.className      = 'momento';
				section.dataset.momento = momento;

				var titulo = document.createElement('div');
				titulo.className   = 'momento-titulo';
				titulo.textContent = momento;
				section.appendChild(titulo);

				arr.forEach(function (val, iItem) {
					section.appendChild(crearInput(dia, idx, momento, iItem, val, arrFotos[iItem], body));
				});

				body.appendChild(section);
			});
		}

		function crearInput(dia, idx, momento, iItem, val, fotoVal, body) {
			var item = document.createElement('div');
			item.className = 'ingrediente-item';
			item.dataset.momento = momento;
			item.dataset.item = String(iItem);
			if (seleccionActiva && seleccionActiva.diaIdx === idx && seleccionActiva.momento === momento && seleccionActiva.iItem === iItem) {
				item.classList.add('seleccionado');
			}

			var input = document.createElement('input');
			input.type      = 'text';
			input.className = 'comida-input';
			input.value     = val;
			input.placeholder = iItem === 0
				? 'Añadir ' + momento.charAt(0) + momento.slice(1).toLowerCase() + '…'
				: 'Añadir otro…';

			input.addEventListener('input', function () {
				var arr = dia.comidas[momento];
				var arrFotos = dia.fotos[momento];
				arr[iItem] = input.value;

				/* Auto-añadir campo si escribe en el último */
				if (iItem === arr.length - 1 && input.value.trim() !== '') {
					arr.push('');
					arrFotos.push('');
					guardarDatos();
					var section = body.querySelector('[data-momento="' + momento + '"]');
					var titulo  = section.querySelector('.momento-titulo');
					section.innerHTML = '';
					section.appendChild(titulo);
					arr.forEach(function (v, i) {
						section.appendChild(crearInput(dia, idx, momento, i, v, arrFotos[i], body));
					});
					var inputs = section.querySelectorAll('.comida-input');
					if (inputs[iItem]) inputs[iItem].focus();
				} else {
					guardarDatos();
				}
			});

			input.addEventListener('focus', function () {
				seleccionActiva = { diaIdx: idx, momento: momento, iItem: iItem };
				var items = body.querySelectorAll('.ingrediente-item');
				items.forEach(function (el) { el.classList.remove('seleccionado'); });
				item.classList.add('seleccionado');
			});

			input.addEventListener('blur', function () {
				var arr = dia.comidas[momento];
				var arrFotos = dia.fotos[momento];
				while (arr.length > 1 && arr[arr.length-1] === '' && arr[arr.length-2] === '') {
					arr.pop();
					arrFotos.pop();
				}
				guardarDatos();
			});

			item.appendChild(input);

			if (fotoVal) {
				var fotoBox = document.createElement('div');
				fotoBox.className = 'foto-box';

				var img = document.createElement('img');
				img.className = 'foto-preview';
				img.src = fotoVal;
				img.alt = 'Foto del ingrediente';

				var btnQuitarFoto = document.createElement('button');
				btnQuitarFoto.type = 'button';
				btnQuitarFoto.className = 'btn-quitar-foto';
				btnQuitarFoto.textContent = 'Quitar foto';
				btnQuitarFoto.addEventListener('click', function () {
					dia.fotos[momento][iItem] = '';
					guardarDatos();
					var section = body.querySelector('[data-momento="' + momento + '"]');
					var titulo = section.querySelector('.momento-titulo');
					section.innerHTML = '';
					section.appendChild(titulo);
					dia.comidas[momento].forEach(function (v, i) {
						section.appendChild(crearInput(dia, idx, momento, i, v, dia.fotos[momento][i], body));
					});
				});

				fotoBox.appendChild(img);
				fotoBox.appendChild(btnQuitarFoto);
				item.appendChild(fotoBox);
			}

			return item;
		}

		btnAgregar.addEventListener('click', function () {
			days.push(crearDia());
			guardarDatos();
			render();
			contenido.scrollTop = contenido.scrollHeight;
		});

		btnGuardar.addEventListener('click', function () {
			guardarMenuNube();
		});

		btnBorrar.addEventListener('click', async function () {
			if (!confirm('¿Seguro que quieres borrar todo el menú? Esta acción no se puede deshacer.')) return;
			days = [crearDia(), crearDia(), crearDia()];
			seleccionActiva = null;
			guardarDatos();
			render();
			try {
				await borrarMenuNube();
				alert('Menú borrado en Google Sheets.');
			} catch (err) {
				alert('Se borró en el móvil, pero falló en la nube: ' + err.message);
			}
		});

		cargarMenuNube()
			.then(function () { render(); })
			.catch(function () { render(); });
	})();
	</script>
</body>
</html>

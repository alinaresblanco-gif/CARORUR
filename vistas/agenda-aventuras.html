<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nos Vamos de Ruta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="vistas.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ---- Overrides de layout para esta vista ---- */
    html, body { overflow: hidden; }

    .vista-app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
      overflow: hidden;
    }

    .vista-contenido {
      display: block;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0;
    }

    .vista-contenido::-webkit-scrollbar { width: 5px; }
    .vista-contenido::-webkit-scrollbar-thumb {
      background: rgba(108, 72, 38, 0.35);
      border-radius: 3px;
    }

    /* ---- Widget de clima ---- */
    .clima-widget {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px 10px;
      padding: 7px 14px;
      background: rgba(255, 247, 229, 0.88);
      border-bottom: 1px solid rgba(108, 72, 38, 0.22);
      font-family: 'Crimson Text', serif;
      font-size: 0.92rem;
      color: var(--tinta-rural);
      min-height: 36px;
    }

    .clima-alerta { color: #8b0000; font-weight: 700; }
    .clima-aviso  { color: #7b5800; }

    .aviso-recuperacion {
      margin: 8px 12px 0;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid rgba(46, 125, 50, 0.35);
      background: rgba(46, 125, 50, 0.12);
      color: #1b5e20;
      font-family: 'Special Elite', serif;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      display: none;
    }

    .aviso-recuperacion.activo {
      display: block;
      animation: fadeAviso 280ms ease-out;
    }

    @keyframes fadeAviso {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn-activar-gps {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border: 1px solid rgba(108, 72, 38, 0.45);
      border-radius: 20px;
      background: var(--papel-oscuro);
      color: #f5e9c8;
      font-family: 'Special Elite', serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-activar-gps:active { opacity: 0.75; }

    /* ---- Mapa ---- */
    #mapa {
      width: 100%;
      height: 52vh;
      min-height: 240px;
      border-bottom: 2px solid rgba(108, 72, 38, 0.28);
      z-index: 1;
    }

    /* ---- Panel de controles ---- */
    .controles-ruta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(255, 247, 229, 0.8);
      border-bottom: 1px solid rgba(108, 72, 38, 0.15);
    }

    .btn-ruta {
      flex: 1;
      min-width: 64px;
      padding: 10px 6px;
      border: none;
      border-radius: 7px;
      font-family: 'Special Elite', serif;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 0.14s, opacity 0.14s;
      line-height: 1.3;
    }

    .btn-ruta:disabled {
      opacity: 0.32;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-ruta:not(:disabled):active { transform: scale(0.94); }

    .btn-iniciar  { background: #2e7d32; color: #fff; }
    .btn-pausar   { background: #f9a825; color: #3d1f0c; }
    .btn-reanudar { background: #1565c0; color: #fff; }
    .btn-terminar { background: #c62828; color: #fff; }
    .btn-foto     { background: #5a3418; color: #f5e9c8; }
    .btn-sos      { background: #b71c1c; color: #fff; flex: 0 0 auto; padding-left: 14px; padding-right: 14px; }

    /* ---- Grid de estadísticas ---- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px 12px;
      background: rgba(255, 247, 229, 0.55);
      border-bottom: 1px solid rgba(108, 72, 38, 0.15);
    }

    .stat-card {
      background: rgba(255, 247, 229, 0.9);
      border: 1px solid rgba(108, 72, 38, 0.25);
      border-radius: 8px;
      padding: 8px 5px;
      text-align: center;
    }

    .stat-label {
      display: block;
      font-family: 'Special Elite', serif;
      font-size: 0.62rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--tinta-rural-suave);
      margin-bottom: 3px;
    }

    .stat-valor {
      display: block;
      font-family: 'Crimson Text', serif;
      font-size: 1.12rem;
      font-weight: 700;
      color: var(--tinta-rural);
    }

    /* ---- Historial ---- */
    .historial-section {
      padding: 12px 12px 22px;
    }

    .historial-titulo {
      font-family: 'Special Elite', serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #5a3418;
      margin: 0 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(108, 72, 38, 0.28);
    }

    .historial-lista {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-ruta {
      background: rgba(255, 247, 229, 0.88);
      border: 1px solid rgba(108, 72, 38, 0.28);
      border-radius: 8px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: box-shadow 0.18s;
    }

    .card-ruta:hover { box-shadow: 0 4px 14px rgba(0, 0, 0, 0.14); }

    .card-ruta-nombre {
      font-family: 'Special Elite', serif;
      font-size: 0.92rem;
      color: var(--tinta-rural);
    }

    .card-ruta-fecha {
      font-size: 0.78rem;
      color: var(--tinta-rural-suave);
      margin-top: 2px;
    }

    .card-ruta-stats {
      font-size: 0.8rem;
      color: var(--tinta-rural-suave);
      margin-top: 3px;
    }

    .card-ruta-badge {
      font-family: 'Special Elite', serif;
      font-size: 0.72rem;
      background: var(--papel-oscuro);
      color: #f5e9c8;
      padding: 4px 9px;
      border-radius: 12px;
      white-space: nowrap;
      align-self: start;
      margin-top: 2px;
    }

    .card-ruta-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-eliminar-ruta {
      border: 1px solid rgba(198, 40, 40, 0.45);
      border-radius: 10px;
      background: rgba(198, 40, 40, 0.08);
      color: #c62828;
      font-size: 0.72rem;
      font-family: 'Special Elite', serif;
      padding: 3px 9px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.14s;
    }

    .btn-eliminar-ruta:active { background: rgba(198, 40, 40, 0.22); }

    .historial-vacio {
      text-align: center;
      color: var(--tinta-rural-suave);
      font-style: italic;
      font-size: 0.95rem;
      padding: 22px 0;
    }

    /* ---- Modal: nombre de la ruta ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.activo { display: flex; }

    .modal-caja {
      background: #f5e9c8;
      border: 1px solid rgba(108, 72, 38, 0.4);
      border-radius: 12px;
      padding: 22px 18px;
      width: min(88vw, 340px);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.32);
    }

    .modal-caja h3 {
      margin: 0 0 14px;
      font-family: 'Special Elite', serif;
      font-size: 1.05rem;
      color: #5a3418;
    }

    .modal-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(108, 72, 38, 0.38);
      border-radius: 6px;
      background: rgba(255, 247, 229, 0.9);
      font-family: 'Crimson Text', serif;
      font-size: 1rem;
      color: var(--tinta-rural);
      margin-bottom: 14px;
      outline: none;
      box-sizing: border-box;
    }

    .modal-input:focus { border-color: var(--papel-oscuro); }

    .modal-botones { display: flex; gap: 8px; justify-content: flex-end; }

    .modal-btn {
      padding: 9px 16px;
      border: none;
      border-radius: 6px;
      font-family: 'Special Elite', serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: opacity 0.14s;
    }

    .modal-btn:active { opacity: 0.8; }
    .modal-btn-cancelar  { background: rgba(108, 72, 38, 0.13); color: var(--tinta-rural); }
    .modal-btn-confirmar { background: #2e7d32; color: #fff; }
  </style>
</head>
<body>
  <div class="vista-app">

    <header class="vista-header">
      <a class="btn-volver" href="../index.html" target="_top" aria-label="Volver al inicio"></a>
      <h1>NOS VAMOS DE RUTA</h1>
      <div class="header-espaciador" aria-hidden="true"></div>
    </header>

    <main class="vista-contenido">

      <!-- METEOROLOGÍA -->
      <div class="clima-widget" id="clima-widget" aria-live="polite">
        <span id="clima-texto">📍 Toca para activar ubicación y clima</span>
        <button class="btn-activar-gps" id="btn-activar-gps" aria-label="Activar GPS y meteorología">📡 Activar GPS</button>
      </div>
      <div id="aviso-recuperacion" class="aviso-recuperacion" role="status" aria-live="polite">
        ✅ Ruta recuperada automáticamente. Seguimos donde lo dejaste.
      </div>

      <!-- MAPA -->
      <div id="mapa" aria-label="Mapa de la ruta"></div>

      <!-- CONTROLES -->
      <div class="controles-ruta" role="group" aria-label="Controles de ruta">
        <button id="btn-iniciar"  class="btn-ruta btn-iniciar">▶ INICIAR</button>
        <button id="btn-pausar"   class="btn-ruta btn-pausar"   disabled>⏸ PAUSAR</button>
        <button id="btn-terminar" class="btn-ruta btn-terminar" disabled>⏹ TERMINAR</button>
        <button id="btn-foto"     class="btn-ruta btn-foto"     disabled>📷 FOTO</button>
        <button id="btn-sos"      class="btn-ruta btn-sos">🆘 SOS</button>
        <input type="file" id="input-foto" accept="image/*" capture="environment" style="display:none" aria-hidden="true" />
      </div>

      <!-- ESTADÍSTICAS -->
      <div class="stats-grid" aria-label="Estadísticas de la ruta">
        <div class="stat-card">
          <span class="stat-label">Tiempo</span>
          <span class="stat-valor" id="stat-tiempo">00:00:00</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Distancia</span>
          <span class="stat-valor" id="stat-distancia">0.00 km</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Vel. Media</span>
          <span class="stat-valor" id="stat-vel-media">0.0 km/h</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Vel. Máx</span>
          <span class="stat-valor" id="stat-vel-max">0.0 km/h</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Desnivel</span>
          <span class="stat-valor" id="stat-desnivel">0 m</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Pasos</span>
          <span class="stat-valor" id="stat-pasos">0</span>
        </div>
      </div>

      <!-- HISTORIAL -->
      <section class="historial-section">
        <h2 class="historial-titulo">Historial de Rutas</h2>
        <div class="historial-lista" id="lista-historial">
          <p class="historial-vacio">Cargando historial...</p>
        </div>
      </section>

    </main>
  </div>

  <!-- MODAL: nombre de la ruta -->
  <div class="modal-overlay" id="modal-nombre" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
    <div class="modal-caja">
      <h3 id="modal-titulo">¿Cómo llamamos a esta ruta?</h3>
      <input
        type="text"
        id="input-nombre-ruta"
        class="modal-input"
        placeholder="Ej: Ruta del Río, Sierra Norte..."
        maxlength="60"
        autocomplete="off"
      />
      <div class="modal-botones">
        <button class="modal-btn modal-btn-cancelar" id="modal-cancelar">Cancelar</button>
        <button class="modal-btn modal-btn-confirmar" id="modal-confirmar">¡Iniciar!</button>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
  (function () {
    'use strict';

    /* ============================================================
       CONFIGURACIÓN
       Rellena SCRIPT_URL con la URL de tu Google Apps Script
       desplegado como Web App cuando esté listo.
    ============================================================ */
    var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxe8u7rHiICaJwI0jEompYqC8C3oJVieY83ETTa12lErM066asKO-b_-fbBF3piUI_V/exec';

    /* ============================================================
       ESTADO DE LA RUTA
    ============================================================ */
    var estado          = 'parado'; // parado | activo | pausado
    var watchId         = null;
    var timerInterval   = null;
    var segundosTotales = 0;
    var distanciaKm     = 0;
    var velMaxKmh       = 0;
    var desnivelAcum    = 0;
    var altitudAnterior = null;
    var posAnterior     = null;   // {lat, lng, ts}
    var puntoRuta       = [];     // [{lat, lng, alt, ts}] con ts=null como marcador de corte
    var fotosRuta       = [];     // [{lat, lng, ts, foto: base64}]
    var nombreRuta      = '';
    var historialData   = [];

    // Control de pantalla apagada
    var wakeLock          = null;   // Screen Wake Lock
    var iniciarNuevoTramo = false;  // true = el proximo punto GPS abre un nuevo segmento
    var tsUltimoPunto     = null;   // timestamp del ultimo punto recibido
    var GAP_MAXIMO_MS     = 30000;  // 30 s sin GPS = corte de tramo
    var STORAGE_RUTA_KEY  = 'carorur_ruta_activa';
    var timeoutAvisoRecuperacion = null;
    var tsOcultoInicio    = null;
    var gpsWatchdog       = null;
    var UMBRAL_REINTENTO_GPS_MS = 45000;

    /* ============================================================
       MAPA (Leaflet + OpenStreetMap)
    ============================================================ */
    // Mapa centrado en España por defecto; se recentrará cuando llegue el GPS
    var mapa = L.map('mapa', { zoomControl: true, attributionControl: false });
    mapa.setView([40.4, -3.7], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    }).addTo(mapa);

    /* ============================================================
       MAPA – MÚSLTIPLES SEGMENTOS (multi-polyline)
       Cada vez que hay un corte (pantalla apagada, gap > 30 s)
       se crea un nuevo tramo en lugar de unir con línea recta.
    ============================================================ */
    var segmentos      = [];   // array de L.polyline activos
    var segmentoActual = null; // el tramo que se está dibujando ahora

    function nuevoSegmento() {
      segmentoActual = L.polyline([], {
        color: '#c62828',
        weight: 4,
        opacity: 0.88
      }).addTo(mapa);
      segmentos.push(segmentoActual);
    }

    function limpiarSegmentos() {
      segmentos.forEach(function (s) { mapa.removeLayer(s); });
      segmentos      = [];
      segmentoActual = null;
    }

    function limpiarMarcadoresFoto() {
      mapa.eachLayer(function (layer) {
        if (layer._esFotoMarker) { mapa.removeLayer(layer); }
      });
    }

    function redibujarRutaDesdePuntos() {
      limpiarSegmentos();
      var hayPunto = false;
      puntoRuta.forEach(function (p) {
        if (!p || p.corte) {
          if (segmentoActual && segmentoActual.getLatLngs().length > 0) {
            segmentoActual = null;
          }
          return;
        }
        if (!segmentoActual) { nuevoSegmento(); }
        segmentoActual.addLatLng([p.lat, p.lng]);
        hayPunto = true;
      });
      if (!hayPunto) { return; }

      var ultimo = null;
      for (var i = puntoRuta.length - 1; i >= 0; i--) {
        if (puntoRuta[i] && !puntoRuta[i].corte) {
          ultimo = puntoRuta[i];
          break;
        }
      }
      if (!ultimo) { return; }

      if (!marcadorActual) {
        marcadorActual = L.marker([ultimo.lat, ultimo.lng], { icon: iconoPosicion }).addTo(mapa);
      } else {
        marcadorActual.setLatLng([ultimo.lat, ultimo.lng]);
      }
      centrarMapa(ultimo.lat, ultimo.lng);
    }

    function serializarSesion() {
      return {
        estado: estado,
        segundosTotales: segundosTotales,
        distanciaKm: distanciaKm,
        velMaxKmh: velMaxKmh,
        desnivelAcum: desnivelAcum,
        altitudAnterior: altitudAnterior,
        posAnterior: posAnterior,
        puntoRuta: puntoRuta,
        fotosRuta: fotosRuta,
        nombreRuta: nombreRuta,
        tsUltimoPunto: tsUltimoPunto
      };
    }

    function mostrarAvisoRecuperacion() {
      var aviso = document.getElementById('aviso-recuperacion');
      if (!aviso) { return; }
      aviso.classList.add('activo');
      if (timeoutAvisoRecuperacion) {
        clearTimeout(timeoutAvisoRecuperacion);
      }
      timeoutAvisoRecuperacion = setTimeout(function () {
        aviso.classList.remove('activo');
      }, 6500);
    }

    function guardarSesionLocal() {
      if (estado === 'parado') {
        localStorage.removeItem(STORAGE_RUTA_KEY);
        return;
      }
      try {
        localStorage.setItem(STORAGE_RUTA_KEY, JSON.stringify(serializarSesion()));
      } catch (e) {
        console.warn('No se pudo guardar el estado de la ruta:', e);
      }
    }

    function restaurarSesionLocal() {
      var raw = localStorage.getItem(STORAGE_RUTA_KEY);
      if (!raw) { return; }

      try {
        var data = JSON.parse(raw);
        if (!data || (data.estado !== 'activo' && data.estado !== 'pausado')) {
          return;
        }

        estado          = data.estado;
        segundosTotales = Number(data.segundosTotales) || 0;
        distanciaKm     = Number(data.distanciaKm) || 0;
        velMaxKmh       = Number(data.velMaxKmh) || 0;
        desnivelAcum    = Number(data.desnivelAcum) || 0;
        altitudAnterior = (data.altitudAnterior === null || data.altitudAnterior === undefined)
          ? null
          : Number(data.altitudAnterior);
        posAnterior     = data.posAnterior || null;
        puntoRuta       = Array.isArray(data.puntoRuta) ? data.puntoRuta : [];
        fotosRuta       = Array.isArray(data.fotosRuta) ? data.fotosRuta : [];
        nombreRuta      = data.nombreRuta || 'Ruta en curso';
        tsUltimoPunto   = Number(data.tsUltimoPunto) || null;

        document.getElementById('stat-tiempo').textContent = formatTiempo(segundosTotales);
        document.getElementById('stat-distancia').textContent = distanciaKm.toFixed(2) + ' km';
        document.getElementById('stat-vel-max').textContent = velMaxKmh.toFixed(1) + ' km/h';
        document.getElementById('stat-desnivel').textContent = Math.round(desnivelAcum) + ' m';
        document.getElementById('stat-pasos').textContent = Math.round(distanciaKm * 1000 / 0.65).toLocaleString('es-ES');
        actualizarVelMedia();

        redibujarRutaDesdePuntos();
        limpiarMarcadoresFoto();
        fotosRuta.forEach(function (f) {
          if (!f || !f.lat || !f.lng || !f.foto) { return; }
          var m = L.marker([f.lat, f.lng], { icon: iconoFoto });
          m._esFotoMarker = true;
          m.bindPopup('<img src="' + f.foto + '" style="max-width:180px;border-radius:6px;" />');
          m.addTo(mapa);
        });

        btnIniciar.disabled  = true;
        btnPausar.disabled   = false;
        btnTerminar.disabled = false;
        btnFoto.disabled     = (estado !== 'activo');

        if (estado === 'activo') {
          btnPausar.textContent = '⏸ PAUSAR';
          btnPausar.className = 'btn-ruta btn-pausar';
          if (!timerInterval) { iniciarCronometro(); }
          iniciarGPS();
          iniciarWatchdogGPS();
          activarWakeLock();
        } else {
          btnPausar.textContent = '▶ REANUDAR';
          btnPausar.className = 'btn-ruta btn-reanudar';
          detenerGPS();
          detenerWatchdogGPS();
          liberarWakeLock();
        }

        document.getElementById('clima-texto').textContent = 'Ruta restaurada automaticamente.';
        mostrarAvisoRecuperacion();
      } catch (e) {
        console.warn('No se pudo restaurar la ruta activa:', e);
      }
    }

    // Compatibilidad: lineaRuta ya no se usa para dibujar,
    // pero lo dejamos para que renderHistorial pueda reutilizarlo.
    var lineaRuta = L.polyline([], { color: '#c62828', weight: 4, opacity: 0.88 });
    // (no se añade al mapa aquí; solo se usa en el historial)

    var marcadorActual = null;

    var iconoPosicion = L.divIcon({
      html: '<div style="width:14px;height:14px;background:#c62828;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(198,40,40,0.3)"></div>',
      className: '',
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });

    var iconoFoto = L.divIcon({
      html: '<div style="font-size:18px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5))">📷</div>',
      className: '',
      iconSize: [22, 22],
      iconAnchor: [11, 11]
    });

    function centrarMapa(lat, lng, zoom) {
      var z = zoom || (mapa.getZoom() < 14 ? 15 : mapa.getZoom());
      mapa.setView([lat, lng], z);
    }

    /* ============================================================
       CRONÓMETRO
    ============================================================ */
    function formatTiempo(seg) {
      var h = Math.floor(seg / 3600);
      var m = Math.floor((seg % 3600) / 60);
      var s = seg % 60;
      return pad(h) + ':' + pad(m) + ':' + pad(s);
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function iniciarCronometro() {
      timerInterval = setInterval(function () {
        if (estado === 'activo') {
          segundosTotales++;
          document.getElementById('stat-tiempo').textContent = formatTiempo(segundosTotales);
          actualizarVelMedia();
          guardarSesionLocal();
        }
      }, 1000);
    }

    function detenerCronometro() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    /* ============================================================
       DISTANCIA (Haversine)
    ============================================================ */
    function haversine(lat1, lng1, lat2, lng2) {
      var R    = 6371;
      var dLat = (lat2 - lat1) * Math.PI / 180;
      var dLng = (lng2 - lng1) * Math.PI / 180;
      var a    = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                 Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                 Math.sin(dLng / 2) * Math.sin(dLng / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    /* ============================================================
       ACTUALIZAR ESTADÍSTICAS EN PANTALLA
    ============================================================ */
    function actualizarVelMedia() {
      if (segundosTotales === 0) return;
      var vel = distanciaKm / (segundosTotales / 3600);
      document.getElementById('stat-vel-media').textContent = vel.toFixed(1) + ' km/h';
    }

    function actualizarStats() {
      document.getElementById('stat-distancia').textContent = distanciaKm.toFixed(2) + ' km';
      document.getElementById('stat-vel-max').textContent   = velMaxKmh.toFixed(1) + ' km/h';
      document.getElementById('stat-desnivel').textContent  = Math.round(desnivelAcum) + ' m';
      document.getElementById('stat-pasos').textContent     = Math.round(distanciaKm * 1000 / 0.65).toLocaleString('es-ES');
    }

    /* ============================================================
       GPS – watchPosition
    ============================================================ */
    function onPosicion(pos) {
      if (estado !== 'activo') return;

      var lat   = pos.coords.latitude;
      var lng   = pos.coords.longitude;
      var alt   = pos.coords.altitude;
      var velMs = pos.coords.speed;
      var ts    = pos.timestamp;

      // --- DETECCIÓN DE GAP: si pasaron más de GAP_MAXIMO_MS
      //     sin recibir un punto, es un corte (pantalla apagada).
      //     No se dibuja ni se suma esa distancia.
      var esCorte = false;
      if (tsUltimoPunto !== null && (ts - tsUltimoPunto) > GAP_MAXIMO_MS) {
        esCorte = true;
      }
      tsUltimoPunto = ts;

      // Si la visibilidad cambió (flag externo) también es corte
      if (iniciarNuevoTramo) {
        esCorte = true;
        iniciarNuevoTramo = false;
      }

      if (esCorte || segmentoActual === null) {
        // Insertar marcador de corte en los datos guardados
        if (puntoRuta.length > 0) {
          puntoRuta.push({ corte: true });
        }
        posAnterior     = null; // no calcular distancia del salto
        altitudAnterior = null;
        nuevoSegmento();
      }

      // Guardar punto de ruta
      puntoRuta.push({ lat: lat, lng: lng, alt: alt, ts: ts });

      // Actualizar marcador en el mapa
      if (!marcadorActual) {
        marcadorActual = L.marker([lat, lng], { icon: iconoPosicion }).addTo(mapa);
      } else {
        marcadorActual.setLatLng([lat, lng]);
      }
      segmentoActual.addLatLng([lat, lng]);
      centrarMapa(lat, lng);

      // Calcular distancia incremental (filtro anti-saltos GPS > 100 m)
      if (posAnterior && !esCorte) {
        var incKm = haversine(posAnterior.lat, posAnterior.lng, lat, lng);
        if (incKm < 0.1) { distanciaKm += incKm; }
      }
      posAnterior = { lat: lat, lng: lng, ts: ts };

      // Velocidad máxima
      if (velMs !== null) {
        var velKmh = velMs * 3.6;
        if (velKmh > velMaxKmh) { velMaxKmh = velKmh; }
      }

      // Desnivel acumulado (solo subidas, ignorar tras corte)
      if (alt !== null && altitudAnterior !== null && !esCorte) {
        var diff = alt - altitudAnterior;
        if (diff > 0) { desnivelAcum += diff; }
      }
      if (alt !== null) { altitudAnterior = alt; }

      actualizarStats();
      guardarSesionLocal();
    }

    function iniciarGPS() {
      if (!navigator.geolocation) {
        alert('Tu dispositivo no soporta geoloción.');
        return false;
      }
      if (watchId !== null) { return true; }
      watchId = navigator.geolocation.watchPosition(onPosicion, function (err) {
        console.warn('GPS:', err.message);
      }, {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0   // 0 = siempre pedir posición fresca al sistema operativo
      });
      return true;
    }

    function detenerGPS() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
    }

    function reiniciarGPS() {
      detenerGPS();
      iniciarGPS();
    }

    function iniciarWatchdogGPS() {
      if (gpsWatchdog !== null) { return; }
      gpsWatchdog = setInterval(function () {
        if (estado !== 'activo') { return; }
        if (document.visibilityState !== 'visible') { return; }
        if (tsUltimoPunto === null) { return; }
        if ((Date.now() - tsUltimoPunto) > UMBRAL_REINTENTO_GPS_MS) {
          // Algunos móviles congelan watchPosition al volver de llamadas.
          // Reintentamos el watch sin parar la ruta.
          reiniciarGPS();
        }
      }, 15000);
    }

    function detenerWatchdogGPS() {
      if (gpsWatchdog !== null) {
        clearInterval(gpsWatchdog);
        gpsWatchdog = null;
      }
    }

    /* ============================================================
       WAKE LOCK – impide que el sistema suspenda el GPS
       mientras la ruta está en marcha.
       Solo mantiene la CPU/GPS activos, NO la pantalla encendida
       (ahorra batería). Si el usuario apaga la pantalla a mano,
       el detector de visibilidad marca el corte de tramo.
    ============================================================ */
    function activarWakeLock() {
      if (!('wakeLock' in navigator)) return;
      navigator.wakeLock.request('screen')
        .then(function (wl) {
          wakeLock = wl;
          // Si el sistema libera el lock (llamada, alamérma...), reactivarlo
          wl.addEventListener('release', function () {
            if (estado === 'activo') { activarWakeLock(); }
          });
        })
        .catch(function (e) { console.warn('Wake Lock no disponible:', e); });
    }

    function liberarWakeLock() {
      if (wakeLock) { wakeLock.release().catch(function(){}); wakeLock = null; }
    }

    /* ============================================================
       DETECTOR DE VISIBILIDAD
       Cuando el usuario vuelve a la app tras apagar la pantalla
       marcamos que el próximo punto GPS debe abrir un nuevo tramo.
    ============================================================ */
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'hidden') {
        tsOcultoInicio = Date.now();
        // La pantalla se apagó o la app pasó a segundo plano
        // El crónometro sigue contando (estado 'activo' no cambia),
        // pero el GPS puede quedar sin recibir puntos.
        // No hacemos nada aquí; el gap temporal lo gestiona onPosicion.
        return;
      }
      // La pantalla volvió: si la ruta está activa, forzar nuevo tramo
      if (estado === 'activo') {
        var ocultoMs = tsOcultoInicio ? (Date.now() - tsOcultoInicio) : 0;
        iniciarNuevoTramo = ocultoMs > GAP_MAXIMO_MS;
        tsOcultoInicio = null;
        if (watchId === null) { iniciarGPS(); }
        // Reactiv. el wake lock si fue liberado por el sistema
        activarWakeLock();
      }
    });

    /* ============================================================
       BOTONES DE CONTROL
    ============================================================ */
    var btnIniciar  = document.getElementById('btn-iniciar');
    var btnPausar   = document.getElementById('btn-pausar');
    var btnTerminar = document.getElementById('btn-terminar');
    var btnFoto     = document.getElementById('btn-foto');
    var btnSos      = document.getElementById('btn-sos');
    var inputFoto   = document.getElementById('input-foto');

    // -- INICIAR: abre el modal para pedir el nombre --
    btnIniciar.addEventListener('click', function () {
      document.getElementById('modal-nombre').classList.add('activo');
      var inp = document.getElementById('input-nombre-ruta');
      inp.value = '';
      setTimeout(function () { inp.focus(); }, 80);
    });

    document.getElementById('modal-cancelar').addEventListener('click', function () {
      document.getElementById('modal-nombre').classList.remove('activo');
    });

    document.getElementById('modal-confirmar').addEventListener('click', confirmarInicioRuta);

    document.getElementById('input-nombre-ruta').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { confirmarInicioRuta(); }
    });

    function confirmarInicioRuta() {
      var val = document.getElementById('input-nombre-ruta').value.trim();
      nombreRuta = val || 'Ruta sin nombre';
      document.getElementById('modal-nombre').classList.remove('activo');
      comenzarRuta();
    }

    function comenzarRuta() {
      // Resetear datos
      segundosTotales = 0; distanciaKm = 0; velMaxKmh = 0;
      desnivelAcum = 0; altitudAnterior = null; posAnterior = null;
      puntoRuta = []; fotosRuta = [];

      // Limpiar mapa
      lineaRuta.setLatLngs([]);
      if (marcadorActual) { mapa.removeLayer(marcadorActual); marcadorActual = null; }
      mapa.eachLayer(function (layer) {
        if (layer._esFotoMarker) { mapa.removeLayer(layer); }
      });

      // Resetear stats en pantalla
      document.getElementById('stat-tiempo').textContent    = '00:00:00';
      document.getElementById('stat-distancia').textContent = '0.00 km';
      document.getElementById('stat-vel-media').textContent = '0.0 km/h';
      document.getElementById('stat-vel-max').textContent   = '0.0 km/h';
      document.getElementById('stat-desnivel').textContent  = '0 m';
      document.getElementById('stat-pasos').textContent     = '0';

      estado = 'activo';
      btnIniciar.disabled  = true;
      btnPausar.disabled   = false;
      btnTerminar.disabled = false;
      btnFoto.disabled     = false;
      btnPausar.textContent = '⏸ PAUSAR';
      btnPausar.className   = 'btn-ruta btn-pausar';

      iniciarCronometro();
      iniciarGPS();
      iniciarWatchdogGPS();
      activarWakeLock();
      guardarSesionLocal();
    }

    // -- PAUSAR / REANUDAR --
    btnPausar.addEventListener('click', function () {
      if (estado === 'activo') {
        estado = 'pausado';
        btnPausar.textContent = '▶ REANUDAR';
        btnPausar.className   = 'btn-ruta btn-reanudar';
        btnFoto.disabled = true;
        detenerGPS();
        detenerWatchdogGPS();
        liberarWakeLock();
      } else if (estado === 'pausado') {
        estado = 'activo';
        btnPausar.textContent = '⏸ PAUSAR';
        btnPausar.className   = 'btn-ruta btn-pausar';
        btnFoto.disabled = false;
        iniciarGPS();
        iniciarWatchdogGPS();
        activarWakeLock();
      }
      guardarSesionLocal();
    });

    // -- TERMINAR --
    btnTerminar.addEventListener('click', function () {
      if (!confirm('¿Terminar la ruta y guardar los datos?')) return;
      finalizarRuta();
    });

    function finalizarRuta() {
      estado = 'parado';
      detenerCronometro();
      detenerGPS();
      detenerWatchdogGPS();
      liberarWakeLock();
      localStorage.removeItem(STORAGE_RUTA_KEY);

      btnIniciar.disabled  = false;
      btnPausar.disabled   = true;
      btnTerminar.disabled = true;
      btnFoto.disabled     = true;
      btnPausar.textContent = '⏸ PAUSAR';
      btnPausar.className   = 'btn-ruta btn-pausar';

      var velMedia = segundosTotales > 0
        ? parseFloat((distanciaKm / (segundosTotales / 3600)).toFixed(2))
        : 0;

      var ruta = {
        Id_ruta      : Date.now().toString(36).toUpperCase(),
        fecha        : new Date().toISOString().split('T')[0],
        nombre_ruta  : nombreRuta,
        duracion_seg : segundosTotales,
        distancia_km : parseFloat(distanciaKm.toFixed(3)),
        vel_media_kmh: velMedia,
        vel_max_kmh  : parseFloat(velMaxKmh.toFixed(2)),
        desnivel_m   : Math.round(desnivelAcum),
        pasos_totales: Math.round(distanciaKm * 1000 / 0.65),
        ruta_gps     : JSON.stringify(puntoRuta),
        fotos_json   : JSON.stringify(fotosRuta)
      };

      guardarRuta(ruta);
    }

    /* ============================================================
       FOTO EN PUNTO DE INTERÉS
    ============================================================ */
    btnFoto.addEventListener('click', function () { inputFoto.click(); });

    inputFoto.addEventListener('change', function (e) {
      var archivo = e.target.files[0];
      if (!archivo || estado !== 'activo') return;

      var latlng = marcadorActual ? marcadorActual.getLatLng() : null;
      if (!latlng) { alert('Esperando señal GPS para geolocalizar la foto...'); return; }

      var reader = new FileReader();
      reader.onload = function (ev) {
        var base64 = ev.target.result;
        var lat    = latlng.lat;
        var lng    = latlng.lng;
        var ts     = Date.now();

        fotosRuta.push({ lat: lat, lng: lng, ts: ts, foto: base64 });

        // Icono de cámara en el mapa con preview al tocar
        var marker = L.marker([lat, lng], { icon: iconoFoto });
        marker._esFotoMarker = true;
        marker.bindPopup(
          '<img src="' + base64 + '" style="max-width:180px;border-radius:6px;" />'
        );
        marker.addTo(mapa);
      };
      reader.readAsDataURL(archivo);
      e.target.value = '';
    });

    /* ============================================================
       SOS – WhatsApp con ubicación
    ============================================================ */
    btnSos.addEventListener('click', function () {
      if (!navigator.geolocation) { alert('GPS no disponible en este dispositivo.'); return; }

      navigator.geolocation.getCurrentPosition(function (pos) {
        var lat = pos.coords.latitude.toFixed(6);
        var lng = pos.coords.longitude.toFixed(6);
        var mapaUrl = 'https://www.google.com/maps?q=' + lat + ',' + lng;
        var texto   = encodeURIComponent(
          '🆘 NECESITO AYUDA\n\nMi ubicación actual:\n' + mapaUrl +
          '\n\nCoordenadas: ' + lat + ', ' + lng
        );
        window.open('https://wa.me/?text=' + texto, '_blank');
      }, function () {
        alert('No se pudo obtener tu ubicación. Asegúrate de tener el GPS activado.');
      }, { enableHighAccuracy: true, timeout: 8000 });
    });

    /* ============================================================
       METEOROLOGÍA (Open-Meteo – completamente gratuito, sin API key)
    ============================================================ */
    function cargarClima(latRaw, lngRaw) {
      var lat = parseFloat(latRaw).toFixed(4);
      var lng = parseFloat(lngRaw).toFixed(4);
        var url = 'https://api.open-meteo.com/v1/forecast' +
          '?latitude=' + lat +
          '&longitude=' + lng +
          '&current_weather=true' +
          '&hourly=precipitation_probability,weathercode' +
          '&forecast_days=1' +
          '&timezone=auto';

        fetch(url)
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var cw     = data.current_weather;
            var viento = parseFloat(cw.windspeed).toFixed(0);
            var icono  = wIcono(cw.weathercode);
            var desc   = wDesc(cw.weathercode);

            // Probabilidad de lluvia en las próximas 2 horas
            var horaAhora = new Date().getHours();
            var tiempos   = data.hourly.time;
            var idxActual = -1;
            for (var i = 0; i < tiempos.length; i++) {
              if (new Date(tiempos[i]).getHours() === horaAhora) { idxActual = i; break; }
            }

            var probLluvia = 0;
            if (idxActual >= 0) {
              var probs = data.hourly.precipitation_probability.slice(idxActual, idxActual + 3);
              probLluvia = Math.max.apply(null, probs);
            }

            var html = icono + ' ' + desc + ' · 💨 ' + viento + ' km/h';
            if (probLluvia > 50) {
              html += ' · <span class="clima-alerta">🌧 Lluvia ' + probLluvia + '% próx. 2h</span>';
            } else if (probLluvia > 25) {
              html += ' · <span class="clima-aviso">☁ Posible lluvia ' + probLluvia + '%</span>';
            }

            document.getElementById('clima-texto').innerHTML = html;
          })
          .catch(function () {
            document.getElementById('clima-texto').textContent = '⚠️ Meteorología no disponible';
          });
    }

    function wIcono(c) {
      if (c === 0)       return '☀️';
      if (c <= 2)        return '⛅';
      if (c <= 3)        return '☁️';
      if (c <= 48)       return '🌫️';
      if (c <= 57)       return '🌦️';
      if (c <= 67)       return '🌧️';
      if (c <= 77)       return '❄️';
      if (c <= 82)       return '🌦️';
      if (c <= 86)       return '❄️';
      return '⛈️';
    }

    function wDesc(c) {
      if (c === 0) return 'Despejado';
      if (c <= 2)  return 'Parcialmente nublado';
      if (c <= 3)  return 'Nublado';
      if (c <= 48) return 'Niebla';
      if (c <= 57) return 'Llovizna';
      if (c <= 67) return 'Lluvia';
      if (c <= 77) return 'Nevada';
      if (c <= 82) return 'Chubascos';
      if (c <= 86) return 'Nevada intensa';
      return 'Tormenta';
    }

    /* ============================================================
       GOOGLE SHEETS – Guardar ruta y cargar historial
    ============================================================ */
    function guardarRuta(ruta) {
      // Siempre guardar en localStorage como copia de seguridad local
      var local = JSON.parse(localStorage.getItem('carorur_rutas') || '[]');
      local.unshift(ruta);
      localStorage.setItem('carorur_rutas', JSON.stringify(local.slice(0, 100)));

      if (!SCRIPT_URL) {
        renderHistorial(local);
        return;
      }

      fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accion: 'guardarRuta', datos: ruta })
      })
        .then(function (r) { return r.json(); })
        .then(function () { cargarHistorial(); })
        .catch(function (err) {
          console.warn('No se pudo guardar en Sheets:', err);
          renderHistorial(local);
        });
    }

    function cargarHistorial() {
      if (!SCRIPT_URL) {
        var local = JSON.parse(localStorage.getItem('carorur_rutas') || '[]');
        renderHistorial(local);
        return;
      }

      fetch(SCRIPT_URL + '?accion=obtenerRutas')
        .then(function (r) { return r.json(); })
        .then(function (data) { renderHistorial(data.rutas || []); })
        .catch(function () {
          var local = JSON.parse(localStorage.getItem('carorur_rutas') || '[]');
          renderHistorial(local);
        });
    }

    function fmtDuracion(seg) {
      var h = Math.floor(seg / 3600);
      var m = Math.floor((seg % 3600) / 60);
      if (h > 0) return h + 'h ' + m + 'min';
      return m + ' min';
    }

    function renderHistorial(rutas) {
      historialData = rutas || [];
      var lista = document.getElementById('lista-historial');

      if (!historialData.length) {
        lista.innerHTML = '<p class="historial-vacio">Aún no hay rutas guardadas. ¡Empieza la primera!</p>';
        return;
      }

      lista.innerHTML = historialData.map(function (r, i) {
        var pasos = (r.pasos_totales || 0).toLocaleString('es-ES');
        return '<div class="card-ruta" data-idx="' + i + '">' +
          '<div>' +
            '<div class="card-ruta-nombre">' + (r.nombre_ruta || 'Ruta sin nombre') + '</div>' +
            '<div class="card-ruta-fecha">' + r.fecha + ' · ' + fmtDuracion(r.duracion_seg) + '</div>' +
            '<div class="card-ruta-stats">📍 ' + r.distancia_km + ' km · ⛰ ' + r.desnivel_m + ' m · 👟 ' + pasos + '</div>' +
          '</div>' +
          '<div class="card-ruta-meta">' +
            '<span class="card-ruta-badge">' + r.vel_media_kmh + ' km/h</span>' +
            '<button class="btn-eliminar-ruta" data-del="' + i + '" aria-label="Eliminar ruta">🗑 Borrar</button>' +
          '</div>' +
        '</div>';
      }).join('');

      // Botones eliminar (hay que asignar antes del clic en card)
      lista.querySelectorAll('.btn-eliminar-ruta').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.stopPropagation(); // evitar que abra el mapa
          var idx = parseInt(btn.dataset.del);
          var nombre = historialData[idx] ? (historialData[idx].nombre_ruta || 'esta ruta') : 'esta ruta';
          if (!confirm('¿Eliminar "' + nombre + '" del historial?')) return;
          eliminarRuta(idx);
        });
      });

      // Clic en una card → redibujar esa ruta en el mapa
      lista.querySelectorAll('.card-ruta').forEach(function (card) {
        card.addEventListener('click', function () {
          var idx  = parseInt(card.dataset.idx);
          var ruta = historialData[idx];
          if (!ruta || !ruta.ruta_gps) return;
          try {
            var puntos = typeof ruta.ruta_gps === 'string'
              ? JSON.parse(ruta.ruta_gps)
              : ruta.ruta_gps;
            if (!puntos || !puntos.length) return;

            // Respetar los cortes de tramo al redibujar el historial
            lineaRuta.setLatLngs([]);
            if (lineaRuta._map) { mapa.removeLayer(lineaRuta); }
            lineaRuta.addTo(mapa);

            var tramo = [];
            var capas  = [];
            puntos.forEach(function (p) {
              if (p.corte) {
                if (tramo.length > 1) {
                  capas.push(L.polyline(tramo, { color: '#c62828', weight: 4, opacity: 0.88 }).addTo(mapa));
                }
                tramo = [];
              } else {
                tramo.push([p.lat, p.lng]);
              }
            });
            if (tramo.length > 1) {
              capas.push(L.polyline(tramo, { color: '#c62828', weight: 4, opacity: 0.88 }).addTo(mapa));
            }
            if (!capas.length) return;
            var grupo = L.featureGroup(capas);
            mapa.fitBounds(grupo.getBounds(), { padding: [20, 20] });
            document.getElementById('mapa').scrollIntoView({ behavior: 'smooth' });
            // Limpiar capas de historial al iniciar nueva ruta
            capas.forEach(function(c){ c._esHistorial = true; });
            mapa.eachLayer(function(l){ if(l._esHistorial && capas.indexOf(l) === -1){ mapa.removeLayer(l); } });
          } catch (e) { /* noop */ }
        });
      });
    }

    function eliminarRuta(idx) {
      var ruta = historialData[idx];
      if (!ruta) return;

      // Eliminar de localStorage
      var local = JSON.parse(localStorage.getItem('carorur_rutas') || '[]');
      local = local.filter(function (r) { return r.Id_ruta !== ruta.Id_ruta; });
      localStorage.setItem('carorur_rutas', JSON.stringify(local));

      // Eliminar de Google Sheets si está configurado
      if (SCRIPT_URL) {
        fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ accion: 'eliminarRuta', Id_ruta: ruta.Id_ruta })
        }).catch(function (err) { console.warn('No se pudo eliminar en Sheets:', err); });
      }

      // Refrescar lista en pantalla
      historialData.splice(idx, 1);
      renderHistorial(historialData);
    }

    /* ============================================================
       BOTÓN ACTIVAR GPS (clima + centrar mapa)
       El navegador solo acepta pedir geolocalización tras un tap
       del usuario cuando la página corre dentro de un iframe.
    ============================================================ */
    var btnActivarGps = document.getElementById('btn-activar-gps');

    function pedirUbicacion() {
      if (!navigator.geolocation) {
        document.getElementById('clima-texto').textContent = '⚠️ GPS no disponible en este dispositivo';
        if (btnActivarGps) { btnActivarGps.style.display = 'none'; }
        return;
      }
      if (btnActivarGps) { btnActivarGps.textContent = '⏳ Buscando...'; btnActivarGps.disabled = true; }
      document.getElementById('clima-texto').textContent = '📡 Obteniendo tu posición...';

      navigator.geolocation.getCurrentPosition(
        function (pos) {
          if (btnActivarGps) { btnActivarGps.style.display = 'none'; }
          centrarMapa(pos.coords.latitude, pos.coords.longitude, 14);
          cargarClima(pos.coords.latitude, pos.coords.longitude);
        },
        function (err) {
          if (btnActivarGps) { btnActivarGps.textContent = '📡 Reintentar'; btnActivarGps.disabled = false; }
          var msg = err.code === 1
            ? '🚫 Permiso de ubicación denegado. Actívalo en ajustes del navegador.'
            : '⚠️ No se pudo obtener la ubicación. Inténtalo de nuevo.';
          document.getElementById('clima-texto').textContent = msg;
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    if (btnActivarGps) { btnActivarGps.addEventListener('click', pedirUbicacion); }

    window.addEventListener('pagehide', function () {
      guardarSesionLocal();
    });

    /* ============================================================
       INICIALIZACIÓN
    ============================================================ */
    cargarHistorial();
    restaurarSesionLocal();

  }());
  </script>
</body>
</html>

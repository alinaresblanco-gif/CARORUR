<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>MURO DE RECUERDOS</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="vistas.css" />
	<style>
		.vista-contenido {
			padding: 0.65rem !important;
			display: flex;
			flex-direction: column;
			gap: 0.65rem;
			overflow-y: auto !important;
		}

		.muro-toolbar {
			display: flex;
			justify-content: center;
		}

		.btn-nuevo {
			border: 2px solid var(--papel-oscuro);
			border-radius: 10px;
			background: #f3dfb5;
			color: var(--tinta-rural);
			font-family: 'Special Elite', cursive;
			font-size: 0.78rem;
			padding: 0.52rem 0.8rem;
			cursor: pointer;
		}

		.btn-nuevo:hover { background: #ecd29f; }

		.muro-grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 0.55rem;
		}

		.recuerdo-card {
			background: #fff5de;
			border: 2px solid var(--papel-oscuro);
			border-radius: 12px;
			overflow: hidden;
			box-shadow: var(--sombra-papel);
			display: flex;
			flex-direction: column;
			min-height: 210px;
		}

		.recuerdo-thumb {
			width: 100%;
			height: 96px;
			object-fit: cover;
			background: #dcc38f;
		}

		.recuerdo-body {
			padding: 0.45rem 0.5rem 0.55rem;
			display: flex;
			flex-direction: column;
			gap: 0.25rem;
			flex: 1;
		}

		.recuerdo-title {
			margin: 0;
			font-size: 0.8rem;
			font-weight: 700;
			color: var(--tinta-rural);
			line-height: 1.25;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.recuerdo-date {
			font-size: 0.7rem;
			color: var(--tinta-rural-suave);
		}

		.recuerdo-desc {
			margin: 0;
			font-size: 0.72rem;
			color: var(--tinta-rural);
			line-height: 1.2;
			display: -webkit-box;
			-webkit-line-clamp: 2;
			-webkit-box-orient: vertical;
			overflow: hidden;
		}

		.recuerdo-footer {
			margin-top: auto;
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 0.3rem;
		}

		.recuerdo-count {
			font-size: 0.68rem;
			color: var(--tinta-rural-suave);
		}

		.icon-actions {
			display: flex;
			gap: 0.28rem;
		}

		.icon-btn {
			width: 30px;
			height: 30px;
			border-radius: 50%;
			border: 1px solid rgba(122,82,48,0.45);
			background: #f7e6bf;
			color: var(--tinta-rural);
			cursor: pointer;
			font-size: 0.85rem;
			line-height: 1;
		}

		.icon-btn:hover { background: #edd7a8; }

		.icon-btn.add { color: #2f6f2f; border-color: rgba(47,111,47,0.45); }

		.icon-btn.delete { color: #9a3f2e; border-color: rgba(154,63,46,0.45); }

		.open-overlay {
			position: fixed;
			inset: 0;
			background: rgba(25, 16, 9, 0.52);
			backdrop-filter: blur(2px);
			z-index: 90;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 0.75rem;
		}

		.open-overlay[hidden] { display: none; }

		.dialog {
			width: min(640px, 100%);
			max-height: 88vh;
			overflow: auto;
			background: #fff5de;
			border: 2px solid var(--papel-oscuro);
			border-radius: 14px;
			box-shadow: 0 20px 45px rgba(0,0,0,0.24);
			padding: 0.7rem;
			display: flex;
			flex-direction: column;
			gap: 0.55rem;
		}

		.dialog h2 {
			margin: 0;
			font-family: 'Special Elite', cursive;
			font-size: 0.92rem;
			color: var(--tinta-rural);
		}

		.form-grid {
			display: grid;
			grid-template-columns: 1fr;
			gap: 0.42rem;
		}

		.field-label {
			font-size: 0.72rem;
			font-weight: 700;
			color: var(--tinta-rural);
		}

		.field-input,
		.field-textarea {
			width: 100%;
			border: 1.5px solid rgba(122,82,48,0.45);
			border-radius: 8px;
			background: #fff9eb;
			color: var(--tinta-rural);
			padding: 0.42rem 0.5rem;
			font-size: 0.8rem;
		}

		.field-textarea {
			min-height: 76px;
			resize: vertical;
		}

		.dialog-actions {
			display: flex;
			gap: 0.4rem;
			justify-content: flex-end;
		}

		.btn-lite,
		.btn-save {
			border: 2px solid var(--papel-oscuro);
			border-radius: 9px;
			font-family: 'Special Elite', cursive;
			font-size: 0.74rem;
			padding: 0.42rem 0.62rem;
			cursor: pointer;
		}

		.btn-lite {
			background: #f2e5c8;
			color: var(--tinta-rural);
		}

		.btn-save {
			background: var(--tinta-rural);
			border-color: var(--tinta-rural);
			color: var(--papel-claro);
		}

		.galeria-grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 0.42rem;
		}

		.galeria-img {
			width: 100%;
			height: 118px;
			object-fit: cover;
			border-radius: 8px;
			border: 1px solid rgba(122,82,48,0.35);
			cursor: pointer;
		}

		.foto-viewer-img {
			width: 100%;
			max-height: 70vh;
			object-fit: contain;
			background: #211509;
			border-radius: 10px;
			border: 1px solid rgba(122,82,48,0.45);
		}

		.btn-danger {
			background: #9a3f2e;
			border-color: #9a3f2e;
			color: #fff7ef;
		}

		.empty-muro {
			background: #fff5de;
			border: 2px dashed rgba(122,82,48,0.5);
			border-radius: 12px;
			padding: 1rem;
			text-align: center;
			font-size: 0.76rem;
			color: var(--tinta-rural-suave);
		}

		.toast-msg {
			position: fixed;
			left: 50%;
			bottom: 1rem;
			transform: translateX(-50%);
			z-index: 120;
			background: #3e2a15;
			color: #fff7e7;
			border: 1px solid rgba(255,255,255,0.2);
			border-radius: 999px;
			padding: 0.44rem 0.74rem;
			font-size: 0.74rem;
			box-shadow: 0 8px 26px rgba(0,0,0,0.25);
		}

		.toast-msg[hidden] {
			display: none;
		}
	</style>
</head>
<body>
	<div class="vista-app">
		<header class="vista-header">
			<a class="btn-volver" href="../index.html" target="_top" aria-label="Volver al inicio" id="btnVolverCabecera">
				<img src="../iconos/volver.png" alt="Volver" />
			</a>
			<h1>MURO DE RECUERDOS</h1>
			<div class="header-espaciador" aria-hidden="true"></div>
		</header>

		<main class="vista-contenido">
			<section class="muro-toolbar">
				<button id="btnNuevoRecuerdo" class="btn-nuevo" type="button">+ NUEVO RECUERDO</button>
			</section>

			<section id="emptyMuro" class="empty-muro">
				Aun no hay recuerdos. Crea el primero con nombre, fecha, descripcion y fotos.
			</section>

			<section id="muroGrid" class="muro-grid" aria-label="Muro de recuerdos"></section>
		</main>
	</div>

	<div id="modalNuevo" class="open-overlay" hidden>
		<div class="dialog" role="dialog" aria-modal="true" aria-label="Crear recuerdo">
			<h2>NUEVO RECUERDO</h2>
			<div class="form-grid">
				<label>
					<span class="field-label">Nombre del momento</span>
					<input id="inputNombre" class="field-input" type="text" maxlength="80" placeholder="Ej: Fin de semana en la casa" />
				</label>
				<label>
					<span class="field-label">Fecha</span>
					<input id="inputFecha" class="field-input" type="date" />
				</label>
				<label>
					<span class="field-label">Descripcion</span>
					<textarea id="inputDesc" class="field-textarea" maxlength="280" placeholder="Cuatro lineas sobre el recuerdo"></textarea>
				</label>
				<label>
					<span class="field-label">Fotos del momento</span>
					<input id="inputFotos" class="field-input" type="file" accept="image/*" multiple />
				</label>
			</div>
			<div class="dialog-actions">
				<button id="btnCancelarNuevo" type="button" class="btn-lite">Cancelar</button>
				<button id="btnGuardarNuevo" type="button" class="btn-save">Guardar tarjeta</button>
			</div>
		</div>
	</div>

	<div id="modalGaleria" class="open-overlay" hidden>
		<div class="dialog" role="dialog" aria-modal="true" aria-label="Galeria del recuerdo">
			<h2 id="galeriaTitulo">GALERIA</h2>
			<div id="galeriaInfo" class="field-label"></div>
			<div id="galeriaGrid" class="galeria-grid"></div>
			<div class="dialog-actions">
				<button id="btnAddFotosGaleria" type="button" class="btn-lite">Anadir fotos</button>
				<button id="btnCerrarGaleria" type="button" class="btn-save">Cerrar</button>
			</div>
		</div>
	</div>

	<div id="modalFoto" class="open-overlay" hidden>
		<div class="dialog" role="dialog" aria-modal="true" aria-label="Foto ampliada">
			<h2 id="fotoViewerTitle">FOTO</h2>
			<img id="fotoViewerImg" class="foto-viewer-img" src="../imagenes/rustica-vista.svg" alt="Foto ampliada" />
			<div class="dialog-actions">
				<button id="btnDeleteFoto" type="button" class="btn-lite btn-danger">Eliminar foto</button>
				<button id="btnCerrarFoto" type="button" class="btn-save">Cerrar</button>
			</div>
		</div>
	</div>

	<!-- Modal confirmación genérico -->
	<div id="modalConfirm" class="open-overlay" hidden>
		<div class="dialog" role="dialog" aria-modal="true" aria-label="Confirmar acción">
			<p id="confirmMsg" style="margin:0 0 1.2rem;font-size:1rem;text-align:center;"></p>
			<div class="dialog-actions">
				<button id="btnConfirmOk" type="button" class="btn-lite btn-danger">Sí, eliminar</button>
				<button id="btnConfirmCancel" type="button" class="btn-save">Cancelar</button>
			</div>
		</div>
	</div>

	<input id="inputAddFotosTarjeta" type="file" accept="image/*" multiple hidden />
	<div id="toastMsg" class="toast-msg" hidden></div>

	<script>
	(function () {
		var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbycg1nrbCB_www3bqb-RVM2nl4hHvEozFdY2uz50jX6iiAGW-yFu3MeRENqo0GozWCu/exec';
		var DRIVE_FOLDER_ID = '1Mz96pgbkiTVM3AWQ_uBTrsdZv2H-MwRe';
		var STORAGE_KEY = 'carorur_muro_recuerdos_v2';
		var recuerdos = [];
		var fotosMemoria = {};
		var btnVolverCabecera = document.getElementById('btnVolverCabecera');

		var btnNuevoRecuerdo = document.getElementById('btnNuevoRecuerdo');
		var emptyMuro = document.getElementById('emptyMuro');
		var muroGrid = document.getElementById('muroGrid');

		var modalNuevo = document.getElementById('modalNuevo');
		var inputNombre = document.getElementById('inputNombre');
		var inputFecha = document.getElementById('inputFecha');
		var inputDesc = document.getElementById('inputDesc');
		var inputFotos = document.getElementById('inputFotos');
		var btnCancelarNuevo = document.getElementById('btnCancelarNuevo');
		var btnGuardarNuevo = document.getElementById('btnGuardarNuevo');

		var modalGaleria = document.getElementById('modalGaleria');
		var galeriaTitulo = document.getElementById('galeriaTitulo');
		var galeriaInfo = document.getElementById('galeriaInfo');
		var galeriaGrid = document.getElementById('galeriaGrid');
		var btnAddFotosGaleria = document.getElementById('btnAddFotosGaleria');
		var btnCerrarGaleria = document.getElementById('btnCerrarGaleria');
		var modalFoto = document.getElementById('modalFoto');
		var fotoViewerTitle = document.getElementById('fotoViewerTitle');
		var fotoViewerImg = document.getElementById('fotoViewerImg');
		var btnDeleteFoto = document.getElementById('btnDeleteFoto');
		var btnCerrarFoto = document.getElementById('btnCerrarFoto');
		var inputAddFotosTarjeta = document.getElementById('inputAddFotosTarjeta');
		var toastMsg = document.getElementById('toastMsg');
		var modalConfirm = document.getElementById('modalConfirm');
		var confirmMsg = document.getElementById('confirmMsg');
		var btnConfirmOk = document.getElementById('btnConfirmOk');
		var btnConfirmCancel = document.getElementById('btnConfirmCancel');
		var addFotosTargetId = null;
		var galeriaRecuerdoId = null;
		var toastTimer = null;
		var isSaving = false;
		var fotoViewerRecuerdoId = null;
		var fotoViewerFoto = null;

		function carorurConfirm(msg) {
			return new Promise(function (resolve) {
				confirmMsg.textContent = msg;
				modalConfirm.hidden = false;
				function onOk() {
					modalConfirm.hidden = true;
					btnConfirmOk.removeEventListener('click', onOk);
					btnConfirmCancel.removeEventListener('click', onCancel);
					resolve(true);
				}
				function onCancel() {
					modalConfirm.hidden = true;
					btnConfirmOk.removeEventListener('click', onOk);
					btnConfirmCancel.removeEventListener('click', onCancel);
					resolve(false);
				}
				btnConfirmOk.addEventListener('click', onOk);
				btnConfirmCancel.addEventListener('click', onCancel);
			});
		}

		function uid(prefix) {
			return prefix + '_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
		}

		function escHtml(value) {
			return String(value || '')
				.replace(/&/g, '&amp;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;')
				.replace(/"/g, '&quot;');
		}

		function humanDate(value) {
			var txt = String(value || '').trim();
			if (!txt) return 'Sin fecha';

			var mIso = txt.match(/^(\d{4})-(\d{2})-(\d{2})$/);
			if (mIso) {
				return mIso[3] + '/' + mIso[2] + '/' + mIso[1];
			}

			var mAnyIso = txt.match(/^(\d{4})-(\d{2})-(\d{2})T/);
			if (mAnyIso) {
				return mAnyIso[3] + '/' + mAnyIso[2] + '/' + mAnyIso[1];
			}

			var d = new Date(txt);
			if (!isNaN(d.getTime())) {
				return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
			}

			return txt;
		}

		function driveViewUrl(fileId) {
			var id = String(fileId || '').trim();
			if (!id) return '../imagenes/rustica-vista.svg';
			return 'https://drive.google.com/uc?export=view&id=' + encodeURIComponent(id);
		}

		function extractDriveFileId(value) {
			var txt = String(value || '').trim();
			if (!txt) return '';
			if (/^[a-zA-Z0-9_-]{20,}$/.test(txt)) return txt;
			var m = txt.match(/[?&]id=([a-zA-Z0-9_-]+)/);
			if (m && m[1]) return m[1];
			m = txt.match(/\/d\/([a-zA-Z0-9_-]+)/);
			if (m && m[1]) return m[1];
			return '';
		}

		function buildDriveImageCandidates(fileOrUrl) {
			var raw = String(fileOrUrl || '').trim();
			var id = extractDriveFileId(raw);
			if (!id) {
				return raw ? [raw] : ['../imagenes/rustica-vista.svg'];
			}
			return [
				'https://lh3.googleusercontent.com/d/' + encodeURIComponent(id) + '=w1200',
				'https://drive.google.com/thumbnail?id=' + encodeURIComponent(id) + '&sz=w1200',
				'https://drive.google.com/uc?export=view&id=' + encodeURIComponent(id),
				'https://drive.google.com/uc?export=download&id=' + encodeURIComponent(id)
			];
		}

		function setImageWithFallback(img, fileOrUrl) {
			if (!img) return;
			var candidates = buildDriveImageCandidates(fileOrUrl);
			var idx = 0;
			img.onerror = function () {
				idx += 1;
				if (idx >= candidates.length) {
					img.onerror = null;
					img.src = '../imagenes/rustica-vista.svg';
					return;
				}
				img.src = candidates[idx];
			};
			img.src = candidates[0];
		}

		function setSaving(flag) {
			isSaving = !!flag;
			btnGuardarNuevo.disabled = isSaving;
			btnNuevoRecuerdo.disabled = isSaving;
			btnAddFotosGaleria.disabled = isSaving;
			btnDeleteFoto.disabled = isSaving;
		}

		function showToast(message) {
			if (!toastMsg) return;
			toastMsg.textContent = String(message || '');
			toastMsg.hidden = false;
			if (toastTimer) {
				clearTimeout(toastTimer);
			}
			toastTimer = setTimeout(function () {
				toastMsg.hidden = true;
			}, 1800);
		}

		function saveRecuerdos() {
			try {
				var safe = recuerdos.map(function (r) {
					return {
						id: r.id,
						nombre: r.nombre,
						fecha: r.fecha,
						descripcion: r.descripcion,
						fotoCount: r.fotoCount,
						coverFileId: r.coverFileId || ''
					};
				});
				localStorage.setItem(STORAGE_KEY, JSON.stringify(safe));
			} catch (e) {
			}
		}

		function loadRecuerdos() {
			try {
				var raw = localStorage.getItem(STORAGE_KEY);
				if (!raw) return;
				var parsed = JSON.parse(raw);
				if (!Array.isArray(parsed)) return;
				recuerdos = parsed.map(function (r) {
					return {
						id: r.id || uid('RC'),
						nombre: r.nombre || 'Recuerdo',
						fecha: r.fecha || '',
						descripcion: r.descripcion || '',
						fotoCount: Number(r.fotoCount || 0),
						coverFileId: String(r.coverFileId || ''),
						thumbUrl: driveViewUrl(r.coverFileId || ''),
						hasSessionPhotos: false
					};
				});
			} catch (e) {
				recuerdos = [];
			}
		}

		async function apiGet(action, params) {
			var qp = ['action=' + encodeURIComponent(action), '_ts=' + Date.now()];
			var p = params || {};
			Object.keys(p).forEach(function (key) {
				if (p[key] === undefined || p[key] === null || p[key] === '') return;
				qp.push(encodeURIComponent(key) + '=' + encodeURIComponent(String(p[key])));
			});
			var res = await fetch(APPS_SCRIPT_URL + '?' + qp.join('&'), { cache: 'no-store' });
			var data = await res.json();
			if (!data.ok) throw new Error(data.error || 'Error de lectura en nube');
			return data;
		}

		async function postAppsScript(payload) {
			var res = await fetch(APPS_SCRIPT_URL, {
				method: 'POST',
				mode: 'cors',
				cache: 'no-store',
				headers: { 'Content-Type': 'text/plain;charset=utf-8' },
				body: JSON.stringify(payload)
			});
			var data = await res.json();
			if (!data.ok) throw new Error(data.error || 'Error Apps Script');
			return data;
		}

		function fileToBase64(file) {
			return new Promise(function (resolve, reject) {
				var reader = new FileReader();
				reader.onload = function () {
					var out = String(reader.result || '');
					var idx = out.indexOf(',');
					resolve(idx >= 0 ? out.slice(idx + 1) : out);
				};
				reader.onerror = function () {
					reject(new Error('No se pudo leer archivo'));
				};
				reader.readAsDataURL(file);
			});
		}

		async function uploadImageFile(file) {
			var data64 = await fileToBase64(file);
			var resp = await postAppsScript({
				action: 'uploadImage',
				data: data64,
				mimeType: file.type || 'image/jpeg',
				name: file.name || ('foto_' + Date.now() + '.jpg'),
				folderId: DRIVE_FOLDER_ID
			});
			return {
				file_id: String(resp.file_id || ''),
				url: String(resp.url || '')
			};
		}

		async function loadRecuerdosFromCloud() {
			var data = await apiGet('getMuroRecuerdos');
			var rows = Array.isArray(data.recuerdos) ? data.recuerdos : [];

			fotosMemoria = {};
			recuerdos = rows.map(function (r) {
				var fotos = Array.isArray(r.fotos) ? r.fotos : [];
				var fotoItems = fotos.map(function (f) {
					return {
						id_foto: String(f.id_foto || uid('RF')),
						file_id: String(f.file_id || ''),
						url: String(f.url || driveViewUrl(f.file_id || '')),
						orden: Number(f.orden || 0),
						es_portada: !!f.es_portada
					};
				});
				fotosMemoria[r.id_recuerdo] = fotoItems;
				var coverFileId = String(r.cover_file_id || '');
				var thumb = coverFileId ? driveViewUrl(coverFileId) : ((fotoItems[0] && fotoItems[0].url) || '../imagenes/rustica-vista.svg');
				return {
					id: String(r.id_recuerdo || uid('RC')),
					nombre: String(r.nombre || 'Recuerdo'),
					fecha: String(r.fecha || ''),
					descripcion: String(r.descripcion || ''),
					fotoCount: Number(r.foto_count || fotoItems.length || 0),
					coverFileId: coverFileId,
					thumbUrl: thumb,
					hasSessionPhotos: fotoItems.length > 0
				};
			});

			saveRecuerdos();
			renderMuro();
		}

		function openNuevoModal() {
			modalNuevo.hidden = false;
			if (!inputFecha.value) {
				inputFecha.valueAsDate = new Date();
			}
			inputNombre.focus();
		}

		function closeNuevoModal() {
			modalNuevo.hidden = true;
		}

		function clearNuevoForm() {
			inputNombre.value = '';
			inputFecha.value = '';
			inputDesc.value = '';
			inputFotos.value = '';
		}

		function renderMuro() {
			muroGrid.innerHTML = '';
			emptyMuro.hidden = recuerdos.length > 0;

			recuerdos.forEach(function (r) {
				var card = document.createElement('article');
				card.className = 'recuerdo-card';
				card.innerHTML =
					'<img class="recuerdo-thumb" src="../imagenes/rustica-vista.svg" alt="Miniatura del recuerdo" />' +
					'<div class="recuerdo-body">' +
						'<h3 class="recuerdo-title">' + escHtml(r.nombre) + '</h3>' +
						'<div class="recuerdo-date">' + escHtml(humanDate(r.fecha)) + '</div>' +
						'<p class="recuerdo-desc">' + escHtml(r.descripcion || 'Sin descripcion todavia.') + '</p>' +
						'<div class="recuerdo-footer">' +
							'<span class="recuerdo-count">' + escHtml(String(r.fotoCount || 0)) + ' fotos</span>' +
							'<div class="icon-actions">' +
								'<button type="button" class="icon-btn add" data-action="add-photos" data-id="' + escHtml(r.id) + '" aria-label="Anadir fotos">&#128247;</button>' +
								'<button type="button" class="icon-btn delete" data-action="delete" data-id="' + escHtml(r.id) + '" aria-label="Eliminar recuerdo">&#128465;</button>' +
							'</div>' +
						'</div>' +
					'</div>';

				card.addEventListener('click', function (event) {
					var target = event.target;
					if (target && target.closest && target.closest('.icon-btn')) return;
					openGaleria(r.id);
				});

				var thumbImg = card.querySelector('.recuerdo-thumb');
				setImageWithFallback(thumbImg, r.coverFileId || r.thumbUrl || '');

				muroGrid.appendChild(card);
			});
		}

		async function guardarNuevoRecuerdo() {
			if (isSaving) return;
			var nombre = String(inputNombre.value || '').trim();
			if (!nombre) {
				inputNombre.focus();
				return;
			}

			var files = Array.prototype.slice.call(inputFotos.files || []);
			var id = uid('RC');

			setSaving(true);
			try {
				var uploaded = [];
				for (var i = 0; i < files.length; i++) {
					var up = await uploadImageFile(files[i]);
					if (!up.file_id) continue;
					uploaded.push({
						id_foto: uid('RF'),
						file_id: up.file_id,
						orden: i + 1,
						es_portada: i === 0,
						url: up.url
					});
				}

				await postAppsScript({
					action: 'saveMuroRecuerdo',
					row: {
						id_recuerdo: id,
						nombre: nombre,
						fecha: inputFecha.value || '',
						descripcion: String(inputDesc.value || '').trim(),
						cover_file_id: uploaded[0] ? uploaded[0].file_id : '',
						foto_count: uploaded.length,
						deleted: false
					}
				});

				if (uploaded.length) {
					await postAppsScript({
						action: 'addMuroRecuerdoFotos',
						id_recuerdo: id,
						fotos: uploaded.map(function (f) {
							return {
								id_foto: f.id_foto,
								file_id: f.file_id,
								orden: f.orden,
								es_portada: f.es_portada
							};
						})
					});
				}

				clearNuevoForm();
				closeNuevoModal();
				await loadRecuerdosFromCloud();
				showToast(uploaded.length ? ('+' + uploaded.length + ' fotos anadidas') : 'Tarjeta guardada');
			} catch (err) {
				showToast('No se pudo guardar: ' + String(err && err.message ? err.message : err));
			} finally {
				setSaving(false);
			}
		}

		function openGaleria(id) {
			var rec = recuerdos.find(function (r) { return r.id === id; });
			if (!rec) return;
			galeriaRecuerdoId = id;

			galeriaTitulo.textContent = rec.nombre;
			galeriaInfo.textContent = humanDate(rec.fecha) + '  |  ' + (rec.fotoCount || 0) + ' fotos';
			galeriaGrid.innerHTML = '';

			var fotos = fotosMemoria[id] || [];
			if (!fotos.length) {
				galeriaGrid.innerHTML = '<div class="empty-muro" style="grid-column: 1 / -1;">Este recuerdo aun no tiene fotos.</div>';
			} else {
				fotos.forEach(function (foto) {
					var src = (foto && typeof foto === 'object') ? String(foto.url || foto.file_id || '') : String(foto || '');
					var img = document.createElement('img');
					img.className = 'galeria-img';
					img.src = '../imagenes/rustica-vista.svg';
					img.alt = 'Foto del recuerdo';
					img.setAttribute('data-recuerdo-id', id);
					img.setAttribute('data-foto-id', (foto && foto.id_foto) ? foto.id_foto : '');
					img.addEventListener('click', function () {
						openFotoViewer(id, foto);
					});
					setImageWithFallback(img, src);
					galeriaGrid.appendChild(img);
				});
			}

			modalGaleria.hidden = false;
		}

		function closeGaleria() {
			galeriaRecuerdoId = null;
			modalGaleria.hidden = true;
		}

		function openFotoViewer(recuerdoId, foto) {
			if (!foto || !recuerdoId) return;
			fotoViewerRecuerdoId = recuerdoId;
			fotoViewerFoto = foto;
			fotoViewerTitle.textContent = 'FOTO';
			fotoViewerImg.src = '../imagenes/rustica-vista.svg';
			setImageWithFallback(fotoViewerImg, foto.url || foto.file_id || '');
			modalFoto.hidden = false;
		}

		function closeFotoViewer() {
			fotoViewerRecuerdoId = null;
			fotoViewerFoto = null;
			modalFoto.hidden = true;
		}

		async function deleteFotoSeleccionada() {
			if (isSaving) return;
			if (!fotoViewerFoto || !fotoViewerFoto.id_foto) return;
			if (!await carorurConfirm('¿Eliminar esta foto del recuerdo?')) return;
			var targetRecuerdoId = fotoViewerRecuerdoId;

			setSaving(true);
			try {
				await postAppsScript({
					action: 'deleteMuroFoto',
					id_foto: fotoViewerFoto.id_foto,
					id_recuerdo: targetRecuerdoId
				});
				closeFotoViewer();
				await loadRecuerdosFromCloud();
				if (targetRecuerdoId) {
					openGaleria(targetRecuerdoId);
				}
				showToast('Foto eliminada');
			} catch (err) {
				showToast('No se pudo eliminar foto: ' + String(err && err.message ? err.message : err));
			} finally {
				setSaving(false);
			}
		}

		async function deleteRecuerdo(id) {
			if (isSaving) return;
			var rec = recuerdos.find(function (r) { return r.id === id; });
			if (!rec) return;

			if (!await carorurConfirm('¿Eliminar "' + rec.nombre + '" del muro?')) {
				return;
			}

			setSaving(true);
			try {
				await postAppsScript({ action: 'deleteMuroRecuerdo', id_recuerdo: id });
				if (galeriaRecuerdoId === id) {
					closeGaleria();
				}
				await loadRecuerdosFromCloud();
				showToast('Tarjeta eliminada');
			} catch (err) {
				showToast('No se pudo eliminar: ' + String(err && err.message ? err.message : err));
			} finally {
				setSaving(false);
			}
		}

		async function addPhotosToRecuerdo(id, filesLike) {
			if (isSaving) return;
			var rec = recuerdos.find(function (r) { return r.id === id; });
			if (!rec) return;

			var files = Array.prototype.slice.call(filesLike || []);
			if (!files.length) return;

			setSaving(true);
			try {
				var baseOrden = Number(rec.fotoCount || 0);
				var uploaded = [];
				for (var i = 0; i < files.length; i++) {
					var up = await uploadImageFile(files[i]);
					if (!up.file_id) continue;
					uploaded.push({
						id_foto: uid('RF'),
						file_id: up.file_id,
						orden: baseOrden + i + 1,
						es_portada: false
					});
				}
				if (!uploaded.length) {
					showToast('No se pudieron subir fotos');
					return;
				}

				await postAppsScript({
					action: 'addMuroRecuerdoFotos',
					id_recuerdo: id,
					fotos: uploaded
				});

				await loadRecuerdosFromCloud();
				showToast('+' + uploaded.length + ' fotos anadidas');
				if (!modalGaleria.hidden && galeriaRecuerdoId === id) {
					openGaleria(id);
				}
			} catch (err) {
				showToast('No se pudieron anadir fotos: ' + String(err && err.message ? err.message : err));
			} finally {
				setSaving(false);
			}
		}

		function requestAddPhotos(id) {
			var rec = recuerdos.find(function (r) { return r.id === id; });
			if (!rec) return;
			addFotosTargetId = id;
			inputAddFotosTarjeta.value = '';
			inputAddFotosTarjeta.click();
		}

		btnNuevoRecuerdo.addEventListener('click', openNuevoModal);

		btnVolverCabecera.addEventListener('click', function (e) {
			e.preventDefault();
			var targetHref = '../index.html';
			try {
				if (window.top !== window && typeof window.top.carorurCloseVista === 'function') {
					window.top.carorurCloseVista();
					return;
				}
				if (window.top !== window && window.top.postMessage) {
					window.top.postMessage('carorur:close-vista', '*');
					setTimeout(function () {
						try {
							window.top.location.href = targetHref;
						} catch (err2) {
							window.location.href = targetHref;
						}
					}, 250);
					return;
				}
			} catch (err) {
			}
			window.location.href = targetHref;
		});

		btnCancelarNuevo.addEventListener('click', function () {
			closeNuevoModal();
		});
		btnGuardarNuevo.addEventListener('click', function () {
			guardarNuevoRecuerdo().catch(function () {
				showToast('No se pudo guardar tarjeta');
			});
		});

		modalNuevo.addEventListener('click', function (event) {
			if (event.target === modalNuevo) closeNuevoModal();
		});

		btnCerrarGaleria.addEventListener('click', closeGaleria);
		btnCerrarFoto.addEventListener('click', closeFotoViewer);
		btnDeleteFoto.addEventListener('click', function () {
			deleteFotoSeleccionada().catch(function () {
				showToast('No se pudo eliminar foto');
			});
		});
		btnAddFotosGaleria.addEventListener('click', function () {
			if (!galeriaRecuerdoId) return;
			requestAddPhotos(galeriaRecuerdoId);
		});
		modalGaleria.addEventListener('click', function (event) {
			if (event.target === modalGaleria) closeGaleria();
		});
		modalFoto.addEventListener('click', function (event) {
			if (event.target === modalFoto) closeFotoViewer();
		});

		inputAddFotosTarjeta.addEventListener('change', function () {
			if (!addFotosTargetId) return;
			var selectedId = addFotosTargetId;
			addPhotosToRecuerdo(selectedId, inputAddFotosTarjeta.files).catch(function () {
				showToast('No se pudieron anadir fotos');
			});
			addFotosTargetId = null;
		});

		muroGrid.addEventListener('click', function (event) {
			var btn = event.target && event.target.closest ? event.target.closest('.icon-btn') : null;
			if (!btn) return;
			var id = btn.getAttribute('data-id');
			var action = btn.getAttribute('data-action');
			if (!id || !action) return;

			if (action === 'delete') {
				event.stopPropagation();
				deleteRecuerdo(id).catch(function () {
					showToast('No se pudo eliminar');
				});
				return;
			}

			if (action === 'add-photos') {
				event.stopPropagation();
				requestAddPhotos(id);
			}
		});

		loadRecuerdos();
		renderMuro();
		loadRecuerdosFromCloud().catch(function () {
			showToast('Sin conexion de nube. Se muestra cache local.');
		});
	})();
	</script>
</body>
</html>
